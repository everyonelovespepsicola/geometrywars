                        this.velocity.y = (this.velocity.y / currentSpeed) * this.maxSpeed;
                    }
                }

                this.x += this.velocity.x * 60 * dt;
                this.y += this.velocity.y * 60 * dt;

                // Wall Boundaries - Bounce to stay in play area
                if ((this.x - this.radius < 0 && this.velocity.x < 0) || (this.x + this.radius > world.width && this.velocity.x > 0)) {
                    this.velocity.x *= -1;
                }
                if ((this.y - this.radius < 0 && this.velocity.y < 0) || (this.y + this.radius > world.height && this.velocity.y > 0)) {
                    this.velocity.y *= -1;
                }
            }
        }

        // --- GAME LOGIC ---

        let player = new Player(world.width / 2, world.height / 2);
        let projectiles = [];
        let enemies = [];
        let particles = [];
        let spawnTimer = 0;
        let cornerSpawnTimer = 0;
        
        function updateBoostUI() {
            let boostLevel = 0;
            if (scoreStreak >= 25000) boostLevel = 3;
            else if (scoreStreak >= 15000) boostLevel = 2;
            else if (scoreStreak >= 5000) boostLevel = 1;
            boostEl.innerText = boostLevel;
        }
        
        function addScore(points) {
            score += points;
            scoreStreak += points;
            scoreEl.innerHTML = score;
            updateBoostUI();
            
            if (score >= nextLifeThreshold) {
                lives++;
                livesEl.innerHTML = lives;
                nextLifeThreshold += 15000;
                
                // Visual feedback
                const title = document.createElement('div');
                title.innerText = "EXTRA LIFE";
                title.style.position = 'absolute';
                title.style.top = '20%';
                title.style.left = '50%';
                title.style.transform = 'translate(-50%, -50%)';
                title.style.fontSize = '30px';
                title.style.color = '#ff0055';
                title.style.textShadow = '0 0 10px currentColor';
                title.style.fontWeight = 'bold';
                title.style.transition = 'opacity 1s';
                title.style.pointerEvents = 'none';
                document.body.appendChild(title);
                setTimeout(() => { title.style.opacity = '0'; setTimeout(() => title.remove(), 1000); }, 1000);
            }

            // Award bomb
            if (score >= nextBombThreshold) {
                bombs++;
                bombsEl.innerHTML = bombs;
                nextBombThreshold += 30000;

                // Visual feedback
                const title = document.createElement('div');
                title.innerText = "BOMB AWARDED";
                title.style.position = 'absolute';
                title.style.top = '25%';
                title.style.left = '50%';
                title.style.transform = 'translate(-50%, -50%)';
                title.style.fontSize = '30px';
                title.style.color = '#ffaa00';
                title.style.textShadow = '0 0 10px currentColor';
                title.style.fontWeight = 'bold';
                title.style.transition = 'opacity 1s';
                title.style.pointerEvents = 'none';
                document.body.appendChild(title);
                setTimeout(() => { title.style.opacity = '0'; setTimeout(() => title.remove(), 1000); }, 1000);
            }
        }

        function startNextLevel() {
            enemies.forEach(e => e.markedForDeletion = true); // Clear all enemies
            projectiles.forEach(p => p.markedForDeletion = true);
            particles.forEach(p => p.markedForDeletion = true);
            orbs.forEach(o => o.markedForDeletion = true);
            
            level++;
            levelFrame = 0;
            hexSpawnsTriggered = 0;
            bossSpawned = false;
            levelEl.innerText = level;
            waveMsg.classList.add('hidden');
            
            // Stop active bomb blast from carrying over to the next level
            bombEffect.active = false;
            bombEffect.respawnQueue = [];

            levelTransitioning = false;

            const isBossLevel = level % 3 === 0;
            showLevelTitle(isBossLevel ? "BOSS FIGHT" : `LEVEL ${level}`, isBossLevel ? "red" : "white");
            enemiesRemainingToSpawn = Math.floor(150 * Math.pow(1.1, level - 1));
        }

        function transitionToNextLevel() {
            if (levelTransitioning) return;
            levelTransitioning = true;
            
            const isBossNext = (level + 1) % 3 === 0;
            showLevelTitle(isBossNext ? "WARNING: BOSS APPROACHING" : "LEVEL COMPLETE", isBossNext ? "#ff0055" : "#00ffaa");
            
            setTimeout(() => {
                startNextLevel();
            }, 1500); // 1.5 second seamless transition
        }

        function showLevelTitle(text, color) {
            // Remove any existing titles to prevent overlap
            document.querySelectorAll('.level-title-popup').forEach(t => t.remove());

            const title = document.createElement('div');
            title.className = 'level-title-popup';
            title.innerText = text;
            title.style.position = 'absolute';
            title.style.top = '30%';
            title.style.left = '50%';
            title.style.transform = 'translate(-50%, -50%)';
            title.style.fontSize = '60px';
            title.style.color = color;
            title.style.textShadow = '0 0 20px currentColor';
            title.style.fontWeight = 'bold';
            title.style.transition = 'opacity 1s';
            document.body.appendChild(title);
            setTimeout(() => { title.style.opacity = '0'; setTimeout(() => title.remove(), 1000); }, 1000);
        }

        function getSafeEdgeSpawnPoint(radius) {
            let x, y;
            let attempts = 0;
            const safeDist = 800; // Minimum safe distance from player
            do {
                if (Math.random() < 0.5) {
                    x = Math.random() < 0.5 ? 0 - radius : world.width + radius;
                    y = Math.random() * world.height;
                } else {
                    x = Math.random() * world.width;
                    y = Math.random() < 0.5 ? 0 - radius : world.height + radius;
                }
                attempts++;
            } while (Math.hypot(player.x - x, player.y - y) < safeDist && attempts < 20);
            return { x, y };
        }

        function spawnEnemies(dt) {
            // Boss Level Logic
            if (level % 3 === 0) {
                if (!bossSpawned) {
                    let type = 'sapphire';
                    if (level === 6) type = 'ruby';
                    if (level === 9) type = 'emerald';
                    if (level > 9) type = ['sapphire', 'ruby', 'emerald'][Math.floor(Math.random() * 3)];
                    
                    currentBossType = type;
                    bossEncounterCounts[type]++;

                    const boss = new Enemy(canvas.width/2, -100, type);
                    boss.y = 100; // Move into view
                    
                    // Scale boss stats based on the number of times it has been encountered
                    const encounters = bossEncounterCounts[type];
                    boss.maxHp += (encounters - 1) * 50; // Add 50 HP per encounter
                    boss.hp = boss.maxHp;
                    boss.speed += (encounters - 1) * 0.3; // Make them noticeably faster

                    enemies.push(boss);
                    bossSpawned = true;
                }

                // Handle Boss Minion Cap & Spawning
                const encounters = bossEncounterCounts[currentBossType] || 1;
                const bossEnemyCap = 5 + (encounters * 5); // Enemy cap ramps up each encounter
                
                const bossAlive = enemies.some(e => ['sapphire', 'ruby', 'emerald'].includes(e.type));
                if (bossAlive && enemies.length < bossEnemyCap) {
                    spawnTimer += dt;
                    if (spawnTimer > 1.0) { // Spawn 1 minion every second during the fight
                        spawnTimer = 0;
                        const radius = 30;
                        const pos = getSafeEdgeSpawnPoint(radius);
                        const types = ['grunt', 'weaver', 'spinner'];
                        enemies.push(new Enemy(pos.x, pos.y, types[Math.floor(Math.random() * types.length)]));
                    }
                }

                return; // Boss handles spawning
            }
            
            let currentHexCount = enemies.filter(e => e.type === 'hex-dodger').length;
            const maxHexCount = 1 + level;

            // --- Guaranteed Hex-Dodger Spawns ---
            if (hexSpawnsTriggered < hexSpawnTimers.length && levelFrame >= hexSpawnTimers[hexSpawnsTriggered]) {
                if (currentHexCount < maxHexCount) {
                    const radius = 30;
                    const pos = getSafeEdgeSpawnPoint(radius);
                    enemies.push(new Enemy(pos.x, pos.y, 'hex-dodger'));
                    enemiesRemainingToSpawn--;
                    currentHexCount++;
                }
                hexSpawnsTriggered++;
            }

            spawnTimer += dt;
            cornerSpawnTimer += dt;

            // Only attempt to spawn on a timer to avoid spawning every frame
            if (spawnTimer < 0.5) return; // Try to spawn every 0.5 seconds
            spawnTimer = 0; // Reset timer

            // Quota Check
            if (enemiesRemainingToSpawn <= 0) return;

            // Enemy Cap Logic: Scales from ~40 (Level 1) to ~130 (Level 10+)
            // This prevents overcrowding while allowing death spawns (Splitters) to exceed the limit.
            const enemyCap = 30 + (level * 10);
            if (enemies.length >= enemyCap) return;

            const radius = 30;

            // Every 5 seconds, trigger a corner spawn event
            if (cornerSpawnTimer > 5.0) {
                cornerSpawnTimer = 0; // Reset corner spawn timer
                const corners = [
                    { x: -radius, y: -radius }, // Top-Left
                    { x: world.width + radius, y: -radius }, // Top-Right
                    { x: -radius, y: world.height + radius }, // Bottom-Left
                    { x: world.width + radius, y: world.height + radius } // Bottom-Right
                ];

                corners.forEach(corner => {
                    if (Math.hypot(player.x - corner.x, player.y - corner.y) < 800) return; // Skip spawning in this corner if too close

                    // Spawn a group of enemies at each corner. Group size increases with score.
                    const groupSize = 2 + Math.floor(score / 10000);
                    for (let i = 0; i < groupSize; i++) {
                        const spawnX = corner.x + (Math.random() - 0.5) * 100;
                        const spawnY = corner.y + (Math.random() - 0.5) * 100;
                        // For corner waves, use simpler enemies
                        const enemyType = Math.random() < 0.4 ? 'weaver' : 'grunt';
                        enemies.push(new Enemy(spawnX, spawnY, enemyType));
                        enemiesRemainingToSpawn--;
                    }
                });
                return; // Skip the regular edge spawn on this frame
            }

            // --- Regular Edge Spawn ---
            const pos = getSafeEdgeSpawnPoint(radius);
            let x = pos.x;
            let y = pos.y;

            // Decide which enemy type to spawn
            const rand = Math.random();
            let enemyType;

            if (rand < 0.05 && frame > 600) { // Spawn snake after 10 seconds
                const head = new Enemy(x, y, 'snake-head');
                let lastSegment = head;
                for (let i = 0; i < 8; i++) { // 8 body segments
                    const segment = new Enemy(x, y, 'snake-body');
                    segment.leader = lastSegment;
                    segment.radius = head.radius * 0.8;
                    head.segments.push(segment);
                    enemies.push(segment);
                    lastSegment = segment;
                }
                enemies.push(head);
                enemiesRemainingToSpawn -= 9;
                return; // Exit after spawning snake
            } else if (rand < 0.12) { // Mayfly Swarm
                for (let i = 0; i < 12; i++) {
                    const mx = x + (Math.random() - 0.5) * 60;
                    const my = y + (Math.random() - 0.5) * 60;
                    enemies.push(new Enemy(mx, my, 'mayfly'));
                }
                enemiesRemainingToSpawn -= 12;
                return;
            } else if (rand < 0.20) enemyType = 'repulsor';
            else if (rand < 0.28) enemyType = 'gravity-well';
            else if (rand < 0.35) enemyType = 'dog-bone-bomb';
            else if (rand < 0.50) enemyType = (currentHexCount < maxHexCount) ? 'hex-dodger' : 'spinner'; // Increased spawn chance
            else if (rand < 0.60) enemyType = 'spinner';
            else if (rand < 0.75) enemyType = 'weaver';
            else enemyType = 'grunt';

            enemies.push(new Enemy(x, y, enemyType));
            enemiesRemainingToSpawn--;
        }

        function useBomb() {
            if (bombs <= 0 || !gameActive || bombEffect.active) return;

            bombs--;
            bombsEl.innerHTML = bombs;
            sounds.bomb();
            if (grid) grid.applyForce(player.x, player.y, 4000, 250); // Massive grid warp

            // Trigger visual effect. The actual destruction is handled
            // by the growing circle in the animate() loop.
            bombEffect.active = true;
            bombEffect.radius = 0;
            bombEffect.alpha = 1;
            bombEffect.x = player.x;
            bombEffect.y = player.y;
        }

        function triggerDeathBomb() {
            sounds.bomb();
            if (grid) grid.applyForce(player.x, player.y, 4000, 250); // Massive grid warp

            bombEffect.active = true;
            bombEffect.radius = 0;
            bombEffect.alpha = 1;
            bombEffect.isDeathBomb = true;
            bombEffect.respawnQueue = [];
            bombEffect.x = player.x;
            bombEffect.y = player.y;
        }

        function createExplosion(x, y, color) {
            sounds.explode();
            if (grid) grid.applyForce(x, y, 150, 12);
            for (let i = 0; i < 15; i++) {
                particles.push(particlePool.get().init(x, y, color));
            }
        }

        function togglePause() {

           
            isPaused = !isPaused;

            if (isPaused) {
                // Pause the game
                cancelAnimationFrame(animationId);
                pauseMenu.classList.remove('hidden');
                canvas.classList.add('blurred-bg');
                // Stop music scheduler
               const player = document.getElementById('bg-music');
                if (player) player.pause();
            } else {
                // Resume the game
                pauseMenu.classList.add('hidden');
                canvas.classList.remove('blurred-bg');
                lastTime = performance.now(); // Prevents large dt jump
                if (musicPlaying) {
                    sounds.startMusic(); // Restart music scheduler
                }
                animate();
            }
        }

        function resetGame() {
            score = 0;
            scoreStreak = 0;
            lives = 3;
            nextLifeThreshold = 15000;
            bombs = 3;
            nextBombThreshold = 30000;
            scoreEl.innerHTML = score;
            livesEl.innerHTML = lives;
            bombsEl.innerHTML = bombs;
            updateBoostUI();
            level = 1;
            levelFrame = 0;
            hexSpawnsTriggered = 0;
            bossSpawned = false;
            currentBossType = null;
            bossEncounterCounts = { sapphire: 0, ruby: 0, emerald: 0 };
            spawnTimer = 0;
            cornerSpawnTimer = 0;
            waveMsg.classList.add('hidden');
            showLinesCheck.checked = false; debugShowLines = false;
            invincibleCheck.checked = false; debugInvincible = false;
            infiniteLivesCheck.checked = false; infiniteLives = false;
            levelEl.innerText = level;
            projectiles = [];
            enemies = [];
            particles = [];
            orbs = [];
            projectilePool = new Pool(Projectile, 200);
            particlePool = new Pool(Particle, 1000);
            grid = new Grid(world.width, world.height, 50);
            player = new Player(world.width / 2, world.height / 2);
            enemiesRemainingToSpawn = 150;
            bombEffect = { active: false, radius: 0, alpha: 0, isDeathBomb: false, respawnQueue: [], x: 0, y: 0 };
            miniBombEffects = [];
            gameActive = true;
            levelTransitioning = false;
            uiLayer.classList.remove('hidden');
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            canvas.classList.remove('blurred-bg');
            const musicPlayer = document.getElementById('bg-music');
            if (musicPlayer) musicPlayer.currentTime = 0; // Restart music from beginning

            sounds.startMusic();
            animate();
            showLevelTitle("LEVEL 1", "white");
        }

        function gameOver() {
            gameActive = false;
            uiLayer.classList.add('hidden');
            cancelAnimationFrame(animationId);
            gameOverScreen.classList.remove('hidden');
            canvas.classList.add('blurred-bg');
            gameOverScore.innerText = `Final Score: ${score}`;
            const player = document.getElementById('bg-music');
            if (player) player.pause();
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('geoWarsHighScore', highScore);
                highScoreEl.innerHTML = highScore;
            }
            pollGamepadsForStart();
        }

        function animate() {
            if (!gameActive) return;
            animationId = requestAnimationFrame(animate);
            
            const now = performance.now();
            // Calculate delta time (dt) for frame-rate independent physics
            // Cap dt to prevent huge jumps after pausing or lag spikes
            const dt = Math.min(0.05, (now - lastTimeForDt) / 1000);
            lastTimeForDt = now;
            // Convert mouse screen coordinates to world coordinates
            mouse.x = (mouse.screenX - canvas.width / 2) / camera.zoom + camera.x;
            mouse.y = (mouse.screenY - canvas.height / 2) / camera.zoom + camera.y;

            // --- GAME LOGIC & UPDATES ---

            // Camera update (smooth follow)
            if (player.alive) {
                camera.x += (player.x - camera.x) * camera.lerpFactor;
                camera.y += (player.y - camera.y) * camera.lerpFactor;
            }

            // State updates
            frame++;
            levelFrame += dt; // Use dt for level timer

            // Level Progression Logic
            if (level % 3 !== 0) { // Non-boss levels
                if (enemiesRemainingToSpawn <= 0) {
                    if (enemies.length === 0 && !bombEffect.isDeathBomb) {
                        transitionToNextLevel();
                    } else {
                        waveMsg.innerText = `ENEMIES REMAINING: ${enemies.length}`;
                        waveMsg.classList.remove('hidden');

                        // Morph the last N enemies into Hex-Dodgers
                        const currentMorphHexCount = enemies.filter(e => e.type === 'hex-dodger').length;
                        const maxMorphHexCount = 1 + level;
                        let morphsAllowed = maxMorphHexCount - currentMorphHexCount;

                        const morphCount = level * 2;
                        if (enemies.length <= morphCount) {
                            enemies.forEach(enemy => {
                                if (morphsAllowed > 0 && enemy.type !== 'hex-dodger' && enemy.type !== 'hex-yoyo' && enemy.type !== 'gravity-well' && enemy.type !== 'super-gravity-well' && !enemy.markedForDeletion) {
                                    enemy.type = 'hex-dodger';
                                    enemy.radius = 22.5;
                                    enemy.color = '#008080';
                                    enemy.speed = 3.6;
                                    enemy.hp = 10;
                                    enemy.angry = false;
                                    enemy.dodgeCooldown = 0;
                                    enemy.missileCooldown = 0;
                                    enemy.yoyoOut = false;
                                    createExplosion(enemy.x, enemy.y, '#008080'); // Burst of teal particles
                                    morphsAllowed--;
                                }
                            });
                        }
                    }
                }
            } else { // Boss Level Failsafe
                if (bossSpawned && enemies.length === 0 && !bombEffect.isDeathBomb) {
                    transitionToNextLevel();
                }
            }

            // Update all game objects
            player.update(dt, now);
            orbs.forEach(orb => orb.update(dt));
            particles.forEach(p => p.update(dt));
            projectiles.forEach(projectile => {
                projectile.update(dt);
                // Remove off-screen projectiles (check against world boundaries)
                if (projectile.x + projectile.radius < 0 ||
                    projectile.x - projectile.radius > world.width ||
                    projectile.y + projectile.radius < 0 ||
                    projectile.y - projectile.radius > world.height) {
                    projectile.markedForDeletion = true;
                }
            });
            enemies.forEach(enemy => enemy.update(dt));

            // Hex-Dodger Morph Mechanic
            const currentPassiveHexCount = enemies.filter(e => e.type === 'hex-dodger').length;
            const maxPassiveHexCount = 1 + level;
            
            if (currentPassiveHexCount < maxPassiveHexCount) {
                for (let i = 0; i < enemies.length; i++) {
                    const enemy = enemies[i];
                    if (['grunt', 'weaver', 'spinner'].includes(enemy.type) && !enemy.markedForDeletion) {
                        // 5% chance per second per eligible enemy to morph into a Hex-Dodger
                        if (Math.random() < 0.05 * dt) {
                            enemy.type = 'hex-dodger';
                            enemy.radius = 22.5;
                            enemy.color = '#008080';
                            enemy.speed = 3.6;
                            enemy.hp = 10;
                            enemy.angry = false;
                            enemy.dodgeCooldown = 0;
                            enemy.missileCooldown = 0;
                            createExplosion(enemy.x, enemy.y, '#008080'); // Burst of teal particles
                            break; // Only morph one at a time
                        }
                    }
                }
            }

            // Mini Bomb Effects Logic
            miniBombEffects.forEach(mb => {
                mb.radius += 1500 * dt;
                mb.alpha -= 2.0 * dt;

                enemies.forEach(e => {
                    if (!e.markedForDeletion && !['sapphire', 'ruby', 'emerald', 'super-gravity-well', 'gravity-well'].includes(e.type)) {
                        const distSq = (mb.x - e.x)**2 + (mb.y - e.y)**2;
                        if (distSq < (mb.radius + e.radius)**2) {
                            e.markedForDeletion = true;
                            createExplosion(e.x, e.y, e.color);
                            addScore(100);
                            
                            if (e.type === 'spinner') {
                                for(let i=0; i<3; i++) enemies.push(new Enemy(e.x, e.y, 'spinner-mini'));
                            } else if (e.type === 'mini-titan') {
                                for(let i=0; i<4; i++) enemies.push(new Enemy(e.x, e.y, 'grunt'));
                            } else if (e.type === 'snake-head') {
                                e.segments.forEach(seg => {
                                    seg.leader = null;
                                    seg.scattered = true;
                                    seg.hp = 1;
                                    seg.speed = 6.0;
                                    const explodeAngle = Math.random() * Math.PI * 2;
                                    seg.velocity.x = Math.cos(explodeAngle);
                                    seg.velocity.y = Math.sin(explodeAngle);
                                });
                            } else if (e.type !== 'hex-yoyo' && e.type !== 'dog-bone-bomb') {
                                orbs.push(new Orb(e.x, e.y));
                            }
                        }
                    }
                });
            });
            miniBombEffects = miniBombEffects.filter(mb => mb.alpha > 0);

            // Collision detection & other logic
            // Bomb Effect Logic
            if (bombEffect.active) {
                bombEffect.radius += 3000 * dt; // 50 * 60
                bombEffect.alpha -= 1.2 * dt;   // 0.02 * 60

                if (bombEffect.alpha <= 0) {
                    bombEffect.active = false;
                    if (bombEffect.isDeathBomb && bombEffect.respawnQueue) {
                        // Dump all captured enemies back onto the edges of the board
                        bombEffect.respawnQueue.forEach(type => {
                            const radius = 30;
                            const pos = getSafeEdgeSpawnPoint(radius);
                            let x = pos.x;
                            let y = pos.y;
                            
                            if (type === 'snake-head') {
                                const head = new Enemy(x, y, 'snake-head');
                                let lastSegment = head;
                                for (let i = 0; i < 8; i++) {
                                    const segment = new Enemy(x, y, 'snake-body');
                                    segment.leader = lastSegment;
                                    segment.radius = head.radius * 0.8;
                                    head.segments.push(segment);
                                    enemies.push(segment);
                                    lastSegment = segment;
                                }
                                enemies.push(head);
                            } else if (type === 'snake-body' || type === 'hex-yoyo') {
                                // Ignore fragments, they are handled by their reconstructed parents
                            } else {
                                enemies.push(new Enemy(x, y, type));
                                if (type === 'super-gravity-well') sounds.superGravityWell();
                            }
                        });
                        bombEffect.respawnQueue = [];
                        bombEffect.isDeathBomb = false;
                    }
                } else {
                    // Check for enemy hits
                    enemies.forEach(enemy => { // Using squared distance is faster
                        const distSq = (bombEffect.x - enemy.x)**2 + (bombEffect.y - enemy.y)**2;
                        if (distSq < (bombEffect.radius + enemy.radius)**2) {
                            if (!enemy.markedForDeletion) {
                                // Bosses are immune to bombs
                                if (['sapphire', 'ruby', 'emerald'].includes(enemy.type)) return;

                                if (bombEffect.isDeathBomb) {
                                    if (enemy.type !== 'snake-body' && enemy.type !== 'hex-yoyo') {
                                        bombEffect.respawnQueue.push(enemy.type);
                                    }
                                } else {
                                    if (enemy.type === 'hex-yoyo') {
                                        if (enemy.owner) {
                                            enemy.owner.yoyoOut = false;
                                            enemy.owner.nextYoyoMode = 'around-the-world';
                                            enemy.owner.angry = true;
                                        }
                                    } else {
                                        orbs.push(new Orb(enemy.x, enemy.y));
                                        addScore(100); // Score for normal bomb kill
                                    }
                                }
                            enemy.markedForDeletion = true;
                            createExplosion(enemy.x, enemy.y, enemy.color);
                        }
                        }
                    });
                }
            }

            // Orb vs Player Collision
            orbs.forEach(orb => {
                if (player.alive) {
                    const distSq = (player.x - orb.x)**2 + (player.y - orb.y)**2;
                    if (distSq < (player.radius + orb.radius)**2) {
                        orb.markedForDeletion = true;
                        addScore(25);
                        sounds.collect();
                    }
                }
            });

            // Projectile vs Enemy & Enemy vs Player Collisions
            enemies.forEach((enemy, index) => {
                // Collision: Projectile vs Enemy
                projectiles.forEach((projectile, pIndex) => {
                    const combinedRadius = enemy.radius + projectile.radius;
                    // Optimization: Broad-phase bounding box check
                    if (Math.abs(projectile.x - enemy.x) > combinedRadius + 5 ||
                        Math.abs(projectile.y - enemy.y) > combinedRadius + 5) return;

                   
                    // Optimization: Narrow-phase circle collision using squared distance (avoids sqrt)
                    const dx = projectile.x - enemy.x;
                    const dy = projectile.y - enemy.y;
                    const distSq = dx * dx + dy * dy;
                    if (distSq < combinedRadius * combinedRadius) {
                        if (enemy.markedForDeletion) return;

                        if (enemy.type === 'snake-body' && !enemy.scattered) return; // invulnerable

                        if (enemy.type === 'dog-bone-bomb') {
                            projectile.markedForDeletion = true;
                            createExplosion(projectile.x, projectile.y, '#ffaa00');
                            return; // Invulnerable to shots, must be triggered physically
                        }

                        // Emerald Deflection (Phase 3)
                        if (enemy.type === 'emerald' && enemy.hp < enemy.maxHp * 0.33) {
                            if (Math.random() < 0.5) {
                                createExplosion(projectile.x, projectile.y, '#fff'); // Spark
                                projectile.markedForDeletion = true;
                                return;
                            }
                        }

                        // Hit!
                        createExplosion(enemy.x, enemy.y, enemy.color);
                        
                        enemy.hp--;
                        projectile.markedForDeletion = true;

                        // Spawn orb BEFORE checking for boss type
                        if (enemy.hp <= 0 && !['sapphire', 'ruby', 'emerald', 'hex-yoyo'].includes(enemy.type)) {
                            orbs.push(new Orb(enemy.x, enemy.y));
                       }

                        if (enemy.hp <= 0) {
                            enemy.markedForDeletion = true;
                            
                            if (enemy.type === 'hex-yoyo') {
                                if (enemy.owner && !enemy.owner.markedForDeletion) {
                                    enemy.owner.yoyoOut = false;
                                    enemy.owner.nextYoyoMode = 'around-the-world';
                                    enemy.owner.missileCooldown = 0.5; // Fast respawn
                                    enemy.owner.angry = true;
                                }
                                return; // skip other death logic
                            }

                            // Increase Score
                            const points = (['gravity-well', 'super-gravity-well'].includes(enemy.type) ? 500 : 100);
                            addScore(points);

                            // Death Spawns
                            if (enemy.type === 'spinner') {
                                for(let i=0; i<3; i++) {
                                    enemies.push(new Enemy(enemy.x, enemy.y, 'spinner-mini'));
                                }
                            } else if (enemy.type === 'mini-titan') {
                                for(let i=0; i<4; i++) {
                                    enemies.push(new Enemy(enemy.x, enemy.y, 'grunt'));
                                }
                            } else if (['sapphire', 'ruby', 'emerald'].includes(enemy.type)) {
                                // Boss Defeated
                                for (let i = 0; i < 50; i++) { // Shower of orbs
                                    orbs.push(new Orb(enemy.x + (Math.random() - 0.5) * 50, enemy.y + (Math.random() - 0.5) * 50));
                                }
                                addScore(5000);
                                
                                // Spawn a ramping cluster of aggressive Hex-Dodgers
                                const encounters = bossEncounterCounts[enemy.type] || 1;
                                const hexCount = 2 + (encounters * 2); 
                                for (let i = 0; i < hexCount; i++) {
                                    let hex = new Enemy(enemy.x + (Math.random() - 0.5) * 100, enemy.y + (Math.random() - 0.5) * 100, 'hex-dodger');
                                    hex.angry = true;
                                    enemies.push(hex);
                                }
                            } else if (enemy.type === 'snake-head') {
                                addScore(1000);
                                // When the head dies, its segments break off and bounce around
                                enemy.segments.forEach(seg => {
                                    seg.leader = null;
                                    seg.scattered = true;
                                    seg.hp = 1;
                                    seg.speed = 6.0; // Fast bounce
                                    const explodeAngle = Math.random() * Math.PI * 2;
                                    seg.velocity.x = Math.cos(explodeAngle);
                                    seg.velocity.y = Math.sin(explodeAngle);
                                });
                            } else if (enemy.type === 'gravity-well') {
                                enemies.push(new Enemy(enemy.x, enemy.y, 'super-gravity-well'));
                            } else if (enemy.type === 'super-gravity-well') {
                                if (grid) grid.applyForce(enemy.x, enemy.y, 1500, 50); // Massive outward explosion wave
                                createExplosion(enemy.x, enemy.y, '#ffffff');
                            }
                        }
                    }
                });

                // Gravity Well Absorption Logic
                if (enemy.type === 'gravity-well' || enemy.type === 'super-gravity-well') {
                    enemies.forEach((other, otherIndex) => {
                        const isAbsorbable = other !== enemy && !['super-gravity-well', 'proton', 'hex-yoyo'].includes(other.type) && !(enemy.type === 'gravity-well' && other.type === 'gravity-well');
                        if (isAbsorbable) { // Using squared distance is faster
                            const combinedRadius = enemy.radius + other.radius;
                            if (Math.abs(enemy.x - other.x) > combinedRadius + 5 ||
                                Math.abs(enemy.y - other.y) > combinedRadius + 5) return;

                            const distSq = (enemy.x - other.x)**2 + (enemy.y - other.y)**2;
                            if (distSq < combinedRadius * combinedRadius) {
                                // Absorb
                                createExplosion(other.x, other.y, enemy.color);
                                other.markedForDeletion = true;
                                
                                enemy.absorbed++;

                                if (enemy.type === 'super-gravity-well') {
                                    addScore(50);
                                    if (enemy.absorbed >= 10) { // Overload
                                        enemy.hp = 0;
                                        enemy.markedForDeletion = true;
                                        addScore(500);
                                        createExplosion(enemy.x, enemy.y, enemy.color);
                                        if (grid) grid.applyForce(enemy.x, enemy.y, 1500, 50);
                                    }
                                } else {
                                    // Overload
                                    if (enemy.absorbed >= 5) {
                                        enemy.hp = 0; 
                                        for (let i = 0; i < 5; i++) { // Drop 5 orbs
                                            orbs.push(new Orb(enemy.x, enemy.y));
                                        }
                                        enemy.markedForDeletion = true;
                                        addScore(250);
                                        sounds.explode();
                                        createExplosion(enemy.x, enemy.y, enemy.color);
                                        enemies.push(new Enemy(enemy.x, enemy.y, 'super-gravity-well'));
                                    }
                                }
                            }
                        }
                    });
                }

                // Collision: Enemy vs Player
                if (player.alive && !debugInvincible) { // Using squared distance is faster
                    let combinedRadius = player.radius + enemy.radius;
                    let isShieldHit = false;
                    
                    if (player.shieldTimeRemaining > 0) {
                        combinedRadius = player.radius + 15 + enemy.radius;
                        isShieldHit = true;
                    }
                    
                    const distSq = (player.x - enemy.x)**2 + (player.y - enemy.y)**2;
                    if (distSq < combinedRadius * combinedRadius) {
                        if (enemy.type === 'dog-bone-bomb') {
                            enemy.markedForDeletion = true;
                            createExplosion(enemy.x, enemy.y, '#ffaa00');
                            sounds.bomb(); 
                            if (grid) grid.applyForce(player.x, player.y, 1000, 100);
                            // Spawn expanding mini-bomb
                            miniBombEffects.push({ x: enemy.x, y: enemy.y, radius: 0, alpha: 1 });
                        } else if (isShieldHit) {
                            if (!enemy.markedForDeletion && !['sapphire', 'ruby', 'emerald'].includes(enemy.type)) {
                                enemy.markedForDeletion = true;
                                createExplosion(enemy.x, enemy.y, enemy.color);
                                
                                const points = (['gravity-well', 'super-gravity-well'].includes(enemy.type) ? 500 : 100);
                                addScore(points);
                                
                                if (enemy.type !== 'hex-yoyo' && enemy.type !== 'super-gravity-well') {
                                    orbs.push(new Orb(enemy.x, enemy.y));
                                }

                                if (enemy.type === 'spinner') {
                                    for(let i=0; i<3; i++) {
                                        enemies.push(new Enemy(enemy.x, enemy.y, 'spinner-mini'));
                                    }
                                } else if (enemy.type === 'mini-titan') {
                                    for(let i=0; i<4; i++) {
                                        enemies.push(new Enemy(enemy.x, enemy.y, 'grunt'));
                                    }
                                } else if (enemy.type === 'snake-head') {
                                    enemy.segments.forEach(seg => {
                                        seg.leader = null;
                                        seg.scattered = true;
                                        seg.hp = 1;
                                        seg.speed = 6.0;
                                        const explodeAngle = Math.random() * Math.PI * 2;
                                        seg.velocity.x = Math.cos(explodeAngle);
                                        seg.velocity.y = Math.sin(explodeAngle);
                                    });
                                } else if (enemy.type === 'gravity-well') {
                                    enemies.push(new Enemy(enemy.x, enemy.y, 'super-gravity-well'));
                                } else if (enemy.type === 'super-gravity-well') {
                                    if (grid) grid.applyForce(enemy.x, enemy.y, 1500, 50); // Massive outward explosion wave
                                    createExplosion(enemy.x, enemy.y, '#ffffff');
                                } else if (enemy.type === 'hex-yoyo') {
                                    if (enemy.owner && !enemy.owner.markedForDeletion) {
                                        enemy.owner.yoyoOut = false;
                                        enemy.owner.nextYoyoMode = 'around-the-world';
                                        enemy.owner.missileCooldown = 0.5; // Fast respawn
                                        enemy.owner.angry = true;
                                    }
                                }
                            }
                        } else if (!player.invulnerable) {
                            // Player Hit
                            createExplosion(player.x, player.y, player.color);
                            if (!infiniteLives) {
                               lives--;
                                livesEl.innerHTML = lives;
                                scoreStreak = 0;
                                updateBoostUI();
                            }
                            
                            // Kill enemy that hit player
                            if (enemy.type !== 'super-gravity-well') {
                                enemy.markedForDeletion = true;
                                if (enemy.type === 'snake-head') {
                                    enemy.segments.forEach(seg => {
                                        seg.leader = null;
                                        seg.scattered = true;
                                        seg.hp = 1;
                                        seg.speed = 6.0;
                                        const explodeAngle = Math.random() * Math.PI * 2;
                                        seg.velocity.x = Math.cos(explodeAngle);
                                        seg.velocity.y = Math.sin(explodeAngle);
                                    });
                                }
                            }
                            if (enemy.type !== 'hex-yoyo' && enemy.type !== 'super-gravity-well') {
                                orbs.push(new Orb(enemy.x, enemy.y));
                            } else if (enemy.type === 'hex-yoyo') {
                                if (enemy.owner) {
                                    enemy.owner.yoyoOut = false;
                                    enemy.owner.nextYoyoMode = 'around-the-world';
                                    enemy.owner.angry = true;
                                }
                            }

                            if (['sapphire', 'ruby', 'emerald'].includes(enemy.type)) {
                                for (let i = 0; i < 50; i++) { // Shower of orbs
                                    orbs.push(new Orb(enemy.x + (Math.random() - 0.5) * 50, enemy.y + (Math.random() - 0.5) * 50));
                                }
                                addScore(5000);
                                
                                const encounters = bossEncounterCounts[enemy.type] || 1;
                                const hexCount = 2 + (encounters * 2);
                                for (let i = 0; i < hexCount; i++) {
                                    let hex = new Enemy(enemy.x + (Math.random() - 0.5) * 100, enemy.y + (Math.random() - 0.5) * 100, 'hex-dodger');
                                    hex.angry = true;
                                    enemies.push(hex);
                                }
                            }

                            triggerDeathBomb();

                            if (lives <= 0 && !infiniteLives) {
                                player.alive = false;
                                setTimeout(gameOver, 1000); // Wait a second to see explosion
                            } else {
                                player.alive = false;
                                player.beginRespawnBlinking(1000);
                            }
                        }
                    }
                }
            });

           
            // Cleanup marked objects
            for (let i = enemies.length - 1; i >= 0; i--) {
                if (enemies[i].markedForDeletion) {
                    enemies.splice(i, 1);
                }
            }
            for (let i = projectiles.length - 1; i >= 0; i--) {
                if (projectiles[i].markedForDeletion) {
                    projectilePool.release(projectiles[i]);
                    projectiles.splice(i, 1);
                }
            }
            for (let i = particles.length - 1; i >= 0; i--) {
                if (particles[i].markedForDeletion) {
                    particlePool.release(particles[i]);
                    particles.splice(i, 1);
                }
            }
            for (let i = orbs.length - 1; i >= 0; i--) {
                if (orbs[i].markedForDeletion) orbs.splice(i, 1);
            }

            // Spawning
            spawnEnemies(dt);

            // --- RENDER ---

            // Clear Canvas with fade effect for trails
            ctx.fillStyle = 'rgba(5, 5, 5, 0.3)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
           
            // Apply camera transformations
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.scale(camera.zoom, camera.zoom);
            ctx.translate(-camera.x, -camera.y);

            // Calculate view bounds for culling
            const view = {
                x: camera.x - (canvas.width / 2 / camera.zoom),
                y: camera.y - (canvas.height / 2 / camera.zoom),
                width: canvas.width / camera.zoom,
                height: canvas.height / camera.zoom,
                buffer: 100 // Render objects 100px outside the view
            };

            // Update and Draw Grid (Grid update is visual, can be done here)
            if (grid) {
                if (player.alive) grid.applyForce(player.x, player.y, 80, 1.5);
               enemies.forEach(e => grid.applyForce(e.x, e.y, e.radius * 2, 0.5));
                grid.update();
                grid.draw(ctx, view);
            }

            // Draw Bomb Effect
            if (bombEffect.active) {
                ctx.save();
                ctx.beginPath();
                ctx.arc(bombEffect.x, bombEffect.y, bombEffect.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(255, 255, 255, ${bombEffect.alpha})`;
                ctx.lineWidth = 10;
                ctx.stroke();
                ctx.restore();
            }

            // Draw Mini Bomb Effects
            miniBombEffects.forEach(mb => {
                ctx.save();
                ctx.beginPath();
                ctx.arc(mb.x, mb.y, mb.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(255, 170, 0, ${Math.max(0, mb.alpha)})`;
                ctx.lineWidth = 6;
                ctx.stroke();
                ctx.fillStyle = `rgba(255, 170, 0, ${Math.max(0, mb.alpha * 0.2)})`; // Light fill
                ctx.fill();
                ctx.restore();
            });

            // Draw Debug Lines
            if (debugShowLines) {
                ctx.save();
               ctx.strokeStyle = 'rgba(255, 0, 0, 0.5)';
                ctx.lineWidth = 1;
                enemies.forEach(e => {
                    ctx.beginPath();
                    ctx.moveTo(player.x, player.y);
                    ctx.lineTo(e.x, e.y);
                    ctx.stroke();
                });
                ctx.restore();
            }

            // Draw all other game objects
            orbs.forEach(o => o.draw(ctx, view));
            enemies.forEach(e => e.draw(ctx, view));

            // Set fillStyle once for projectiles
            ctx.fillStyle = '#ffff00';
            projectiles.forEach(p => p.draw(ctx, view));

            // Particles are special, they set globalAlpha
            particles.forEach(p => p.draw(ctx, view));
            ctx.globalAlpha = 1; // Reset alpha

            player.draw(ctx); // Player doesn't need culling

            // Restore context to pre-camera state for UI drawing
            ctx.restore();

            // UI updates (FPS counter etc)
            fpsFrames++;
            if (now - lastTime >= 1000) {
                fpsCounterEl.innerText = `FPS: ${fpsFrames}`;
                fpsFrames = 0;
                lastTime = now;
            }
            enemiesAliveCounterEl.innerText = `Enemies Alive: ${enemies.length}`;
        }

        function pollGamepadsForStart() {
            if (gameActive) return;
            
            const gamepads = navigator.getGamepads();
            for (const gp of gamepads) {
                if (gp && gp.buttons.some(b => b.pressed)) {
                    if (audioCtx.state === 'suspended') audioCtx.resume();
                    if (!startScreen.classList.contains('hidden') || !gameOverScreen.classList.contains('hidden')) {
                        resetGame();
                        return;
                    }
                }
            }
            requestAnimationFrame(pollGamepadsForStart);
        }

        // --- Mobile Controls Initialization & Logic ---
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        const mobileControlsContainer = document.getElementById('mobile-controls');
        if (isMobile && mobileControlsContainer) {
            mobileControlsContainer.classList.remove('hidden');
            document.getElementById('controls-hint').innerText = "Use thumbsticks to Move/Shoot | Tap Start to Pause";
        }

        function setupJoystick(zoneId, stickName, knobId) {
            const zone = document.getElementById(zoneId);
            const knob = document.getElementById(knobId);
            if (!zone || !knob) return;
            
            const maxDist = 45; // Max radius the visual knob is allowed to move

            const handleTouch = (e) => {
                e.preventDefault();
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const touch = e.changedTouches[i];
                    if (!virtualSticks[stickName].active || virtualSticks[stickName].id === touch.identifier) {
                        virtualSticks[stickName].active = true;
                        virtualSticks[stickName].id = touch.identifier;

                        const rect = zone.getBoundingClientRect();
                        const centerX = rect.left + rect.width / 2;
                        const centerY = rect.top + rect.height / 2;

                        let dx = touch.clientX - centerX;
                        let dy = touch.clientY - centerY;

                        const dist = Math.hypot(dx, dy);
                        if (dist > maxDist) {
                            dx = (dx / dist) * maxDist;
                            dy = (dy / dist) * maxDist;
                        }

                        knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                        virtualSticks[stickName].deltaX = dx / maxDist;
                        virtualSticks[stickName].deltaY = dy / maxDist;
                    }
                }
            };

            const handleEnd = (e) => {
                e.preventDefault();
                for (let i = 0; i < e.changedTouches.length; i++) {
                    if (virtualSticks[stickName].id === e.changedTouches[i].identifier) {
                        virtualSticks[stickName].active = false;
                        virtualSticks[stickName].id = null;
                        virtualSticks[stickName].deltaX = 0;
                        virtualSticks[stickName].deltaY = 0;
                        knob.style.transform = `translate(-50%, -50%)`;
                    }
                }
            };

            zone.addEventListener('touchstart', handleTouch, { passive: false });
            zone.addEventListener('touchmove', handleTouch, { passive: false });
            zone.addEventListener('touchend', handleEnd, { passive: false });
            zone.addEventListener('touchcancel', handleEnd, { passive: false });
        }

        setupJoystick('left-joystick', 'left', 'left-knob');
        setupJoystick('right-joystick', 'right', 'right-knob');

        const mobileStartPauseBtn = document.getElementById('mobile-start-btn');
        if (mobileStartPauseBtn) {
            mobileStartPauseBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                
                if (gameActive) {
                    togglePause();
                } else if (!gameOverScreen.classList.contains('hidden') || !startScreen.classList.contains('hidden')) {
                    resetGame(); // Triggers start from the initial screen or game over screen
                }
            }, { passive: false });
        }

        const mobileBombActionBtn = document.getElementById('mobile-bomb-btn');
        if (mobileBombActionBtn) {
            mobileBombActionBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                useBomb();
            }, { passive: false });
        }

        startBtn.addEventListener('click', () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            resetGame();
        });

        retryBtn.addEventListener('click', () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            resetGame();
        });

        pollGamepadsForStart();

        function pollGamepadsForPause() {
            if (gamepadIndex !== null) {
               const gp = navigator.getGamepads()[gamepadIndex];
                if (gp && gp.buttons[9] && gp.buttons[9].pressed) {
                    if (!startButtonPressed) {
                        if (gameActive && (isPaused || frame > 10)) togglePause();
                        startButtonPressed = true;
                    }
                } else {
                    startButtonPressed = false;
                }
            }
            requestAnimationFrame(pollGamepadsForPause);
        }
        pollGamepadsForPause();
    </script>
</body>

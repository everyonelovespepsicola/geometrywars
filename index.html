<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometry Wars</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505; /* Deep black */
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }

        canvas {
            display: block;
            transition: filter 0.3s ease;
        }

        .blurred-bg {
            filter: blur(8px) brightness(0.8);
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none; /* Let clicks pass through to canvas */
            text-shadow: 0 0 10px #fff;
        }

        .hud-text {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        #start-screen,
        #game-over-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 100;
        }

        button {
            background: transparent;
            color: cyan;
            border: none;
            padding: 10px 20px;
            font-family: inherit;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
        }

        button:hover {
            background: cyan;
            color: black;
        }

        .hidden {
            display: none !important;
        }
        
        #controls-hint {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
        }

        #pause-menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 20px;
            border-radius: 10px;
            z-index: 101;
            display: flex;
            flex-direction: column;
            gap: 15px;
            text-align: center;
            min-width: 250px;
        }

        #pause-menu h3 {
            margin: 0 0 10px 0;
            color: cyan;
            text-shadow: 0 0 10px cyan;
            font-size: 28px;
            text-transform: uppercase;
        }

        #pause-menu div {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        #fps-counter {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            pointer-events: none;
        }

        #enemies-alive-counter {
            position: absolute;
            bottom: 40px;
            right: 20px;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            pointer-events: none;
        }

        #wave-msg {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            color: #ff0055;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px #ff0055;
            pointer-events: none;
            text-transform: uppercase;
        }

        /* Mobile Controller Overlay */
        #mobile-controls {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 50; /* Sits below the start/pause screens but above the game */
        }
        .joystick-zone {
            position: absolute;
            bottom: 40px;
            width: 140px;
            height: 140px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(0, 255, 255, 0.2);
            border-radius: 50%;
            pointer-events: auto; /* Catch touch inputs */
            touch-action: none; /* Prevent browser scrolling */
        }
        #left-joystick { left: 40px; }
        #right-joystick { right: 40px; }
        .joystick-knob {
            position: absolute;
            top: 50%; left: 50%;
            width: 60px; height: 60px;
            background: rgba(0, 255, 255, 0.4);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            box-shadow: 0 0 15px cyan;
        }
        .mobile-btn {
            position: absolute;
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.6);
            color: cyan;
            border: 2px solid cyan;
            padding: 12px 20px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            touch-action: none;
            text-shadow: 0 0 5px cyan;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }
        #mobile-start-btn { top: 20px; right: 20px; }
        #mobile-bomb-btn { bottom: 200px; right: 40px; }
    </style>
</head>
<body>

    <!-- UI Overlay -->
    <div id="ui-layer" class="hidden">
        <div class="hud-text">SCORE: <span id="scoreEl">0</span></div>
        <div class="hud-text" style="color: #ffff00;">HIGH: <span id="highScoreEl">0</span></div>
        <div class="hud-text" style="color: #ff0055;">LIVES: <span id="livesEl">3</span></div>
        <div class="hud-text" style="color: #00ffaa;">LEVEL: <span id="levelEl">1</span></div>
        <div class="hud-text" style="color: #ffaa00;">BOMBS: <span id="bombsEl">3</span></div>
        <div class="hud-text" style="color: #00ffff;">BOOST: <span id="boostEl">0</span></div>
    </div>

    <div id="wave-msg" class="hidden"></div>

    <!-- Mobile Controls Overlay -->
    <div id="mobile-controls" class="hidden">
        <div id="mobile-start-btn" class="mobile-btn">START / PAUSE</div>
        <div id="mobile-bomb-btn" class="mobile-btn">BOMB</div>
        <div id="left-joystick" class="joystick-zone">
            <div id="left-knob" class="joystick-knob"></div>
        </div>
        <div id="right-joystick" class="joystick-zone">
            <div id="right-knob" class="joystick-knob"></div>
        </div>
    </div>

    <div id="controls-hint">WASD/Left Stick to Move | Click/Right Stick to Shoot | 'B'/RT for Bomb | 'F' for Fullscreen</div>
    <div id="fps-counter">FPS: 0</div>
    <div id="enemies-alive-counter">Enemies Alive: 0</div>

    <!-- Start / Game Over Screen -->
    <!-- MIDI Player Injection -->
    <audio id="bg-music" loop>
        <source src="track1.mp3" type="audio/mpeg">
    </audio>

    <div id="start-screen">
        <h1 style="margin:0;">GEOMETRY WARS</h1>
        <p id="final-score-msg" style="font-size: 14px; color: #aaa;">Defend the grid.</p>
        <button id="start-btn">Start Game</button>
    </div>

    <div id="game-over-screen" class="hidden">
        <h1 style="margin:0; color: #ff0055;">GAME OVER</h1>
        <p id="game-over-score" style="font-size: 18px; color: #aaa;">Score: 0</p>
        <button id="retry-btn">Retry</button>
    </div>

    <div id="pause-menu" class="hidden">
        <h3>Paused</h3>
        <button id="resume-btn">Resume</button>
        <hr style="border-color: cyan; width: 100%; opacity: 0.5;">
        <h4 style="margin: 0; color: #ffff00;">Debug Tools</h4>
        <div>
            <input type="checkbox" id="invincible-check">
            <label for="invincible-check">Invincible</label>
        </div>
        <div>
            <input type="checkbox" id="infinite-lives-check">
            <label for="infinite-lives-check">Infinite Lives</label>
        </div>
        <div>
            <input type="checkbox" id="show-lines-check">
            <label for="show-lines-check">Show Enemy Lines</label>
        </div>
        <button id="skip-level-btn">Skip Level</button>
    </div>

    <canvas id="gameCanvas" class="blurred-bg"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // --- AUDIO SYSTEM ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // Generate Noise Buffer for Explosions
        const noiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
        const noiseData = noiseBuffer.getChannelData(0);
        for (let i = 0; i < noiseBuffer.length; i++) {
            noiseData[i] = Math.random() * 2 - 1;
        }
        
        let lastExplodeTime = 0;
        let lastCollectTime = 0;
        let lastSgwTime = 0;

        const sounds = {
            shoot: () => {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                osc.type = 'triangle';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);

                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);

                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            },
            explode: () => {
                const now = performance.now();
                if (now - lastExplodeTime < 50) return; // Audio Throttle
                lastExplodeTime = now;
                
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const src = audioCtx.createBufferSource();
                src.buffer = noiseBuffer;
                const gain = audioCtx.createGain();
                const filter = audioCtx.createBiquadFilter();

                src.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);

                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(1000, audioCtx.currentTime);
                filter.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);

                gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);

                src.start();
                src.stop(audioCtx.currentTime + 0.3);
            },
            bomb: () => {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                
                // Massive Noise Explosion
                const src = audioCtx.createBufferSource();
                src.buffer = noiseBuffer;
                const gain = audioCtx.createGain();
                const filter = audioCtx.createBiquadFilter();

                src.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);

                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(2000, audioCtx.currentTime);
                filter.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 2.0);

                gain.gain.setValueAtTime(1.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2.0);

                src.start();
                src.stop(audioCtx.currentTime + 2.0);

                // Sub-bass boom
                const osc = audioCtx.createOscillator();
                const oscGain = audioCtx.createGain();
                osc.connect(oscGain);
                oscGain.connect(audioCtx.destination);

                osc.type = 'square';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 2.0);

                oscGain.gain.setValueAtTime(0.8, audioCtx.currentTime);
                oscGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2.0);

                osc.start();
                osc.stop(audioCtx.currentTime + 2.0);
            },
            superGravityWell: () => {
                const nowMs = performance.now();
                if (nowMs - lastSgwTime < 500) return; // Throttle to prevent overlap clipping
                lastSgwTime = nowMs;
                
                if (audioCtx.state === 'suspended') audioCtx.resume();
                
                // Deep ominous drone (Simple version)
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                const filter = audioCtx.createBiquadFilter();
                
                osc.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 4.0);
                
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(400, audioCtx.currentTime);
                filter.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 4.0);

                gain.gain.setValueAtTime(0, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 0.2); // Fade in
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 4.0); // Long fade out

                osc.start();
                osc.stop(audioCtx.currentTime + 4.0);
            },
            collect: () => {
                const now = performance.now();
                if (now - lastCollectTime < 25) return; // Audio Throttle
                lastCollectTime = now;

                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.05);

                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);

                osc.start();
                osc.stop(audioCtx.currentTime + 0.05);
            }
        };

        // --- MUSIC SYSTEM ---
        let musicPlaying = false;
        let musicSchedulerId = null;

        sounds.startMusic = () => {
            const player = document.getElementById('bg-music');
            if (player) {
                player.volume = 0.6;
                player.play().catch(e => console.error("Music failed:", e));
                musicPlaying = true;
            }
        };

        // UI Elements
        const uiLayer = document.getElementById('ui-layer');
        const scoreEl = document.getElementById('scoreEl');
        const highScoreEl = document.getElementById('highScoreEl');
        const livesEl = document.getElementById('livesEl');
        const levelEl = document.getElementById('levelEl');
        const startScreen = document.getElementById('start-screen');
        const bombsEl = document.getElementById('bombsEl');
        const boostEl = document.getElementById('boostEl');
        const startBtn = document.getElementById('start-btn');
        const finalScoreMsg = document.getElementById('final-score-msg');
        const pauseMenu = document.getElementById('pause-menu');
        const resumeBtn = document.getElementById('resume-btn');
        const invincibleCheck = document.getElementById('invincible-check');
        const infiniteLivesCheck = document.getElementById('infinite-lives-check');
        const showLinesCheck = document.getElementById('show-lines-check');
        const skipLevelBtn = document.getElementById('skip-level-btn');
        const fpsCounterEl = document.getElementById('fps-counter');
        const enemiesAliveCounterEl = document.getElementById('enemies-alive-counter');
        const waveMsg = document.getElementById('wave-msg');
        const gameOverScreen = document.getElementById('game-over-screen');
        const gameOverScore = document.getElementById('game-over-score');
        const retryBtn = document.getElementById('retry-btn');

        // Game State
        let animationId;
        let score = 0;
        let scoreStreak = 0;
        let highScore = localStorage.getItem('geoWarsHighScore') || 0;
        let lives = 3; 
        let bombs = 3;
        let gameActive = false;
        let isPaused = false;
        let frame = 0;
        let level = 1;
        let levelFrame = 0;
        let levelTransitioning = false;
        let bossSpawned = false;
        let currentBossType = null;
        let bossEncounterCounts = { sapphire: 0, ruby: 0, emerald: 0 };
        let debugInvincible = false;
        let infiniteLives = false;
        let debugShowLines = false;
        let lastTime = performance.now();
        let lastTimeForDt = performance.now();
        let fpsFrames = 0;
        let nextLifeThreshold = 15000;
        let nextBombThreshold = 30000;
        let bombEffect = { active: false, radius: 0, alpha: 0, isDeathBomb: false, respawnQueue: [], x: 0, y: 0 };
        let miniBombEffects = [];
        let hexSpawnTimers = [8, 16, 24]; // Times in seconds to guarantee a hex spawn
        let hexSpawnsTriggered = 0;
        let enemiesRemainingToSpawn = 0;
        let orbs = [];
        let projectilePool;
        let particlePool;
        let grid;

        // World and Camera
        const world = { width: 3000, height: 2000 };
        const camera = {
            x: world.width / 2,
            y: world.height / 2,
            zoom: 1.5,
            lerpFactor: 0.05 // Smoothing factor for camera movement
        };

        highScoreEl.innerHTML = highScore;

        // Resize Handling
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Input Handling
        const mouse = { screenX: canvas.width / 2, screenY: canvas.height / 2, x: 0, y: 0, down: false };
        const keys = { w: false, a: false, s: false, d: false };

        // Gamepad State
        let inputMode = 'mouse';
        let gamepadIndex = null;
        let rightTriggerPressed = false;
        let bombKeyPressed = false;
        let startButtonPressed = false;
        
        // Mobile Virtual Sticks State
        const virtualSticks = {
            left: { active: false, deltaX: 0, deltaY: 0, id: null },
            right: { active: false, deltaX: 0, deltaY: 0, id: null }
        };

        window.addEventListener('keydown', (e) => { // Combined keydown listener
            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) keys[key] = true;

            if (key === 'escape') {
                togglePause();
            }

            if (key === 'f') {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => {});
                } else {
                    document.exitFullscreen();
                }
            }
            if (key === 'b' && !bombKeyPressed) {
                useBomb();
                bombKeyPressed = true;
            }
        });

        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if(keys.hasOwnProperty(key)) {
                keys[key] = false;
            }
            if (key === 'b') bombKeyPressed = false;
        });

        window.addEventListener('gamepadconnected', (e) => {
            gamepadIndex = e.gamepad.index;
        });

        window.addEventListener('gamepaddisconnected', (e) => {
            if (gamepadIndex === e.gamepad.index) {
                gamepadIndex = null;
            }
        });

        window.addEventListener('mousemove', (event) => {
            mouse.screenX = event.clientX;
            mouse.screenY = event.clientY;
            inputMode = 'mouse';
        });

        window.addEventListener('mousedown', () => { mouse.down = true; });
        window.addEventListener('mouseup', () => { mouse.down = false; });




        resumeBtn.addEventListener('click', togglePause);

        invincibleCheck.addEventListener('change', (e) => {
            debugInvincible = e.target.checked;
        });

        infiniteLivesCheck.addEventListener('change', (e) => {
            infiniteLives = e.target.checked;
        });

        showLinesCheck.addEventListener('change', (e) => {
            debugShowLines = e.target.checked;
        });

        skipLevelBtn.addEventListener('click', () => {
            if (gameActive) {
                transitionToNextLevel();
                togglePause(); // Unpause the game so the transition plays out
            }
        });

        // --- CLASSES ---

        class Point {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.baseX = x;
                this.baseY = y;
                this.velX = 0;
                this.velY = 0;
                this.mass = 2;
                this.stiffness = 0.025;
                this.damping = 0.92;
            }

            update() {
                let forceX = (this.baseX - this.x) * this.stiffness;
                let forceY = (this.baseY - this.y) * this.stiffness;
                this.velX += forceX / this.mass;
                this.velY += forceY / this.mass;
                this.velX *= this.damping;
                this.velY *= this.damping;
                this.x += this.velX;
                this.y += this.velY;
            }
        }

        class Grid {
            constructor(width, height, spacing) {
                this.width = width;
                this.height = height;
                this.spacing = spacing;
                this.cols = Math.ceil(width / spacing) + 1;
                this.rows = Math.ceil(height / spacing) + 1;
                this.points = [];
                for (let y = 0; y < this.rows; y++) {
                    let row = [];
                    for (let x = 0; x < this.cols; x++) {
                        row.push(new Point(x * spacing, y * spacing));
                    }
                    this.points.push(row);
                }
            }
            applyForce(x, y, radius, force) {
                const minCol = Math.max(0, Math.floor((x - radius) / this.spacing));
                const maxCol = Math.min(this.cols - 1, Math.ceil((x + radius) / this.spacing));
                const minRow = Math.max(0, Math.floor((y - radius) / this.spacing));
                const maxRow = Math.min(this.rows - 1, Math.ceil((y + radius) / this.spacing));

                for (let r = minRow; r <= maxRow; r++) {
                    for (let c = minCol; c <= maxCol; c++) {
                        const p = this.points[r][c];
                        const dx = p.x - x;
                        const dy = p.y - y;
                        const distSq = dx * dx + dy * dy;
                        if (distSq < radius * radius) {
                            const dist = Math.sqrt(distSq);
                            const f = (1 - dist / radius) * force;
                            const angle = Math.atan2(dy, dx);
                            p.velX += Math.cos(angle) * f;
                            p.velY += Math.sin(angle) * f;
                        }
                    }
                }
            }

            update() {
                for (let r = 0; r < this.rows; r++) {
                    for (let c = 0; c < this.cols; c++) {
                        this.points[r][c].update();
                    }
                }
            }
            draw(ctx, view) {
                ctx.save();
                const hue = (level * 60) % 360; // Rotate colors based on the level
                ctx.strokeStyle = `hsla(${hue}, 100%, 80%, 0.1)`; // Pastel lightness with slight transparency
                ctx.lineWidth = 1;

                const minCol = Math.max(0, Math.floor((view.x - this.spacing) / this.spacing));
                const maxCol = Math.min(this.cols - 1, Math.ceil((view.x + view.width + this.spacing) / this.spacing));
                const minRow = Math.max(0, Math.floor((view.y - this.spacing) / this.spacing));
                const maxRow = Math.min(this.rows - 1, Math.ceil((view.y + view.height + this.spacing) / this.spacing));

                for (let r = minRow; r <= maxRow; r++) {
                    ctx.beginPath();
                    for (let c = minCol; c <= maxCol; c++) {
                        const p = this.points[r][c];
                        if (c === minCol) ctx.moveTo(p.x, p.y);
                        else ctx.lineTo(p.x, p.y);
                    }
                    ctx.stroke();
                }

                for (let c = minCol; c <= maxCol; c++) {
                    ctx.beginPath();
                    for (let r = minRow; r <= maxRow; r++) {
                        const p = this.points[r][c];
                        if (r === 0) ctx.moveTo(p.x, p.y);
                        else ctx.lineTo(p.x, p.y);
                    }
                    ctx.stroke();
                }
                ctx.restore();
            }
        }

        class Pool {
            constructor(objectClass, initialSize = 100) {
                this.objectClass = objectClass;
                this.pool = [];
                for (let i = 0; i < initialSize; i++) {
                    this.pool.push(new this.objectClass());
                }
            }

            get() {
                if (this.pool.length > 0) {
                    return this.pool.pop();
                }
                // Pool is empty, create a new one (allows for spikes)
                return new this.objectClass();
            }

            release(obj) {
                // Could add a check to ensure we don't add too many back
                this.pool.push(obj);
            }
        }

        class Player {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 15;
                this.color = '#ffffff'; // White
                this.velocity = { x: 0, y: 0 };
                this.baseSpeed = 1.386; // Base movement speed
                this.speed = this.baseSpeed;
                this.friction = 0.85; // Lower friction fixes floaty/sluggish controls
                this.alive = true;
                this.shieldTimeRemaining = 4.0; // 4 seconds of shield on spawn
                this.invulnerable = true;
                this.aimAngle = 0;
                this.facingAngle = 0;
                this.triggerLocked = false;
                this.lastShotTime = 0;
                this.shootCooldownMs = 80; // Milliseconds
                this.isBlinkingToRespawn = false;
            }

            draw(ctx) {
                if (!this.alive && !this.isBlinkingToRespawn) return;

                if (this.isBlinkingToRespawn) {
                    // Blink once over 1 second.
                    if (frame % 60 < 30) {
                        return; // Invisible for 30 frames (0.5s)
                    }
                }

                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.facingAngle);

                // Draw Ship (Claw Design)
                ctx.beginPath();
                ctx.moveTo(20, -8);  // Top Front Tip
                ctx.lineTo(10, 0);   // Inner Mouth
                ctx.lineTo(20, 8);   // Bottom Front Tip
                ctx.lineTo(-12, 12); // Bottom Back Wing
                ctx.lineTo(-6, 0);   // Rear Notch
                ctx.lineTo(-12, -12);// Top Back Wing
                ctx.closePath();

                // Manual glow (faster than shadowBlur)
                ctx.save();
                ctx.globalAlpha = 0.5;
                ctx.lineWidth = 8;
                ctx.strokeStyle = this.color;
                ctx.stroke(); // Strokes the main path for the glow effect
                ctx.restore();

                // Draw the main ship outline
                ctx.lineWidth = 2;
                ctx.strokeStyle = this.color;
                ctx.stroke();

                // Inner Core
                ctx.beginPath();
                ctx.moveTo(-2, 0);
                ctx.lineTo(-8, -4);
                ctx.lineTo(-8, 4);
                ctx.closePath();

                // Fill and stroke the ship's core
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.stroke();
                
                // Draw Shield
                if (this.shieldTimeRemaining > 0) {
                    ctx.save();
                    ctx.globalAlpha = Math.min(1, this.shieldTimeRemaining); // Fades out smoothly in the last 1 second
                    ctx.beginPath();
                    ctx.arc(0, 0, this.radius + 15, 0, Math.PI * 2);
                    ctx.strokeStyle = '#ffffff'; // White shield
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.15)'; // Light white fill
                    ctx.fill();
                    ctx.restore();
                }

                ctx.restore();
            }

            update(dt, now) {
                // During the blinking respawn, the player is not alive and should not update.
                // The check below handles this correctly.
                if (!this.alive) return;

                // --- Shield Timer Logic ---
                if (this.shieldTimeRemaining > 0) {
                    this.shieldTimeRemaining -= dt;
                    this.invulnerable = true;
                    if (this.shieldTimeRemaining <= 0) {
                        this.shieldTimeRemaining = 0;
                        this.invulnerable = false;
                    }
                }

                // --- Speed Boost Logic (tied to Score Streak) ---
                // Levels interleave nicely with gun upgrades at 10k and 20k
                let speedMultiplier = 1.0;
                if (scoreStreak >= 25000) {
                    speedMultiplier = 1.175; // Level 3: +17.5% total (+5% +5% +7.5%)
                } else if (scoreStreak >= 15000) {
                    speedMultiplier = 1.10;  // Level 2: +10% total (+5% +5%)
                } else if (scoreStreak >= 5000) {
                    speedMultiplier = 1.05;  // Level 1: +5% total
                }
                this.speed = this.baseSpeed * speedMultiplier;

                // Movement Logic
                let moveX = 0;
                let moveY = 0;
                if (keys.w) moveY -= 1;
                if (keys.s) moveY += 1;
                if (keys.a) moveX -= 1;
                if (keys.d) moveX += 1;

                // Normalize keyboard input so diagonal movement isn't faster
                if (moveX !== 0 || moveY !== 0) {
                    const len = Math.hypot(moveX, moveY);
                    moveX /= len;
                    moveY /= len;
                }

                let rightStickActive = false;

                // --- Mobile Touch Input ---
                if (virtualSticks.left.active) {
                    moveX = virtualSticks.left.deltaX;
                    moveY = virtualSticks.left.deltaY;
                    inputMode = 'touch';
                }

                if (virtualSticks.right.active) {
                    rightStickActive = true;
                    this.aimAngle = Math.atan2(virtualSticks.right.deltaY, virtualSticks.right.deltaX);
                    inputMode = 'touch';
                    
                    this.shootCooldownMs = (scoreStreak >= 20000) ? 20 : 80;
                    if (now > this.lastShotTime + this.shootCooldownMs) {
                        this.shoot(now);
                    }
                }

                // Gamepad Input
                if (gamepadIndex !== null) {
                    const gp = navigator.getGamepads()[gamepadIndex];
                    if (gp) {
                        const deadzone = 0.1;
                        
                        // Left Stick (Move)
                        const lx = gp.axes[0];
                        const ly = gp.axes[1];
                        if (Math.abs(lx) > deadzone || Math.abs(ly) > deadzone) {
                            moveX = lx;
                            moveY = ly;
                            const len = Math.hypot(moveX, moveY);
                            if (len > 1) {
                                moveX /= len;
                                moveY /= len;
                            }
                            inputMode = 'gamepad';
                        }

                        // Right Stick (Aim)
                        const rx = gp.axes[2];
                        const ry = gp.axes[3];
                        if (Math.hypot(rx, ry) > deadzone) {
                            rightStickActive = true;
                            this.aimAngle = Math.atan2(ry, rx);
                            inputMode = 'gamepad';
                            
                            // Power-ups modify cooldown
                            this.shootCooldownMs = (scoreStreak >= 20000) ? 20 : 80;

                            // Twin-stick auto-fire
                            if (now > this.lastShotTime + this.shootCooldownMs) {
                                this.shoot(now);
                            }
                        }

                        // Right Trigger (Bomb) - Button 7 is common for RT
                        if (gp.buttons[7] && gp.buttons[7].pressed) {
                            if (!rightTriggerPressed) {
                                useBomb();
                                rightTriggerPressed = true;
                            }
                        } else {
                            rightTriggerPressed = false;
                        }
                    }
                }

                // Unified Aiming Logic: Fallback to mouse if right stick is not active
                if (!rightStickActive) { // Mouse aiming
                    this.aimAngle = Math.atan2(mouse.y - this.y, mouse.x - this.x);
                    if (mouse.down) {
                        // Power-ups modify cooldown
                        this.shootCooldownMs = (scoreStreak >= 20000) ? 20 : 80;
                        if (now > this.lastShotTime + this.shootCooldownMs) {
                            this.shoot(now);
                        }
                    }
                }

                // Apply input to velocity (frame-rate independent)
                this.velocity.x += moveX * 60 * dt;
                this.velocity.y += moveY * 60 * dt;

                // Apply velocity
                this.x += this.velocity.x * this.speed * 60 * dt;
                this.y += this.velocity.y * this.speed * 60 * dt;

                // Friction
                // Use Math.pow to make friction frame-rate independent
                const frictionFactor = Math.pow(this.friction, dt * 60);
                this.velocity.x *= frictionFactor;
                this.velocity.y *= frictionFactor;

                // Wall Boundaries
                if (this.x - this.radius < 0) this.x = this.radius;
                if (this.x + this.radius > world.width) this.x = world.width - this.radius;
                if (this.y - this.radius < 0) this.y = this.radius;
                if (this.y + this.radius > world.height) this.y = world.height - this.radius;

                // Update facing direction based on movement
                const speed = Math.hypot(this.velocity.x, this.velocity.y);
                // Only update angle if moving to prevent jitter and keep last direction when stopped
                if (speed > 0.01) { 
                    this.facingAngle = Math.atan2(this.velocity.y, this.velocity.x);
                }
            }

            shoot(now) {
                this.lastShotTime = now;
                sounds.shoot();
                const isSpread = scoreStreak >= 10000 && scoreStreak < 20000;

                const velocity = {
                    x: Math.cos(this.aimAngle) * 14.4,
                    y: Math.sin(this.aimAngle) * 14.4
                };
                projectiles.push(projectilePool.get().init(
                    this.x + Math.cos(this.aimAngle) * 20, 
                    this.y + Math.sin(this.aimAngle) * 20, 
                    velocity
                ));

                if (isSpread) {
                    const spread = 0.25;
                    const angles = [this.aimAngle - spread, this.aimAngle + spread];
                    angles.forEach(angle => {
                        const vel = { x: Math.cos(angle) * 14.4, y: Math.sin(angle) * 14.4 };
                        projectiles.push(projectilePool.get().init(
                            this.x + Math.cos(angle) * 20, 
                            this.y + Math.sin(angle) * 20, 
                            vel
                        ));
                    });
                }
            }
            
            beginRespawnBlinking(duration) {
                this.isBlinkingToRespawn = true;
                this.velocity = { x: 0, y: 0 };
                setTimeout(() => {
                    this.isBlinkingToRespawn = false;
                    this.respawn();
                }, duration);
            }

            respawn() {
                this.alive = true;
                this.shieldTimeRemaining = 4.0;
                this.invulnerable = true;
            }
        }

        class Projectile {
            constructor() {
                // Initialize with default/empty values
                this.x = 0;
                this.y = 0;
                this.velocity = { x: 0, y: 0 };
                this.radius = 3;
                this.color = '#ffff00';
                this.markedForDeletion = false;
            }

            init(x, y, velocity) {
                this.x = x;
                this.y = y;
                this.velocity = velocity;
                this.markedForDeletion = false;
                return this; // for chaining
            }

            draw(ctx, view) {
                // Culling check
                if (this.x + this.radius < view.x - view.buffer || this.x - this.radius > view.x + view.width + view.buffer ||
                    this.y + this.radius < view.y - view.buffer || this.y - this.radius > view.y + view.height + view.buffer) {
                    return;
                }
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2, false);
                ctx.fill();
            }

            update(dt) {
                this.x += this.velocity.x * 60 * dt;
                this.y += this.velocity.y * 60 * dt;
            }
        }

        class Enemy {
            constructor(x, y, type = 'grunt') {

                    case 'snake-head':

                        break;
                    case 'snake-body':

                    case 'ruby':

            draw(ctx, view) {
                // Culling check
                if (this.x + this.radius < view.x - view.buffer || this.x - this.radius > view.x + view.width + view.buffer ||
                    this.y + this.radius < view.y - view.buffer || this.y - this.radius > view.y + view.height + view.buffer) {
                    return;
                }

                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                
                // Optimization: Only apply shadowBlur to bosses
                if (['sapphire', 'ruby', 'emerald'].includes(this.type)) {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = this.color;
                }
                
                ctx.beginPath();

                if (this.type === 'gravity-well') {
                    ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    // Inner pulse
                    ctx.beginPath();
                    ctx.arc(0, 0, this.radius * 0.5 + Math.sin(frame * 0.1) * 5, 0, Math.PI * 2);
                    ctx.stroke();
                } else if (this.type === 'super-gravity-well') {
                    ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = '#000'; // Black void
                    ctx.fill();
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 5 + Math.sin(frame * 0.3) * 5;
                    ctx.stroke();
                    // Inner fierce pulse
                    ctx.beginPath();
                    ctx.arc(0, 0, this.radius * 0.6 + Math.random() * 8, 0, Math.PI * 2);
                    ctx.strokeStyle = '#ff0000';
                    ctx.lineWidth = 3;
                    ctx.stroke();
                } else if (this.type === 'dog-bone-bomb') {
                    const boneLength = 70; // Twice as long
                    ctx.beginPath();
                    ctx.moveTo(-boneLength + 8, 0);
                    ctx.lineTo(boneLength - 8, 0);
                    ctx.strokeStyle = '#ffffff'; // White bar
                    ctx.lineWidth = 4;
                    ctx.stroke();

                    // Center trigger zone indicator
                    ctx.beginPath();
                    ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
                    ctx.lineWidth = 2;
                    ctx.stroke();

                    ctx.beginPath();
                    ctx.arc(-boneLength + 8, 0, 8, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();

                    ctx.beginPath();
                    ctx.arc(boneLength - 8, 0, 8, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                } else if (this.type.startsWith('snake')) {
                    ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                } else if (this.type === 'repulsor') {
                    const spikes = 8;
                    const outerRadius = this.radius * 1.2;
                    const innerRadius = this.radius * 0.6;
                    ctx.beginPath();
                    for (let i = 0; i < spikes * 2; i++) {
                        const radius = i % 2 === 0 ? outerRadius : innerRadius;
                        const angle = (i * Math.PI) / spikes;
                        ctx.lineTo(radius * Math.cos(angle), radius * Math.sin(angle));
                    }
                    ctx.closePath();
                    ctx.fillStyle = this.color;
                    ctx.fill();
                } else if (this.type === 'hex-dodger') {
                    // Hexagon
                    ctx.beginPath();
                    for (let i = 0; i < 6; i++) {
                        const angle = i * Math.PI / 3;
                        const x = Math.cos(angle) * this.radius;
                        const y = Math.sin(angle) * this.radius;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    // Inner Detail
                    if (!this.yoyoOut) {
                        ctx.beginPath();
                        ctx.arc(0, 0, this.radius * 0.4, 0, Math.PI * 2);
                        ctx.fillStyle = this.color;
                        ctx.fill();
                    }
                } else if (this.type === 'proton' || this.type === 'spinner-mini') {
                    ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                } else if (this.type === 'mayfly') {
                    // Equilateral triangle shape
                    ctx.beginPath();
                    ctx.moveTo(this.radius, 0);
                    ctx.lineTo(this.radius * Math.cos(2 * Math.PI / 3), this.radius * Math.sin(2 * Math.PI / 3));
                    ctx.lineTo(this.radius * Math.cos(4 * Math.PI / 3), this.radius * Math.sin(4 * Math.PI / 3));
                    ctx.closePath();
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                } else if (this.type === 'sapphire') {
                    // Octagon
                    ctx.beginPath();
                    for (let i = 0; i < 8; i++) {
                        const angle = i * Math.PI / 4;
                        ctx.lineTo(Math.cos(angle) * this.radius, Math.sin(angle) * this.radius);
                    }
                    ctx.closePath();
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = 4;
                    ctx.stroke();
                } else if (this.type === 'ruby') {
                    // Hexagon
                    ctx.beginPath();
                    for (let i = 0; i < 6; i++) {
                        const angle = i * Math.PI / 3;
                        const x = Math.cos(angle) * this.radius;
                        const y = Math.sin(angle) * this.radius;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = 4;
                    ctx.stroke();
                } else if (this.type === 'emerald') {
                    // Star
                    ctx.beginPath();
                    for (let i = 0; i < 10; i++) {
                        const r = i % 2 === 0 ? this.radius : this.radius / 2;
                        const angle = i * Math.PI / 5;
                        ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
                    }
                    ctx.closePath();
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = 4;
                    ctx.stroke();
                } else if (this.type === 'dart') {
                    // Triangle
                    ctx.beginPath();
                    ctx.moveTo(this.radius, 0);
                    ctx.lineTo(-this.radius, this.radius/2);
                    ctx.lineTo(-this.radius, -this.radius/2);
                    ctx.closePath();
                    ctx.fillStyle = this.color;
                    ctx.fill();
                } else if (this.type === 'hex-yoyo') {
                    ctx.beginPath();
                    ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                } else if (this.type === 'mini-titan') {
                    ctx.rect(-this.radius, -this.radius, this.radius*2, this.radius*2);
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = 3;
                    ctx.stroke();
                } else if (this.type === 'arrow') {
                    ctx.beginPath();
                    ctx.moveTo(this.radius, 0);
                    ctx.lineTo(-this.radius, this.radius/2);
                    ctx.lineTo(-this.radius, -this.radius/2);
                    ctx.closePath();
                    ctx.fillStyle = this.color;
                    ctx.fill();
                } else if (this.type === 'spinner') {
                    // Fan / Propeller shape
                    for (let i = 0; i < 3; i++) {
                        ctx.beginPath();
                        ctx.moveTo(0, 0);
                        ctx.lineTo(this.radius, -this.radius / 2.5);
                        ctx.lineTo(this.radius, this.radius / 2.5);
                        ctx.closePath();
                        ctx.fillStyle = this.color;
                        ctx.fill();
                        ctx.strokeStyle = '#ffffff';
                        ctx.lineWidth = 1.5;
                        ctx.stroke();
                        ctx.rotate((Math.PI * 2) / 3);
                    }
                } else {
                    // Square/Diamond shape for Grunt, Weaver
                    const size = this.radius * 0.7;
                    ctx.rect(-size, -size, size * 2, size * 2);
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    
                    // Inner X
                    ctx.beginPath();
                    ctx.moveTo(-size/2, -size/2);
                    ctx.lineTo(size/2, size/2);
                    ctx.moveTo(size/2, -size/2);
                    ctx.lineTo(-size/2, size/2);
                    ctx.stroke();
                }

                ctx.restore();
            }

            update(dt) {
                if (!player.alive) return;

                // Safety check for NaN coordinates (prevents ghost enemies)
                if (isNaN(this.x) || isNaN(this.y)) {
                    this.markedForDeletion = true;
                    return;
                }

                const angleToPlayer = Math.atan2(player.y - this.y, player.x - this.x);

                // --- BEHAVIOR LOGIC ---
                if (this.type === 'hex-yoyo') {
                    if (!this.owner || this.owner.markedForDeletion) {
                        this.markedForDeletion = true;
                        return;
                    }
                    this.t = (this.t || 0) + dt;
                    const duration = this.yoyoMode === 'around-the-world' ? 2.0 : 1.5;
                    if (this.t >= duration) {
                        this.markedForDeletion = true;
                        this.owner.yoyoOut = false;
                        this.owner.nextYoyoMode = 'loop'; // Reset to standard behavior next time
                        return;
                    }
                    const p = this.t / duration;
                    
                    if (this.yoyoMode === 'around-the-world') {
                        const radius = Math.sin(p * Math.PI) * 300; // Sweep out into a large circle
                        const angle = this.baseAngle + p * Math.PI * 2; // Full 360 degree orbit
                        this.x = this.owner.x + Math.cos(angle) * radius;
                        this.y = this.owner.y + Math.sin(angle) * radius;
                    } else {
                        const baseDist = Math.sin(p * Math.PI) * 250;
                        const loopAngle = p * Math.PI * 6; // 3 full loops
                        const loopRadius = Math.sin(p * Math.PI) * 50; 
                        this.x = this.owner.x + Math.cos(this.baseAngle) * baseDist + Math.cos(this.baseAngle + loopAngle) * loopRadius;
                        this.y = this.owner.y + Math.sin(this.baseAngle) * baseDist + Math.sin(this.baseAngle + loopAngle) * loopRadius;
                    }
                    return; // Skip default physics
                }

                let isDodging = false;
                this.dodgeCooldown = Math.max(0, this.dodgeCooldown - dt);
                this.missileCooldown = Math.max(0, this.missileCooldown - dt);
                if (this.type === 'weaver') {
                    for (const p of projectiles) {
                        if (Math.abs(p.x - this.x) > 120 || Math.abs(p.y - this.y) > 120) continue;
                        const distToProj = Math.hypot(p.x - this.x, p.y - this.y);
                        // Check if a projectile is within the "danger zone"
                        if (distToProj < 120) {
                            const angleFromProj = Math.atan2(this.y - p.y, this.x - p.x);
                            const projAngle = Math.atan2(p.velocity.y, p.velocity.x);
                            const angleDiff = Math.abs(angleFromProj - projAngle);

                            // If the projectile is heading towards us, dodge
                            if (angleDiff < 0.4) { 
                                // Dodge perpendicular to the bullet's path
                                const dodgeAngle = projAngle + Math.PI / 2;
                                this.velocity.x = Math.cos(dodgeAngle);
                                this.velocity.y = Math.sin(dodgeAngle);
                                isDodging = true;
                                break; // Only react to the first bullet found
                            }
                        }
                    }
                }

                // Hex Dodger Logic (Advanced Dodging)
                if (this.type === 'hex-dodger' && this.dodgeCooldown <= 0) {
                    for (const p of projectiles) {
                        // Increased detection range
                        if (Math.abs(p.x - this.x) > 400 || Math.abs(p.y - this.y) > 400) continue;
                        const distSq = (p.x - this.x)**2 + (p.y - this.y)**2;
                        if (distSq < 400**2) {
                            const angleFromProj = Math.atan2(this.y - p.y, this.x - p.x);
                            const projAngle = Math.atan2(p.velocity.y, p.velocity.x);
                            let angleDiff = angleFromProj - projAngle;
                            while (angleDiff <= -Math.PI) angleDiff += Math.PI*2;
                            while (angleDiff > Math.PI) angleDiff -= Math.PI*2;

                            if (Math.abs(angleDiff) < 1.2) {
                                const randomDodgeAngle = 75 + Math.random() * 15;
                                const dodgeDir = angleToPlayer + (angleDiff > 0 ? (randomDodgeAngle * Math.PI / 180) : -(randomDodgeAngle * Math.PI / 180));
                                // Faster dodge speed
                                const dodgeSpeed = this.angry ? 14.4 : 7.2;
                                this.velocity.x = Math.cos(dodgeDir) * dodgeSpeed;
                                this.velocity.y = Math.sin(dodgeDir) * dodgeSpeed;
                                isDodging = true;
                                this.dodgeCooldown = 0.2; // Commit to dodge for 0.2s
                                
                                // Fire yoyo loop-the-loop attack
                                if (this.missileCooldown <= 0 && !this.yoyoOut) {
                                    const yoyo = new Enemy(this.x, this.y, 'hex-yoyo');
                                    yoyo.owner = this;
                                    yoyo.yoyoMode = this.nextYoyoMode || 'loop';
                                    yoyo.baseAngle = Math.atan2(player.y - this.y, player.x - this.x);
                                    enemies.push(yoyo);
                                    this.yoyoOut = true;
                                    this.missileCooldown = 2.0; // 2 second cooldown
                                }
                                break;
                            }
                        }
                    }
                }
                if (this.type === 'hex-dodger' && this.dodgeCooldown > 0) {
                    isDodging = true;
                }

                // Super Gravity Well Logic
                if (this.type === 'super-gravity-well') {

                    // Keep it within the play area by bouncing off the edges
                    if ((this.x - this.radius < 0 && this.velocity.x < 0) || (this.x + this.radius > world.width && this.velocity.x > 0)) {
                        this.velocity.x *= -1;
                    }
                    if ((this.y - this.radius < 0 && this.velocity.y < 0) || (this.y + this.radius > world.height && this.velocity.y > 0)) {
                        this.velocity.y *= -1;
                    }

                    // Pull Grid (Massive)
                    if (grid) {
                        grid.applyForce(this.x, this.y, 1000, -4.0);
                    }

                    // Limit the radius strictly to a smaller localized area (800 pixels)
                    const maxSuckRadius = 800;

                    // Pull Player (Radius Limited)
                    const distToPlayer = Math.hypot(player.x - this.x, player.y - this.y);
                    if (distToPlayer > this.radius && distToPlayer < maxSuckRadius) {
                        // Scale down pull if there are multiple active super gravity wells so player can escape
                        let sgwCount = 0;
                        for (let i = 0; i < enemies.length; i++) {
                            if (enemies[i].type === 'super-gravity-well') sgwCount++;
                        }
                        const pullForce = 0.26 / Math.max(1, sgwCount * 0.75);
                        
                        player.velocity.x += (this.x - player.x) / distToPlayer * pullForce;
                        player.velocity.y += (this.y - player.y) / distToPlayer * pullForce;
                    }
                    // Pull Enemies (Radius Limited)
                    enemies.forEach(other => {
                        if (other !== this) {
                            const dist = Math.hypot(other.x - this.x, other.y - this.y);
                            
                            if (other.type === 'gravity-well' || other.type === 'super-gravity-well') {
                                if (dist === 0) {
                                    other.x += 1; // Nudge to prevent NaN errors if perfectly overlapped
                                } else if (dist < maxSuckRadius) {
                                    const angle = Math.atan2(other.y - this.y, other.x - this.x);
                                    
                                    // Pull towards each other
                                    other.x += (this.x - other.x) / dist * 3.0 * 60 * dt;
                                    other.y += (this.y - other.y) / dist * 3.0 * 60 * dt;
                                    
                                    // Whirlpool swirl
                                    const tangAngle = angle + Math.PI / 2;
                                    other.x += Math.cos(tangAngle) * 6.0 * 60 * dt;
                                    other.y += Math.sin(tangAngle) * 6.0 * 60 * dt;

                                    // Rub against each other (Collision)
                                    const minDist = this.radius + other.radius;
                                    if (dist < minDist) {
                                        const overlap = minDist - dist;
                                        other.x += Math.cos(angle) * overlap * 0.5;
                                        other.y += Math.sin(angle) * overlap * 0.5;
                                    }
                                } else {
                                    // Global slow pull towards each other across the map
                                    other.x += (this.x - other.x) / dist * 1.0 * 60 * dt;
                                    other.y += (this.y - other.y) / dist * 1.0 * 60 * dt;
                                }
                            } else {
                                if (dist > this.radius && dist < maxSuckRadius) {
                                    other.x += (this.x - other.x) / dist * 12.0 * 60 * dt;
                                    other.y += (this.y - other.y) / dist * 12.0 * 60 * dt;
                                }
                            }
                        }
                    });
                }

                // Gravity Well Logic
                if (this.type === 'gravity-well') {
                    // Keep it within the play area by bouncing off the edges
                    if ((this.x - this.radius < 0 && this.velocity.x < 0) || (this.x + this.radius > world.width && this.velocity.x > 0)) {
                        this.velocity.x *= -1;
                    }
                    if ((this.y - this.radius < 0 && this.velocity.y < 0) || (this.y + this.radius > world.height && this.velocity.y > 0)) {
                        this.velocity.y *= -1;
                    }

                    // Pull Grid
                    if (grid) {
                        grid.applyForce(this.x, this.y, 300, -1.6); // DOUBLED
                    }

                    // Pull Player
                    const distToPlayer = Math.hypot(player.x - this.x, player.y - this.y);
                    if (distToPlayer > this.radius) {
                        player.velocity.x += (this.x - player.x) / distToPlayer * 0.084; // 30% weaker
                        player.velocity.y += (this.y - player.y) / distToPlayer * 0.084; // 30% weaker
                    }
                    // Pull Enemies
                    enemies.forEach(other => {
                        if (other !== this) {
                            const isOtherWell = other.type === 'gravity-well' || other.type === 'super-gravity-well';
                            if (!isOtherWell && (Math.abs(other.x - this.x) > 300 || Math.abs(other.y - this.y) > 300)) return;
                            const dist = Math.hypot(other.x - this.x, other.y - this.y);
                            
                            if (isOtherWell) {
                                if (dist === 0) {
                                    other.x += 1; // Nudge to prevent NaN errors
                                } else if (dist < 300) {
                                    const angle = Math.atan2(other.y - this.y, other.x - this.x);
                                    
                                    // Pull towards each other
                                    other.x += (this.x - other.x) / dist * 1.5 * 60 * dt;
                                    other.y += (this.y - other.y) / dist * 1.5 * 60 * dt;
                                    
                                    // Whirlpool swirl
                                    const tangAngle = angle + Math.PI / 2;
                                    other.x += Math.cos(tangAngle) * 3.0 * 60 * dt;
                                    other.y += Math.sin(tangAngle) * 3.0 * 60 * dt;

                                    // Rub against each other (Collision)
                                    const minDist = this.radius + other.radius;
                                    if (dist < minDist) {
                                        const overlap = minDist - dist;
                                        other.x += Math.cos(angle) * overlap * 0.5;
                                        other.y += Math.sin(angle) * overlap * 0.5;
                                    }
                                } else {
                                    // Global slow pull towards each other across the map
                                    other.x += (this.x - other.x) / dist * 0.5 * 60 * dt;
                                    other.y += (this.y - other.y) / dist * 0.5 * 60 * dt;
                                }
                            } else if (dist < 300) {
                                // Normal suck logic
                                other.x += (this.x - other.x) / dist * 1.5 * 60 * dt;
                                other.y += (this.y - other.y) / dist * 1.5 * 60 * dt;
                            }
                        }
                    });
                }

                // Snake Body Logic
                if (this.type === 'snake-body') {
                    if (this.scattered) {
                        // Bounce off walls
                        if ((this.x - this.radius < 0 && this.velocity.x < 0) || (this.x + this.radius > world.width && this.velocity.x > 0)) {
                            this.velocity.x *= -1;
                        }
                        if ((this.y - this.radius < 0 && this.velocity.y < 0) || (this.y + this.radius > world.height && this.velocity.y > 0)) {
                            this.velocity.y *= -1;
                        }
                    } else if (this.leader && !this.leader.markedForDeletion) {
                        const angleToLeader = Math.atan2(this.leader.y - this.y, this.leader.x - this.x);
                        const dist = Math.hypot(this.leader.x - this.x, this.leader.y - this.y);
                        if (dist > this.radius) { // Maintain distance
                            this.velocity.x = Math.cos(angleToLeader);
                            this.velocity.y = Math.sin(angleToLeader);
                        } else {
                            // Stop if close to leader to prevent jitter/overshoot
                            this.velocity.x = 0;
                            this.velocity.y = 0;
                        }
                    } else {
                        this.markedForDeletion = true; // Leader is dead
                    }
                }

                // Snake Head Logic (Intercept)
                if (this.type === 'snake-head') {
                    const dist = Math.hypot(player.x - this.x, player.y - this.y);
                    // Predict player movement to cut them off
                    const lookAhead = Math.min(dist / this.speed, 30); 
                    const targetX = player.x + (player.velocity.x * player.speed) * lookAhead;
                    const targetY = player.y + (player.velocity.y * player.speed) * lookAhead;
                    
                    const angle = Math.atan2(targetY - this.y, targetX - this.x);
                    this.velocity.x = Math.cos(angle);
                    this.velocity.y = Math.sin(angle);
                }

                // --- BOSS BEHAVIORS ---
                if (this.type === 'sapphire') {
                    // Figure 8 pattern
                    this.x = world.width / 2 + Math.sin(frame * 0.024) * (world.width * 0.2);
                    this.y = world.height / 2 + Math.sin(frame * 0.048) * (world.height * 0.2);
                    
                    // Spawn Darts (time-based)
                    this.spawnTimer = (this.spawnTimer || 0) + dt;
                    if (this.spawnTimer > 1) { // Every 1 second
                        enemies.push(new Enemy(this.x, this.y, 'dart'));
                        this.spawnTimer = 0;
                    }
                    return; // Override default movement
                }

                if (this.type === 'ruby') {
                    // Aggressive Chase
                    const angle = Math.atan2(player.y - this.y, player.x - this.x);
                    this.velocity.x = Math.cos(angle);
                    this.velocity.y = Math.sin(angle);
                    
                    // Spawn Mini-Titans (time-based)
                    this.spawnTimer = (this.spawnTimer || 0) + dt;
                    if (this.spawnTimer > 2) { // Every 2 seconds
                        enemies.push(new Enemy(this.x, this.y, 'mini-titan'));
                        this.spawnTimer = 0;
                    }
                }

                if (this.type === 'emerald') {
                    const hpPercent = this.hp / this.maxHp;
                    
                    if (hpPercent > 0.66) {
                        // Phase 1: Stationary, Spawn Arrows
                        this.velocity = {x: 0, y: 0};
                        this.spawnTimer = (this.spawnTimer || 0) + dt;
                        if (this.spawnTimer > 1.5) { // Every 1.5 seconds
                            for(let i=-2; i<=2; i++) {
                                const arrow = new Enemy(this.x, this.y, 'arrow');
                                const angle = Math.atan2(player.y - this.y, player.x - this.x) + i * 0.2;
                                arrow.velocity.x = Math.cos(angle);
                                arrow.velocity.y = Math.sin(angle);
                                arrow.angle = angle; // Rotate sprite
                                enemies.push(arrow);
                            }
                            this.spawnTimer = 0;
                        }
                    } else if (hpPercent > 0.33) {
                        // Phase 2: Spawn Mini-Boss
                        this.velocity = {x: 0, y: 0};
                        if (!this.miniBossSpawned) {
                            const mb = new Enemy(this.x, this.y + 100, 'ruby');
                            mb.hp = 40; // Reduced HP
                            mb.radius = 30;
                            enemies.push(mb);
                            this.miniBossSpawned = true;
                        }
                    } else {
                        // Phase 3: Chase
                        const angle = Math.atan2(player.y - this.y, player.x - this.x);
                        this.velocity.x = Math.cos(angle);
                        this.velocity.y = Math.sin(angle);
                    }
                }
                
                if (this.type === 'dart' || this.type === 'arrow') {
                     this.angle = Math.atan2(this.velocity.y, this.velocity.x);
                }

                // Spinner & Dog Bone Movement (Drift lazily and bounce off walls)
                if (this.type === 'spinner' || this.type === 'dog-bone-bomb') {
                    if ((this.x - this.radius < 0 && this.velocity.x < 0) || (this.x + this.radius > world.width && this.velocity.x > 0)) {
                        this.velocity.x *= -1;
                    }
                    if ((this.y - this.radius < 0 && this.velocity.y < 0) || (this.y + this.radius > world.height && this.velocity.y > 0)) {
                        this.velocity.y *= -1;
                    }
                }

                // Default chase behavior if not performing a special action (like dodging)
                if (!isDodging && this.type !== 'spinner' && this.type !== 'dog-bone-bomb' && this.type !== 'gravity-well' && !this.type.startsWith('snake') && !['sapphire', 'emerald', 'ruby', 'hex-dodger'].includes(this.type)) {
                    this.velocity.x = Math.cos(angleToPlayer);
                    this.velocity.y = Math.sin(angleToPlayer);
                    
                    // Spinner Mini erratic movement
                    if (this.type === 'spinner-mini') {
                        this.angleOffset += 0.2;
                        this.velocity.x += Math.cos(this.angleOffset) * 0.6;
                        this.velocity.y += Math.sin(this.angleOffset) * 0.6;
                    }
                }

                // Hex Dodger Movement (Bouncy/Wavy)
                if (!isDodging && this.type === 'hex-dodger') {
                     const angleToPlayer = Math.atan2(player.y - this.y, player.x - this.x);
                     const wave = Math.sin(frame * 0.12) * 1.0; 
                     const moveAngle = angleToPlayer + wave;
                     this.velocity.x = Math.cos(moveAngle);
                     this.velocity.y = Math.sin(moveAngle);
                }
                // --- END BEHAVIOR LOGIC ---

                this.x += this.velocity.x * this.speed * 60 * dt;
                this.y += this.velocity.y * this.speed * 60 * dt;
                this.angle += this.spinSpeed * 60 * dt;

                // Prevent the Hex-Dodger from dodging out of bounds and deleting itself
                if (this.type === 'hex-dodger') {
                    if (this.x - this.radius < 0) { this.x = this.radius; this.velocity.x *= -1; }
                    else if (this.x + this.radius > world.width) { this.x = world.width - this.radius; this.velocity.x *= -1; }
                    
                    if (this.y - this.radius < 0) { this.y = this.radius; this.velocity.y *= -1; }
                    else if (this.y + this.radius > world.height) { this.y = world.height - this.radius; this.velocity.y *= -1; }
                }

                // New Rule: Despawn if enemy leaves the play area
                const offscreenBuffer = 100;
                if (this.x < -offscreenBuffer || this.x > world.width + offscreenBuffer ||
                    this.y < -offscreenBuffer || this.y > world.height + offscreenBuffer) {
                    this.markedForDeletion = true;
                }
            }
        }

        class Particle {
            constructor() {
                this.x = 0;
                this.y = 0;
                this.color = '#fff';
                this.radius = 1;
                this.markedForDeletion = false;
                this.velocity = { x: 0, y: 0 };
                this.alpha = 1;
                this.friction = 0.97;
            }

            init(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.radius = Math.random() * 2;
                const velocityMultiplier = Math.random() * 6;
                const angle = Math.random() * Math.PI * 2;
                this.velocity.x = Math.cos(angle) * velocityMultiplier;
                this.velocity.y = Math.sin(angle) * velocityMultiplier;
                this.alpha = 1;
                this.markedForDeletion = false;
                return this;
            }

            draw(ctx, view) {
                // Culling check
                if (this.x + this.radius < view.x - view.buffer || this.x - this.radius > view.x + view.width + view.buffer ||
                    this.y + this.radius < view.y - view.buffer || this.y - this.radius > view.y + view.height + view.buffer) {
                    return;
                }

                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
            }

            update(dt) {
                const frictionFactor = Math.pow(this.friction, dt * 60);
                this.velocity.x *= frictionFactor;
                this.velocity.y *= frictionFactor;
                this.x += this.velocity.x * 60 * dt;
                this.y += this.velocity.y * 60 * dt;
                // Fade out over time, independent of frame rate (1.2 = 0.02 * 60)
                if ((this.alpha -= 1.2 * dt) <= 0) this.markedForDeletion = true;
            }
        }

        class Orb {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 2; // 60% smaller than 5
                this.color = '#6a0dad'; // Dark Purple
                const angle = Math.random() * Math.PI * 2;
                this.velocity = {
                    x: Math.cos(angle) * 0.5,
                    y: Math.sin(angle) * 0.5
                };
                this.attractionRadius = 150;
                this.attractionForce = 1.5; // Increased force
                this.maxSpeed = 18; // Increased speed
                this.markedForDeletion = false;
                this.life = 7.0;
            }

            draw(ctx, view) {
                // Culling check
                if (this.x + this.radius < view.x - view.buffer || this.x - this.radius > view.x + view.width + view.buffer ||
                    this.y + this.radius < view.y - view.buffer || this.y - this.radius > view.y + view.height + view.buffer) {
                    return;
                }

                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(Math.PI / 4);

                const size = this.radius * 1.2;

                // Blink effect in last 2 seconds
                let alpha = 1;
                if (this.life < 2) {
                    if (Math.floor(this.life * 5) % 2 === 0) {
                        alpha = 0.3;
                    }
                }

                // Manual glow (much faster than shadowBlur)
                ctx.globalAlpha = 0.25 * alpha;
                ctx.fillStyle = this.color;
                ctx.fillRect(-size * 2, -size * 2, size * 4, size * 4);

                ctx.globalAlpha = 1 * alpha;
                ctx.fillRect(-size, -size, size * 2, size * 2);
                ctx.restore();
            }

            update(dt) {
                this.life -= dt;
                if (this.life <= 0) {
                    this.markedForDeletion = true;
                }
                const distToPlayer = Math.hypot(player.x - this.x, player.y - this.y);

                if (distToPlayer < this.attractionRadius && player.alive) {
                    // Powerful attraction
                    const angleToPlayer = Math.atan2(player.y - this.y, player.x - this.x);
                    this.velocity.x += Math.cos(angleToPlayer) * this.attractionForce * 60 * dt;
                    this.velocity.y += Math.sin(angleToPlayer) * this.attractionForce * 60 * dt;

                    // Cap speed to maxSpeed
                    const currentSpeed = Math.hypot(this.velocity.x, this.velocity.y);
                    if (currentSpeed > this.maxSpeed) {
                        this.velocity.x = (this.velocity.x / currentSpeed) * this.maxSpeed;

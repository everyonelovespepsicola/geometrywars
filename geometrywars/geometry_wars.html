<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Geometry Shooter</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505; /* Deep black */
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }

        canvas {
            display: block;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none; /* Let clicks pass through to canvas */
            text-shadow: 0 0 10px #fff;
        }

        .hud-text {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        #start-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border: 2px solid cyan;
            box-shadow: 0 0 20px cyan;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        button {
            background: transparent;
            color: cyan;
            border: 2px solid cyan;
            padding: 10px 20px;
            font-family: inherit;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
        }

        button:hover {
            background: cyan;
            color: black;
            box-shadow: 0 0 15px cyan;
        }

        .hidden {
            display: none !important;
        }
        
        #controls-hint {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
        }

        #debug-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 0, 0.4); /* Yellow, more visible */
            cursor: pointer;
            z-index: 100;
            border: 1px solid rgba(255, 255, 0, 0.6);
        }

        #debug-btn:hover {
            background: rgba(255, 255, 0, 0.8);
        }

        #debug-menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20, 20, 20, 0.9);
            border: 2px solid #ffff00;
            box-shadow: 0 0 20px #ffff00;
            color: white;
            padding: 20px;
            border-radius: 10px;
            z-index: 101;
            display: flex;
            flex-direction: column;
            gap: 15px;
            text-align: center;
        }

        #debug-menu h3 {
            margin: 0 0 10px 0;
            color: #ffff00;
            text-shadow: 0 0 5px #ffff00;
        }

        #debug-menu div {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        #fps-counter {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            pointer-events: none;
        }

        #enemies-alive-counter {
            position: absolute;
            bottom: 40px;
            right: 20px;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            pointer-events: none;
        }

        #wave-msg {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            color: #ff0055;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px #ff0055;
            pointer-events: none;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <!-- UI Overlay -->
    <div id="ui-layer">
        <div class="hud-text">SCORE: <span id="scoreEl">0</span></div>
        <div class="hud-text" style="color: #ffff00;">HIGH: <span id="highScoreEl">0</span></div>
        <div class="hud-text" style="color: #ff0055;">LIVES: <span id="livesEl">3</span></div>
        <div class="hud-text" style="color: #00ffaa;">LEVEL: <span id="levelEl">1</span></div>
        <div class="hud-text" style="color: #ffaa00;">BOMBS: <span id="bombsEl">3</span></div>
    </div>

    <div id="wave-msg" class="hidden"></div>
    <div id="controls-hint">WASD/Left Stick to Move | Click/Right Stick to Shoot | 'B'/RT for Bomb | 'F' for Fullscreen</div>
    <div id="fps-counter">FPS: 0</div>
    <div id="enemies-alive-counter">Enemies Alive: 0</div>

    <!-- Start / Game Over Screen -->
    <div id="start-screen">
        <h1 style="margin:0; text-shadow: 0 0 10px cyan;">NEON WARS</h1>
        <p id="final-score-msg" style="font-size: 14px; color: #aaa;">Defend the grid.</p>
        <button id="start-btn">Start Game</button>
    </div>

    <div id="debug-btn"></div>

    <div id="debug-menu" class="hidden">
        <h3>Debug Menu</h3>
        <div>
            <input type="checkbox" id="infinite-lives-check">
            <label for="infinite-lives-check">Infinite Lives</label>
        </div>
        <div>
            <input type="checkbox" id="show-lines-check">
            <label for="show-lines-check">Show Enemy Lines</label>
        </div>
        <button id="skip-level-btn">Skip Level</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // --- AUDIO SYSTEM ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // Generate Noise Buffer for Explosions
        const noiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
        const noiseData = noiseBuffer.getChannelData(0);
        for (let i = 0; i < noiseBuffer.length; i++) {
            noiseData[i] = Math.random() * 2 - 1;
        }

        const sounds = {
            shoot: () => {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                osc.type = 'triangle';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);

                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);

                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            },
            explode: () => {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const src = audioCtx.createBufferSource();
                src.buffer = noiseBuffer;
                const gain = audioCtx.createGain();
                const filter = audioCtx.createBiquadFilter();

                src.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);

                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(1000, audioCtx.currentTime);
                filter.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);

                gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);

                src.start();
                src.stop(audioCtx.currentTime + 0.3);
            },
            bomb: () => {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const src = audioCtx.createBufferSource();
                src.buffer = noiseBuffer;
                const gain = audioCtx.createGain();
                const filter = audioCtx.createBiquadFilter();

                src.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);

                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(400, audioCtx.currentTime);
                filter.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.8);

                gain.gain.setValueAtTime(0.8, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);

                src.start();
                src.stop(audioCtx.currentTime + 0.8);
            }
        };

        // --- MUSIC SYSTEM ---
        let musicPlaying = false;
        let musicSchedulerId = null;

        sounds.startMusic = () => {
            if (musicPlaying) return;
            musicPlaying = true;

            const masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.08; // Music should be in the background
            masterGain.connect(audioCtx.destination);

            const sequence = [
                { note: 'C2', duration: 0.5, chord: ['G3', 'C4', 'E4'] },
                { note: 'G2', duration: 0.5, chord: ['G3', 'B3', 'D4'] },
                { note: 'A#2', duration: 0.5, chord: ['A#3', 'D4', 'F4'] },
                { note: 'F2', duration: 0.5, chord: ['F3', 'A3', 'C4'] },
            ];
            
            const noteToFreq = (note) => {
                const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
                const key = note.slice(0, -1);
                const octave = parseInt(note.slice(-1));
                const keyIndex = notes.indexOf(key);
                const n = (octave - 4) * 12 + (keyIndex - 9);
                return 440 * Math.pow(2, n / 12);
            };

            let nextNoteTime = audioCtx.currentTime;
            let currentNoteIndex = 0;

            const scheduleNotes = () => {
                const lookahead = 0.5; // seconds
                while (nextNoteTime < audioCtx.currentTime + lookahead) {
                    const item = sequence[currentNoteIndex % sequence.length];
                    
                    // Bass
                    const bassOsc = audioCtx.createOscillator();
                    bassOsc.type = 'sawtooth';
                    bassOsc.frequency.setValueAtTime(noteToFreq(item.note), nextNoteTime);
                    const bassGain = audioCtx.createGain();
                    bassGain.gain.setValueAtTime(0.5, nextNoteTime);
                    bassGain.gain.exponentialRampToValueAtTime(0.01, nextNoteTime + item.duration * 0.9);
                    bassOsc.connect(bassGain).connect(masterGain);
                    bassOsc.start(nextNoteTime);
                    bassOsc.stop(nextNoteTime + item.duration);

                    // Arpeggio
                    const arpDuration = 0.125;
                    for (let i = 0; i < item.chord.length; i++) {
                        const arpOsc = audioCtx.createOscillator();
                        arpOsc.type = 'square';
                        arpOsc.frequency.setValueAtTime(noteToFreq(item.chord[i]), nextNoteTime + i * arpDuration);
                        const arpGain = audioCtx.createGain();
                        arpGain.gain.setValueAtTime(0.2, nextNoteTime + i * arpDuration);
                        arpGain.gain.exponentialRampToValueAtTime(0.01, nextNoteTime + (i + 1) * arpDuration);
                        arpOsc.connect(arpGain).connect(masterGain);
                        arpOsc.start(nextNoteTime + i * arpDuration);
                        arpOsc.stop(nextNoteTime + (i + 1) * arpDuration);
                    }

                    nextNoteTime += item.duration;
                    currentNoteIndex++;
                }
                musicSchedulerId = setTimeout(scheduleNotes, 100);
            };

            scheduleNotes();
        };

        // UI Elements
        const scoreEl = document.getElementById('scoreEl');
        const highScoreEl = document.getElementById('highScoreEl');
        const livesEl = document.getElementById('livesEl');
        const levelEl = document.getElementById('levelEl');
        const startScreen = document.getElementById('start-screen');
        const bombsEl = document.getElementById('bombsEl');
        const startBtn = document.getElementById('start-btn');
        const finalScoreMsg = document.getElementById('final-score-msg');
        const debugBtn = document.getElementById('debug-btn');
        const debugMenu = document.getElementById('debug-menu');
        const infiniteLivesCheck = document.getElementById('infinite-lives-check');
        const showLinesCheck = document.getElementById('show-lines-check');
        const skipLevelBtn = document.getElementById('skip-level-btn');
        const fpsCounterEl = document.getElementById('fps-counter');
        const enemiesAliveCounterEl = document.getElementById('enemies-alive-counter');
        const waveMsg = document.getElementById('wave-msg');

        // Game State
        let animationId;
        let score = 0;
        let scoreStreak = 0;
        let highScore = localStorage.getItem('geoWarsHighScore') || 0;
        let lives = 3; 
        let bombs = 3;
        let gameActive = false;
        let frame = 0;
        let level = 1;
        let levelFrame = 0;
        let bossSpawned = false;
        let infiniteLives = false;
        let debugShowLines = false;
        let lastTime = performance.now();
        let fpsFrames = 0;
        let nextLifeThreshold = 15000;
        let nextBombThreshold = 30000;
        let bombEffect = { active: false, radius: 0, alpha: 0 };

        highScoreEl.innerHTML = highScore;

        // Resize Handling
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Toggle Fullscreen
        window.addEventListener('keydown', (e) => { // Combined keydown listener
            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) keys[key] = true;

            if (key === 'f') {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => {});
                } else {
                    document.exitFullscreen();
                }
            }
            if (key === 'b' && !bombKeyPressed) {
                useBomb();
                bombKeyPressed = true;
            }
        });

        // Input Handling
        const mouse = { x: canvas.width / 2, y: canvas.height / 2 };
        const keys = { w: false, a: false, s: false, d: false };

        // Gamepad State
        let inputMode = 'mouse';
        let gamepadIndex = null;
        let rightTriggerPressed = false;
        let bombKeyPressed = false;

        window.addEventListener('gamepadconnected', (e) => {
            gamepadIndex = e.gamepad.index;
        });

        window.addEventListener('gamepaddisconnected', (e) => {
            if (gamepadIndex === e.gamepad.index) {
                gamepadIndex = null;
            }
        });

        window.addEventListener('mousemove', (event) => {
            mouse.x = event.clientX;
            mouse.y = event.clientY;
            inputMode = 'mouse';
        });

        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if(keys.hasOwnProperty(key)) {
                keys[key] = false;
            }
            if (key === 'b') bombKeyPressed = false;
        });

        window.addEventListener('mousedown', () => {
            if (gameActive && player.alive) {
                player.shoot();
            }
        });

        debugBtn.addEventListener('click', () => {
            debugMenu.classList.toggle('hidden');
        });

        infiniteLivesCheck.addEventListener('change', (e) => {
            infiniteLives = e.target.checked;
        });

        showLinesCheck.addEventListener('change', (e) => {
            debugShowLines = e.target.checked;
        });

        skipLevelBtn.addEventListener('click', () => {
            if (gameActive) {
                advanceLevel();
            }
        });

        // --- CLASSES ---

        class Player {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 15;
                this.color = '#ffffff'; // White
                this.velocity = { x: 0, y: 0 };
                this.speed = 0.27;
                this.friction = 0.97;
                this.alive = true;
                this.invulnerable = false;
                this.aimAngle = 0;
                this.triggerLocked = false;
                this.lastShot = 0;
                this.shootCooldown = 25;
            }

            draw() {
                if (!this.alive) return;
                
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.aimAngle);
                
                // Neon Glow
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                
                // Draw Ship (Claw Design)
                ctx.beginPath();
                ctx.moveTo(20, -8);  // Top Front Tip
                ctx.lineTo(10, 0);   // Inner Mouth
                ctx.lineTo(20, 8);   // Bottom Front Tip
                ctx.lineTo(-12, 12); // Bottom Back Wing
                ctx.lineTo(-6, 0);   // Rear Notch
                ctx.lineTo(-12, -12);// Top Back Wing
                ctx.closePath();
                
                ctx.strokeStyle = this.invulnerable && frame % 10 < 5 ? 'transparent' : this.color;
                ctx.lineWidth = 2;
                ctx.stroke();

                // Inner Core
                ctx.beginPath();
                ctx.moveTo(-2, 0);
                ctx.lineTo(-8, -4);
                ctx.lineTo(-8, 4);
                ctx.closePath();
                ctx.fillStyle = this.invulnerable && frame % 10 < 5 ? 'transparent' : this.color;
                ctx.fill();
                
                ctx.restore();
            }

            update() {
                if (!this.alive) return;

                // Movement Logic
                if (keys.w) this.velocity.y -= 1;
                if (keys.s) this.velocity.y += 1;
                if (keys.a) this.velocity.x -= 1;
                if (keys.d) this.velocity.x += 1;

                // Gamepad Input
                if (gamepadIndex !== null) {
                    const gp = navigator.getGamepads()[gamepadIndex];
                    if (gp) {
                        const deadzone = 0.1;
                        
                        // Left Stick (Move)
                        const lx = gp.axes[0];
                        const ly = gp.axes[1];
                        if (Math.abs(lx) > deadzone || Math.abs(ly) > deadzone) {
                            this.velocity.x += lx;
                            this.velocity.y += ly;
                            inputMode = 'gamepad';
                        }

                        // Right Stick (Aim)
                        const rx = gp.axes[2];
                        const ry = gp.axes[3];
                        if (Math.hypot(rx, ry) > deadzone) {
                            this.aimAngle = Math.atan2(ry, rx);
                            inputMode = 'gamepad';
                            
                            // Turbo Fire Check
                            this.shootCooldown = (scoreStreak >= 20000) ? 6 : 25;

                            // Twin-stick auto-fire
                            if (frame > this.lastShot + this.shootCooldown) {
                                this.shoot();
                                this.lastShot = frame;
                            }
                        }

                        // Right Trigger (Bomb) - Button 7 is common for RT
                        if (gp.buttons[7] && gp.buttons[7].pressed) {
                            if (!rightTriggerPressed) {
                                useBomb();
                                rightTriggerPressed = true;
                            }
                        } else {
                            rightTriggerPressed = false;
                        }
                    }
                }

                // Mouse Aim Fallback
                if (inputMode === 'mouse') {
                    this.aimAngle = Math.atan2(mouse.y - this.y, mouse.x - this.x);
                }

                // Apply velocity
                this.x += this.velocity.x * this.speed;
                this.y += this.velocity.y * this.speed;

                // Friction
                this.velocity.x *= this.friction;
                this.velocity.y *= this.friction;

                // Wall Boundaries
                if (this.x - this.radius < 0) this.x = this.radius;
                if (this.x + this.radius > canvas.width) this.x = canvas.width - this.radius;
                if (this.y - this.radius < 0) this.y = this.radius;
                if (this.y + this.radius > canvas.height) this.y = canvas.height - this.radius;

                this.draw();
            }

            shoot() {
                sounds.shoot();
                const isSpread = scoreStreak >= 10000 && scoreStreak < 20000;

                const velocity = {
                    x: Math.cos(this.aimAngle) * 12,
                    y: Math.sin(this.aimAngle) * 12
                };
                // Spawn bullet at tip of ship
                projectiles.push(new Projectile(
                    this.x + Math.cos(this.aimAngle) * 20, 
                    this.y + Math.sin(this.aimAngle) * 20, 
                    velocity
                ));

                if (isSpread) {
                    const spread = 0.25;
                    const angles = [this.aimAngle - spread, this.aimAngle + spread];
                    angles.forEach(angle => {
                        projectiles.push(new Projectile(
                            this.x + Math.cos(angle) * 20, 
                            this.y + Math.sin(angle) * 20, 
                            { x: Math.cos(angle) * 12, y: Math.sin(angle) * 12 }
                        ));
                    });
                }
            }
            
            respawn() {
                this.velocity = { x: 0, y: 0 };
                this.alive = true;
                this.invulnerable = true;
                setTimeout(() => { this.invulnerable = false; }, 2000);
            }
        }

        class Projectile {
            constructor(x, y, velocity) {
                this.x = x;
                this.y = y;
                this.velocity = velocity;
                this.radius = 3;
                this.color = '#ffff00'; // Yellow
            }

            draw() {
                // Optimization: Removed shadowBlur and save/restore
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
            }

            update() {
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.draw();
            }
        }

        class Enemy {
            constructor(x, y, type = 'grunt') {
                this.x = x;
                this.y = y;
                this.radius = 15;
                this.type = type;
                this.velocity = { x: 0, y: 0 };
                this.angle = 0;
                this.spinSpeed = Math.random() * 0.1 - 0.05;
                this.hp = 1;
                this.absorbed = 0; // For Gravity Well
                this.markedForDeletion = false;
                this.maxHp = 1; // Default

                switch (this.type) {
                    case 'weaver':
                        this.color = '#00ff00'; // Green
                        this.speed = Math.random() * 1.5 + 1;
                        break;
                    case 'spinner':
                        this.color = '#aa00ff'; // Purple
                        this.speed = Math.random() * 1 + 0.5;
                        break;
                    case 'spinner-mini':
                        this.radius = 8;
                        this.color = '#d040ff'; // Light Purple
                        this.speed = 3.5;
                        this.angleOffset = Math.random() * Math.PI * 2;
                        break;
                    case 'gravity-well':
                        this.radius = 25;
                        this.color = '#ff0000'; // Red
                        this.speed = 0.25;
                        this.hp = 10;
                        const gwAngle = Math.random() * Math.PI * 2;
                        this.velocity = { x: Math.cos(gwAngle), y: Math.sin(gwAngle) };
                        break;
                    case 'proton':
                        this.radius = 6;
                        this.color = '#ffaa00'; // Orange
                        this.speed = 5;
                        break;
                    case 'mayfly':
                        this.radius = 5;
                        this.color = '#ff00ff'; // Magenta
                        this.speed = 3.5 + Math.random(); // Fast and variable
                        break;
                    case 'snake-head':
                        this.color = '#dfff00'; // Chartreuse
                        this.speed = 1.5;
                        this.segments = [];
                        this.hp = 3;
                        break;
                    case 'snake-body':
                        this.color = '#9acd32'; // YellowGreen
                        this.speed = 2;
                        this.hp = Infinity; // Invulnerable to direct shots
                        break;
                    case 'repulsor':
                        this.color = '#ff8c00'; // DarkOrange
                        this.speed = 7;
                        break;
                    case 'sapphire':
                        this.radius = 40;
                        this.color = '#0f52ba'; // Sapphire Blue
                        this.hp = 50;
                        this.maxHp = 50;
                        this.speed = 2;
                        break;
                    case 'dart':
                        this.radius = 8;
                        this.color = '#00ffff';
                        this.speed = 4;
                        break;
                    case 'ruby':
                        this.radius = 45;
                        this.color = '#e0115f'; // Ruby Red
                        this.hp = 80;
                        this.maxHp = 80;
                        this.speed = 3;
                        break;
                    case 'mini-titan':
                        this.radius = 25;
                        this.color = '#ff69b4'; // Hot Pink
                        this.hp = 5;
                        this.speed = 1.5;
                        break;
                    case 'emerald':
                        this.radius = 50;
                        this.color = '#50c878'; // Emerald Green
                        this.hp = 150;
                        this.maxHp = 150;
                        this.speed = 1;
                        this.miniBossSpawned = false;
                        break;
                    case 'arrow':
                        this.radius = 6;
                        this.color = '#90ee90';
                        this.speed = 6;
                        break;
                    case 'grunt':
                    default:
                        this.color = '#00aaff'; // Blue
                        this.speed = Math.random() * 2 + 1;
                        break;
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                
                // Optimization: Only apply shadowBlur to bosses
                if (['sapphire', 'ruby', 'emerald'].includes(this.type)) {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = this.color;
                }
                
                ctx.beginPath();

                if (this.type === 'gravity-well') {
                    ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    // Inner pulse
                    ctx.beginPath();
                    ctx.arc(0, 0, this.radius * 0.5 + Math.sin(frame * 0.1) * 5, 0, Math.PI * 2);
                    ctx.stroke();
                } else if (this.type.startsWith('snake')) {
                    ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                } else if (this.type === 'repulsor') {
                    const spikes = 8;
                    const outerRadius = this.radius * 1.2;
                    const innerRadius = this.radius * 0.6;
                    ctx.beginPath();
                    for (let i = 0; i < spikes * 2; i++) {
                        const radius = i % 2 === 0 ? outerRadius : innerRadius;
                        const angle = (i * Math.PI) / spikes;
                        ctx.lineTo(radius * Math.cos(angle), radius * Math.sin(angle));
                    }
                    ctx.closePath();
                    ctx.fillStyle = this.color;
                    ctx.fill();
                } else if (this.type === 'proton' || this.type === 'spinner-mini' || this.type === 'mayfly') {
                    ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                } else if (this.type === 'sapphire') {
                    // Octagon
                    ctx.beginPath();
                    for (let i = 0; i < 8; i++) {
                        const angle = i * Math.PI / 4;
                        ctx.lineTo(Math.cos(angle) * this.radius, Math.sin(angle) * this.radius);
                    }
                    ctx.closePath();
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = 4;
                    ctx.stroke();
                } else if (this.type === 'ruby') {
                    // Hexagon
                    ctx.beginPath();
                    for (let i = 0; i < 6; i++) {
                        const angle = i * Math.PI / 3;
                        ctx.lineTo(Math.cos(angle) * this.radius, Math.sin(angle) * this.radius);
                    }
                    ctx.closePath();
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = 4;
                    ctx.stroke();
                } else if (this.type === 'emerald') {
                    // Star
                    ctx.beginPath();
                    for (let i = 0; i < 10; i++) {
                        const r = i % 2 === 0 ? this.radius : this.radius / 2;
                        const angle = i * Math.PI / 5;
                        ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
                    }
                    ctx.closePath();
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = 4;
                    ctx.stroke();
                } else if (this.type === 'dart') {
                    // Triangle
                    ctx.beginPath();
                    ctx.moveTo(this.radius, 0);
                    ctx.lineTo(-this.radius, this.radius/2);
                    ctx.lineTo(-this.radius, -this.radius/2);
                    ctx.closePath();
                    ctx.fillStyle = this.color;
                    ctx.fill();
                } else if (this.type === 'mini-titan') {
                    ctx.rect(-this.radius, -this.radius, this.radius*2, this.radius*2);
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = 3;
                    ctx.stroke();
                } else if (this.type === 'arrow') {
                    ctx.beginPath();
                    ctx.moveTo(this.radius, 0);
                    ctx.lineTo(-this.radius, this.radius/2);
                    ctx.lineTo(-this.radius, -this.radius/2);
                    ctx.closePath();
                    ctx.fillStyle = this.color;
                    ctx.fill();
                } else {
                    // Square/Diamond shape for Grunt, Weaver, Spinner
                    const size = this.radius * 0.7;
                    ctx.rect(-size, -size, size * 2, size * 2);
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    
                    // Inner X
                    ctx.beginPath();
                    ctx.moveTo(-size/2, -size/2);
                    ctx.lineTo(size/2, size/2);
                    ctx.moveTo(size/2, -size/2);
                    ctx.lineTo(-size/2, size/2);
                    ctx.stroke();
                }

                ctx.restore();
            }

            update() {
                if (!player.alive) return;

                // Safety check for NaN coordinates (prevents ghost enemies)
                if (isNaN(this.x) || isNaN(this.y)) {
                    this.markedForDeletion = true;
                    return;
                }

                const angleToPlayer = Math.atan2(player.y - this.y, player.x - this.x);

                // --- BEHAVIOR LOGIC ---
                let isDodging = false;
                if (this.type === 'weaver') {
                    for (const p of projectiles) {
                        if (Math.abs(p.x - this.x) > 120 || Math.abs(p.y - this.y) > 120) continue;
                        const distToProj = Math.hypot(p.x - this.x, p.y - this.y);
                        // Check if a projectile is within the "danger zone"
                        if (distToProj < 120) {
                            const angleFromProj = Math.atan2(this.y - p.y, this.x - p.x);
                            const projAngle = Math.atan2(p.velocity.y, p.velocity.x);
                            const angleDiff = Math.abs(angleFromProj - projAngle);

                            // If the projectile is heading towards us, dodge
                            if (angleDiff < 0.4) { 
                                // Dodge perpendicular to the bullet's path
                                const dodgeAngle = projAngle + Math.PI / 2;
                                this.velocity.x = Math.cos(dodgeAngle);
                                this.velocity.y = Math.sin(dodgeAngle);
                                isDodging = true;
                                break; // Only react to the first bullet found
                            }
                        }
                    }
                }

                // Gravity Well Logic
                if (this.type === 'gravity-well') {
                    // Keep it within the play area by bouncing off the edges
                    if ((this.x - this.radius < 0 && this.velocity.x < 0) || (this.x + this.radius > canvas.width && this.velocity.x > 0)) {
                        this.velocity.x *= -1;
                    }
                    if ((this.y - this.radius < 0 && this.velocity.y < 0) || (this.y + this.radius > canvas.height && this.velocity.y > 0)) {
                        this.velocity.y *= -1;
                    }

                    // Pull Player
                    const distToPlayer = Math.hypot(player.x - this.x, player.y - this.y);
                    if (distToPlayer > this.radius) {
                        player.velocity.x += (this.x - player.x) / distToPlayer * 0.05;
                        player.velocity.y += (this.y - player.y) / distToPlayer * 0.05;
                    }
                    // Pull Enemies
                    enemies.forEach(other => {
                        if (other !== this && other.type !== 'gravity-well') {
                            if (Math.abs(other.x - this.x) > 300 || Math.abs(other.y - this.y) > 300) return;
                            const dist = Math.hypot(other.x - this.x, other.y - this.y);
                            if (dist < 300) {
                                other.velocity.x += (this.x - other.x) / dist * 0.1;
                                other.velocity.y += (this.y - other.y) / dist * 0.1;
                            }
                        }
                    });
                }

                // Snake Body Logic
                if (this.type === 'snake-body') {
                    if (this.leader && !this.leader.markedForDeletion) {
                        const angleToLeader = Math.atan2(this.leader.y - this.y, this.leader.x - this.x);
                        const dist = Math.hypot(this.leader.x - this.x, this.leader.y - this.y);
                        if (dist > this.radius) { // Maintain distance
                            this.velocity.x = Math.cos(angleToLeader);
                            this.velocity.y = Math.sin(angleToLeader);
                        } else {
                            // Stop if close to leader to prevent jitter/overshoot
                            this.velocity.x = 0;
                            this.velocity.y = 0;
                        }
                    } else {
                        this.markedForDeletion = true; // Leader is dead
                    }
                }

                // --- BOSS BEHAVIORS ---
                if (this.type === 'sapphire') {
                    // Figure 8 pattern
                    this.x = canvas.width / 2 + Math.sin(frame * 0.02) * 300;
                    this.y = canvas.height / 2 + Math.sin(frame * 0.04) * 150;
                    
                    // Spawn Darts
                    if (frame % 60 === 0) {
                        enemies.push(new Enemy(this.x, this.y, 'dart'));
                    }
                    return; // Override default movement
                }

                if (this.type === 'ruby') {
                    // Aggressive Chase
                    const angle = Math.atan2(player.y - this.y, player.x - this.x);
                    this.velocity.x = Math.cos(angle);
                    this.velocity.y = Math.sin(angle);
                    
                    // Spawn Mini-Titans
                    if (frame % 120 === 0) {
                        enemies.push(new Enemy(this.x, this.y, 'mini-titan'));
                    }
                }

                if (this.type === 'emerald') {
                    const hpPercent = this.hp / this.maxHp;
                    
                    if (hpPercent > 0.66) {
                        // Phase 1: Stationary, Spawn Arrows
                        this.velocity = {x: 0, y: 0};
                        if (frame % 90 === 0) {
                            for(let i=-2; i<=2; i++) {
                                const arrow = new Enemy(this.x, this.y, 'arrow');
                                const angle = Math.atan2(player.y - this.y, player.x - this.x) + i * 0.2;
                                arrow.velocity.x = Math.cos(angle);
                                arrow.velocity.y = Math.sin(angle);
                                arrow.angle = angle; // Rotate sprite
                                enemies.push(arrow);
                            }
                        }
                    } else if (hpPercent > 0.33) {
                        // Phase 2: Spawn Mini-Boss
                        this.velocity = {x: 0, y: 0};
                        if (!this.miniBossSpawned) {
                            const mb = new Enemy(this.x, this.y + 100, 'ruby');
                            mb.hp = 40; // Reduced HP
                            mb.radius = 30;
                            enemies.push(mb);
                            this.miniBossSpawned = true;
                        }
                    } else {
                        // Phase 3: Chase
                        const angle = Math.atan2(player.y - this.y, player.x - this.x);
                        this.velocity.x = Math.cos(angle);
                        this.velocity.y = Math.sin(angle);
                    }
                }
                
                if (this.type === 'dart' || this.type === 'arrow') {
                     this.angle = Math.atan2(this.velocity.y, this.velocity.x);
                }

                // Default chase behavior if not performing a special action (like dodging)
                if (!isDodging && this.type !== 'gravity-well' && this.type !== 'snake-body' && !['sapphire', 'emerald', 'ruby'].includes(this.type)) {
                    this.velocity.x = Math.cos(angleToPlayer);
                    this.velocity.y = Math.sin(angleToPlayer);
                    
                    // Spinner Mini erratic movement
                    if (this.type === 'spinner-mini') {
                        this.angleOffset += 0.2;
                        this.velocity.x += Math.cos(this.angleOffset) * 0.5;
                        this.velocity.y += Math.sin(this.angleOffset) * 0.5;
                    }
                }
                // --- END BEHAVIOR LOGIC ---

                this.x += this.velocity.x * this.speed;
                this.y += this.velocity.y * this.speed;
                this.angle += this.spinSpeed;

                // New Rule: Despawn if enemy leaves the play area
                const offscreenBuffer = 100;
                if (this.x < -offscreenBuffer || this.x > canvas.width + offscreenBuffer ||
                    this.y < -offscreenBuffer || this.y > canvas.height + offscreenBuffer) {
                    this.markedForDeletion = true;
                }

                this.draw();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.radius = Math.random() * 2;
                const velocityMultiplier = Math.random() * 5;
                this.markedForDeletion = false;
                const angle = Math.random() * Math.PI * 2;
                this.velocity = {
                    x: Math.cos(angle) * velocityMultiplier,
                    y: Math.sin(angle) * velocityMultiplier
                };
                this.alpha = 1;
                this.friction = 0.97;
            }

            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.globalAlpha = 1;
            }

            update() {
                this.velocity.x *= this.friction;
                this.velocity.y *= this.friction;
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                if ((this.alpha -= 0.02) <= 0) this.markedForDeletion = true;
                this.draw();
            }
        }

        // --- GAME LOGIC ---

        let player = new Player(canvas.width / 2, canvas.height / 2);
        let projectiles = [];
        let enemies = [];
        let particles = [];
        
        function addScore(points) {
            score += points;
            scoreStreak += points;
            scoreEl.innerHTML = score;
            
            if (score >= nextLifeThreshold) {
                lives++;
                livesEl.innerHTML = lives;
                nextLifeThreshold += 15000;
                
                // Visual feedback
                const title = document.createElement('div');
                title.innerText = "EXTRA LIFE";
                title.style.position = 'absolute';
                title.style.top = '20%';
                title.style.left = '50%';
                title.style.transform = 'translate(-50%, -50%)';
                title.style.fontSize = '30px';
                title.style.color = '#ff0055';
                title.style.textShadow = '0 0 10px currentColor';
                title.style.fontWeight = 'bold';
                title.style.transition = 'opacity 1s';
                title.style.pointerEvents = 'none';
                document.body.appendChild(title);
                setTimeout(() => { title.style.opacity = '0'; setTimeout(() => title.remove(), 1000); }, 1000);
            }

            // Award bomb
            if (score >= nextBombThreshold) {
                bombs++;
                bombsEl.innerHTML = bombs;
                nextBombThreshold += 30000;

                // Visual feedback
                const title = document.createElement('div');
                title.innerText = "BOMB AWARDED";
                title.style.position = 'absolute';
                title.style.top = '25%';
                title.style.left = '50%';
                title.style.transform = 'translate(-50%, -50%)';
                title.style.fontSize = '30px';
                title.style.color = '#ffaa00';
                title.style.textShadow = '0 0 10px currentColor';
                title.style.fontWeight = 'bold';
                title.style.transition = 'opacity 1s';
                title.style.pointerEvents = 'none';
                document.body.appendChild(title);
                setTimeout(() => { title.style.opacity = '0'; setTimeout(() => title.remove(), 1000); }, 1000);
            }
        }

        function advanceLevel() {
            enemies.forEach(e => e.markedForDeletion = true); // Clear all enemies
            level++;
            levelFrame = 0;
            bossSpawned = false;
            levelEl.innerText = level;
            waveMsg.classList.add('hidden');
            const isBossLevel = level % 3 === 0;
            showLevelTitle(isBossLevel ? "BOSS FIGHT" : `LEVEL ${level}`, isBossLevel ? "red" : "white");
        }

        function showLevelTitle(text, color) {
            const title = document.createElement('div');
            title.innerText = text;
            title.style.position = 'absolute';
            title.style.top = '30%';
            title.style.left = '50%';
            title.style.transform = 'translate(-50%, -50%)';
            title.style.fontSize = '60px';
            title.style.color = color;
            title.style.textShadow = '0 0 20px currentColor';
            title.style.fontWeight = 'bold';
            title.style.transition = 'opacity 1s';
            document.body.appendChild(title);
            setTimeout(() => { title.style.opacity = '0'; setTimeout(() => title.remove(), 1000); }, 2000);
        }

        function spawnEnemies() {
            // Boss Level Logic
            if (level % 3 === 0) {
                if (!bossSpawned) {
                    let type = 'sapphire';
                    if (level === 6) type = 'ruby';
                    if (level === 9) type = 'emerald';
                    if (level > 9) type = ['sapphire', 'ruby', 'emerald'][Math.floor(Math.random()*3)];
                    
                    const boss = new Enemy(canvas.width/2, -100, type);
                    boss.y = 100; // Move into view
                    enemies.push(boss);
                    bossSpawned = true;
                }
                return; // Boss handles spawning
            }
            
            // Spawn every second
            if (frame % 60 !== 0) return;

            // Level Duration Check
            if (levelFrame > 1800) return;

            // Enemy Cap Logic: Scales from ~15 (Level 1) to ~100 (Level 10+)
            // This prevents overcrowding while allowing death spawns (Splitters) to exceed the limit.
            const enemyCap = 15 + (level * 8);
            if (enemies.length >= enemyCap) return;

            const radius = 30; // Increased padding for corner spawns

            // Every 5 seconds (300 frames), trigger a corner spawn event
            if (frame > 0 && frame % 300 === 0) {
                const corners = [
                    { x: -radius, y: -radius }, // Top-Left
                    { x: canvas.width + radius, y: -radius }, // Top-Right
                    { x: -radius, y: canvas.height + radius }, // Bottom-Left
                    { x: canvas.width + radius, y: canvas.height + radius } // Bottom-Right
                ];

                corners.forEach(corner => {
                    // Spawn a group of enemies at each corner. Group size increases with score.
                    const groupSize = 2 + Math.floor(score / 10000);
                    for (let i = 0; i < groupSize; i++) {
                        const spawnX = corner.x + (Math.random() - 0.5) * 100;
                        const spawnY = corner.y + (Math.random() - 0.5) * 100;
                        // For corner waves, use simpler enemies
                        const enemyType = Math.random() < 0.4 ? 'weaver' : 'grunt';
                        enemies.push(new Enemy(spawnX, spawnY, enemyType));
                    }
                });
                return; // Skip the regular spawn on this frame
            }

            // --- Regular Edge Spawn ---
            let x, y;
            
            // Spawn randomly on edges
            if (Math.random() < 0.5) {
                x = Math.random() < 0.5 ? 0 - radius : canvas.width + radius;
                y = Math.random() * canvas.height;
            } else {
                x = Math.random() * canvas.width;
                y = Math.random() < 0.5 ? 0 - radius : canvas.height + radius;
            }

            // Decide which enemy type to spawn
            const rand = Math.random();
            let enemyType;

            if (rand < 0.05 && frame > 600) { // Spawn snake after 10 seconds
                const head = new Enemy(x, y, 'snake-head');
                let lastSegment = head;
                for (let i = 0; i < 8; i++) { // 8 body segments
                    const segment = new Enemy(x, y, 'snake-body');
                    segment.leader = lastSegment;
                    segment.radius = head.radius * 0.8;
                    head.segments.push(segment);
                    enemies.push(segment);
                    lastSegment = segment;
                }
                enemies.push(head);
                return; // Exit after spawning snake
            } else if (rand < 0.12) { // Mayfly Swarm
                for (let i = 0; i < 12; i++) {
                    const mx = x + (Math.random() - 0.5) * 60;
                    const my = y + (Math.random() - 0.5) * 60;
                    enemies.push(new Enemy(mx, my, 'mayfly'));
                }
                return;
            } else if (rand < 0.20) enemyType = 'repulsor';
            else if (rand < 0.28) enemyType = 'gravity-well';
            else if (rand < 0.45) enemyType = 'spinner';
            else if (rand < 0.65) enemyType = 'weaver';
            else enemyType = 'grunt';

            enemies.push(new Enemy(x, y, enemyType));
        }

        function useBomb() {
            if (bombs <= 0 || !gameActive || bombEffect.active) return;

            bombs--;
            bombsEl.innerHTML = bombs;
            sounds.bomb();

            // Trigger visual effect. The actual destruction is handled
            // by the growing circle in the animate() loop.
            bombEffect.active = true;
            bombEffect.radius = 0;
            bombEffect.alpha = 1;
        }

        function createExplosion(x, y, color) {
            sounds.explode();
            for (let i = 0; i < 15; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function resetGame() {
            score = 0;
            scoreStreak = 0;
            lives = 3;
            nextLifeThreshold = 15000;
            bombs = 3;
            nextBombThreshold = 30000;
            scoreEl.innerHTML = score;
            livesEl.innerHTML = lives;
            bombsEl.innerHTML = bombs;
            level = 1;
            levelFrame = 0;
            bossSpawned = false;
            waveMsg.classList.add('hidden');
            showLinesCheck.checked = false; debugShowLines = false;
            infiniteLivesCheck.checked = false; infiniteLives = false;
            levelEl.innerText = level;
            projectiles = [];
            enemies = [];
            particles = [];
            player = new Player(canvas.width / 2, canvas.height / 2);
            gameActive = true;
            startScreen.classList.add('hidden');
            sounds.startMusic();
            animate();
            showLevelTitle("LEVEL 1", "white");
        }

        function gameOver() {
            gameActive = false;
            cancelAnimationFrame(animationId);
            startScreen.classList.remove('hidden');
            finalScoreMsg.innerText = `Final Score: ${score}`;
            startBtn.innerText = "Play Again";
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('geoWarsHighScore', highScore);
                highScoreEl.innerHTML = highScore;
            }
            pollGamepadsForStart();
        }

        function animate() {
            if (!gameActive) return;
            animationId = requestAnimationFrame(animate);
            
            const now = performance.now();
            fpsFrames++;
            if (now - lastTime >= 1000) {
                fpsCounterEl.innerText = `FPS: ${fpsFrames}`;
                fpsFrames = 0;
                lastTime = now;
            }

            frame++;
            levelFrame++;
            enemiesAliveCounterEl.innerText = `Enemies Alive: ${enemies.length}`;

            // Level Progression
            if (level % 3 !== 0) {
                if (levelFrame > 1800) {
                    if (enemies.length === 0) {
                        advanceLevel();
                        waveMsg.classList.add('hidden');
                    } else {
                        waveMsg.innerText = `ENEMIES REMAINING: ${enemies.length}`;
                        waveMsg.classList.remove('hidden');
                    }
                } else {
                    waveMsg.classList.add('hidden');
                }
            } else {
                // Boss Level Failsafe: If boss is gone (e.g. rammed by player), advance
                if (bossSpawned && enemies.length === 0) {
                    advanceLevel();
                }
            }

            // Clear Canvas with fade effect for trails
            ctx.fillStyle = 'rgba(5, 5, 5, 0.3)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Bomb Effect
            if (bombEffect.active) {
                bombEffect.radius += 50; // Fast expansion
                bombEffect.alpha -= 0.02;

                if (bombEffect.alpha <= 0) {
                    bombEffect.active = false;
                } else {
                    // Check for enemy hits
                    enemies.forEach(enemy => {
                        const dist = Math.hypot(player.x - enemy.x, player.y - enemy.y);
                        if (dist < bombEffect.radius + enemy.radius) {
                            enemy.markedForDeletion = true;
                            createExplosion(enemy.x, enemy.y, enemy.color);
                            addScore(100); // Score for bomb kill
                        }
                    });

                    ctx.save();
                    ctx.beginPath();
                    ctx.arc(player.x, player.y, bombEffect.radius, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(255, 255, 255, ${bombEffect.alpha})`;
                    ctx.lineWidth = 10;
                    ctx.stroke();
                    ctx.restore();
                }
            }

            if (debugShowLines) {
                ctx.save();
                ctx.strokeStyle = 'rgba(255, 0, 0, 0.5)';
                ctx.lineWidth = 1;
                enemies.forEach(e => {
                    ctx.beginPath();
                    ctx.moveTo(player.x, player.y);
                    ctx.lineTo(e.x, e.y);
                    ctx.stroke();
                });
                ctx.restore();
            }

            player.update();

            // Update Particles
            particles.forEach(p => p.update());

            // Update Projectiles
            projectiles.forEach((projectile, index) => {
                projectile.update();

                // Remove off-screen projectiles
                if (projectile.x + projectile.radius < 0 ||
                    projectile.x - projectile.radius > canvas.width ||
                    projectile.y + projectile.radius < 0 ||
                    projectile.y - projectile.radius > canvas.height) {
                    projectile.markedForDeletion = true;
                }
            });

            // Update Enemies
            enemies.forEach((enemy, index) => {
                enemy.update();

                // Collision: Projectile vs Enemy
                projectiles.forEach((projectile, pIndex) => {
                    // Optimization: Bounding box check
                    if (Math.abs(projectile.x - enemy.x) > enemy.radius + projectile.radius + 5 ||
                        Math.abs(projectile.y - enemy.y) > enemy.radius + projectile.radius + 5) return;

                    const dist = Math.hypot(projectile.x - enemy.x, projectile.y - enemy.y);

                    if (dist - enemy.radius - projectile.radius < 1) {
                        if (enemy.markedForDeletion) return;

                        if (enemy.type === 'snake-body') return; // snake bodies are invulnerable

                        // Emerald Deflection (Phase 3)
                        if (enemy.type === 'emerald' && enemy.hp < enemy.maxHp * 0.33) {
                            if (Math.random() < 0.5) {
                                createExplosion(projectile.x, projectile.y, '#fff'); // Spark
                                projectile.markedForDeletion = true;
                                return;
                            }
                        }

                        // Hit!
                        createExplosion(enemy.x, enemy.y, enemy.color);
                        
                        enemy.hp--;
                        projectile.markedForDeletion = true;

                        if (enemy.hp <= 0) {
                            enemy.markedForDeletion = true;
                            // Increase Score
                            const points = (enemy.type === 'gravity-well' ? 500 : 100);
                            addScore(points);

                            // Death Spawns
                            if (enemy.type === 'spinner') {
                                for(let i=0; i<3; i++) {
                                    enemies.push(new Enemy(enemy.x, enemy.y, 'spinner-mini'));
                                }
                            } else if (enemy.type === 'mini-titan') {
                                for(let i=0; i<4; i++) {
                                    enemies.push(new Enemy(enemy.x, enemy.y, 'grunt'));
                                }
                            } else if (['sapphire', 'ruby', 'emerald'].includes(enemy.type)) {
                                // Boss Defeated
                                addScore(5000);
                                advanceLevel();
                            } else if (enemy.type === 'snake-head') {
                                addScore(1000);
                                enemy.segments.forEach(seg => seg.markedForDeletion = true);
                            } else if (enemy.type === 'gravity-well') {
                                for(let i=0; i<6; i++) {
                                    const p = new Enemy(enemy.x, enemy.y, 'proton');
                                    p.velocity.x = (Math.random() - 0.5) * 10;
                                    p.velocity.y = (Math.random() - 0.5) * 10;
                                    enemies.push(p);
                                }
                            }
                        }
                    }
                });

                // Gravity Well Absorption Logic
                if (enemy.type === 'gravity-well') {
                    enemies.forEach((other, otherIndex) => {
                        if (other !== enemy && other.type !== 'gravity-well' && other.type !== 'proton') {
                            if (Math.abs(enemy.x - other.x) > enemy.radius + other.radius + 5 ||
                                Math.abs(enemy.y - other.y) > enemy.radius + other.radius + 5) return;

                            const dist = Math.hypot(enemy.x - other.x, enemy.y - other.y);
                            if (dist < enemy.radius + other.radius) {
                                // Absorb
                                createExplosion(other.x, other.y, enemy.color);
                                other.markedForDeletion = true;
                                enemy.absorbed++;
                                
                                // Overload
                                if (enemy.absorbed >= 5) {
                                    enemy.hp = 0; // Trigger death logic next frame or force it now
                                    // For simplicity, we let the next bullet kill it or just leave it at 0 HP logic? 
                                    // Let's force kill it by setting HP to 0 and letting bullet logic handle it? 
                                    // No, bullet logic only runs on hit. We need to force kill here.
                                    // Re-using the death spawn logic is complex without refactoring, 
                                    // so let's just spawn protons here manually.
                                    for(let i=0; i<8; i++) {
                                        const p = new Enemy(enemy.x, enemy.y, 'proton');
                                        p.velocity.x = (Math.random() - 0.5) * 15;
                                        p.velocity.y = (Math.random() - 0.5) * 15;
                                        enemies.push(p);
                                    }
                                    enemy.markedForDeletion = true;
                                }
                            }
                        }
                    });
                }

                // Collision: Enemy vs Player
                if (player.alive && !player.invulnerable) {
                    const dist = Math.hypot(player.x - enemy.x, player.y - enemy.y);
                    if (dist - enemy.radius - player.radius < 1) {
                        // Player Hit
                        createExplosion(player.x, player.y, player.color);
                        if (!infiniteLives) {
                            lives--;
                            livesEl.innerHTML = lives;
                            scoreStreak = 0;
                        }
                        
                        // Kill enemy that hit player
                        enemy.markedForDeletion = true;

                        if (['sapphire', 'ruby', 'emerald'].includes(enemy.type)) {
                            addScore(5000);
                            advanceLevel();
                        }

                        if (lives <= 0 && !infiniteLives) {
                            player.alive = false;
                            setTimeout(gameOver, 1000); // Wait a second to see explosion
                        } else {
                            player.respawn();
                        }
                    }
                }
            });

            // Cleanup marked objects
            enemies = enemies.filter(e => !e.markedForDeletion);
            projectiles = projectiles.filter(p => !p.markedForDeletion);
            particles = particles.filter(p => !p.markedForDeletion);

            spawnEnemies();
        }

        function pollGamepadsForStart() {
            if (gameActive) return;
            
            const gamepads = navigator.getGamepads();
            for (const gp of gamepads) {
                if (gp && gp.buttons.some(b => b.pressed)) {
                    if (audioCtx.state === 'suspended') audioCtx.resume();
                    resetGame();
                    return;
                }
            }
            requestAnimationFrame(pollGamepadsForStart);
        }

        startBtn.addEventListener('click', () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            resetGame();
        });

        pollGamepadsForStart();
    </script>
</body>

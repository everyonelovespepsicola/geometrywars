<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Geometry Shooter</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505; /* Deep black */
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }

        canvas {
            display: block;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none; /* Let clicks pass through to canvas */
            text-shadow: 0 0 10px #fff;
        }

        .hud-text {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        #start-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border: 2px solid cyan;
            box-shadow: 0 0 20px cyan;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        button {
            background: transparent;
            color: cyan;
            border: 2px solid cyan;
            padding: 10px 20px;
            font-family: inherit;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
        }

        button:hover {
            background: cyan;
            color: black;
            box-shadow: 0 0 15px cyan;
        }

        .hidden {
            display: none !important;
        }
        
        #controls-hint {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
        }

        #pause-menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid cyan;
            box-shadow: 0 0 20px cyan;
            color: white;
            padding: 20px;
            border-radius: 10px;
            z-index: 101;
            display: flex;
            flex-direction: column;
            gap: 15px;
            text-align: center;
            min-width: 250px;
        }

        #pause-menu h3 {
            margin: 0 0 10px 0;
            color: cyan;
            text-shadow: 0 0 10px cyan;
            font-size: 28px;
            text-transform: uppercase;
        }

        #pause-menu div {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        #fps-counter {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            pointer-events: none;
        }

        #enemies-alive-counter {
            position: absolute;
            bottom: 40px;
            right: 20px;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            pointer-events: none;
        }

        #wave-msg {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            color: #ff0055;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px #ff0055;
            pointer-events: none;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <!-- UI Overlay -->
    <div id="ui-layer">
        <div class="hud-text">SCORE: <span id="scoreEl">0</span></div>
        <div class="hud-text" style="color: #ffff00;">HIGH: <span id="highScoreEl">0</span></div>
        <div class="hud-text" style="color: #ff0055;">LIVES: <span id="livesEl">3</span></div>
        <div class="hud-text" style="color: #00ffaa;">LEVEL: <span id="levelEl">1</span></div>
        <div class="hud-text" style="color: #ffaa00;">BOMBS: <span id="bombsEl">3</span></div>
    </div>

    <div id="wave-msg" class="hidden"></div>
    <div id="controls-hint">WASD/Left Stick to Move | Click/Right Stick to Shoot | 'B'/RT for Bomb | 'F' for Fullscreen</div>
    <div id="fps-counter">FPS: 0</div>
    <div id="enemies-alive-counter">Enemies Alive: 0</div>

    <!-- Start / Game Over Screen -->
    <!-- MIDI Player Injection -->
    <audio id="bg-music" loop>
        <source src="track1.mp3" type="audio/mpeg">
    </audio>

    <div id="start-screen">
        <h1 style="margin:0; text-shadow: 0 0 10px cyan;">NEON WARS</h1>
        <p id="final-score-msg" style="font-size: 14px; color: #aaa;">Defend the grid.</p>
        <button id="start-btn">Start Game</button>
    </div>

    <div id="pause-menu" class="hidden">
        <h3>Paused</h3>
        <button id="resume-btn">Resume</button>
        <hr style="border-color: cyan; width: 100%; opacity: 0.5;">
        <h4 style="margin: 0; color: #ffff00;">Debug Tools</h4>
        <div>
            <input type="checkbox" id="infinite-lives-check">
            <label for="infinite-lives-check">Infinite Lives</label>
        </div>
        <div>
            <input type="checkbox" id="show-lines-check">
            <label for="show-lines-check">Show Enemy Lines</label>
        </div>
        <button id="skip-level-btn">Skip Level</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // --- AUDIO SYSTEM ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // Generate Noise Buffer for Explosions
        const noiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
        const noiseData = noiseBuffer.getChannelData(0);
        for (let i = 0; i < noiseBuffer.length; i++) {
            noiseData[i] = Math.random() * 2 - 1;
        }

        const sounds = {
            shoot: () => {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                osc.type = 'triangle';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);

                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);

                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            },
            explode: () => {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const src = audioCtx.createBufferSource();
                src.buffer = noiseBuffer;
                const gain = audioCtx.createGain();
                const filter = audioCtx.createBiquadFilter();

                src.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);

                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(1000, audioCtx.currentTime);
                filter.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);

                gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);

                src.start();
                src.stop(audioCtx.currentTime + 0.3);
            },
            bomb: () => {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const src = audioCtx.createBufferSource();
                src.buffer = noiseBuffer;
                const gain = audioCtx.createGain();
                const filter = audioCtx.createBiquadFilter();

                src.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);

                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(400, audioCtx.currentTime);
                filter.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.8);

                gain.gain.setValueAtTime(0.8, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);

                src.start();
                src.stop(audioCtx.currentTime + 0.8);
            },
            collect: () => {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.05);

                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);

                osc.start();
                osc.stop(audioCtx.currentTime + 0.05);
            }
        };

        // --- MUSIC SYSTEM ---
        let musicPlaying = false;
        let musicSchedulerId = null;

        sounds.startMusic = () => {
            const player = document.getElementById('bg-music');
            if (player) {
                player.volume = 0.6;
                player.play().catch(e => console.error("Music failed:", e));
                musicPlaying = true;
            }
        };

        // UI Elements
        const scoreEl = document.getElementById('scoreEl');
        const highScoreEl = document.getElementById('highScoreEl');
        const livesEl = document.getElementById('livesEl');
        const levelEl = document.getElementById('levelEl');
        const startScreen = document.getElementById('start-screen');
        const bombsEl = document.getElementById('bombsEl');
        const startBtn = document.getElementById('start-btn');
        const finalScoreMsg = document.getElementById('final-score-msg');
        const pauseMenu = document.getElementById('pause-menu');
        const resumeBtn = document.getElementById('resume-btn');
        const infiniteLivesCheck = document.getElementById('infinite-lives-check');
        const showLinesCheck = document.getElementById('show-lines-check');
        const skipLevelBtn = document.getElementById('skip-level-btn');
        const fpsCounterEl = document.getElementById('fps-counter');
        const enemiesAliveCounterEl = document.getElementById('enemies-alive-counter');
        const waveMsg = document.getElementById('wave-msg');

        // Game State
        let animationId;
        let score = 0;
        let scoreStreak = 0;
        let highScore = localStorage.getItem('geoWarsHighScore') || 0;
        let lives = 3; 
        let bombs = 3;
        let gameActive = false;
        let isPaused = false;
        let frame = 0;
        let level = 1;
        let levelFrame = 0;
        let bossSpawned = false;
        let infiniteLives = false;
        let debugShowLines = false;
        let lastTime = performance.now();
        let lastTimeForDt = performance.now();
        let fpsFrames = 0;
        let nextLifeThreshold = 15000;
        let nextBombThreshold = 30000;
        let bombEffect = { active: false, radius: 0, alpha: 0 };
        let hexSpawnTimers = [8, 16, 24]; // Times in seconds to guarantee a hex spawn
        let hexSpawnsTriggered = 0;
        let orbs = [];
        let projectilePool;
        let particlePool;
        let grid;

        // World and Camera
        const world = { width: 3000, height: 2000 };
        const camera = {
            x: world.width / 2,
            y: world.height / 2,
            zoom: 1.5,
            lerpFactor: 0.05 // Smoothing factor for camera movement
        };

        highScoreEl.innerHTML = highScore;

        // Resize Handling
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Input Handling
        const mouse = { screenX: canvas.width / 2, screenY: canvas.height / 2, x: 0, y: 0, down: false };
        const keys = { w: false, a: false, s: false, d: false };

        // Gamepad State
        let inputMode = 'mouse';
        let gamepadIndex = null;
        let rightTriggerPressed = false;
        let bombKeyPressed = false;
        let startButtonPressed = false;

        window.addEventListener('keydown', (e) => { // Combined keydown listener
            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) keys[key] = true;

            if (key === 'escape') {
                togglePause();
            }

            if (key === 'f') {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => {});
                } else {
                    document.exitFullscreen();
                }
            }
            if (key === 'b' && !bombKeyPressed) {
                useBomb();
                bombKeyPressed = true;
            }
        });

        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if(keys.hasOwnProperty(key)) {
                keys[key] = false;
            }
            if (key === 'b') bombKeyPressed = false;
        });

        window.addEventListener('gamepadconnected', (e) => {
            gamepadIndex = e.gamepad.index;
        });

        window.addEventListener('gamepaddisconnected', (e) => {
            if (gamepadIndex === e.gamepad.index) {
                gamepadIndex = null;
            }
        });

        window.addEventListener('mousemove', (event) => {
            mouse.screenX = event.clientX;
            mouse.screenY = event.clientY;
            inputMode = 'mouse';
        });

        window.addEventListener('mousedown', () => { mouse.down = true; });
        window.addEventListener('mouseup', () => { mouse.down = false; });




        resumeBtn.addEventListener('click', togglePause);

        infiniteLivesCheck.addEventListener('change', (e) => {
            infiniteLives = e.target.checked;
        });

        showLinesCheck.addEventListener('change', (e) => {
            debugShowLines = e.target.checked;
        });

        skipLevelBtn.addEventListener('click', () => {
            if (gameActive) {
                advanceLevel();
            }
        });

        // --- CLASSES ---

        class Point {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.baseX = x;
                this.baseY = y;
                this.velX = 0;
                this.velY = 0;
                this.mass = 2;
                this.stiffness = 0.025;
                this.damping = 0.92;
            }

            update() {
                let forceX = (this.baseX - this.x) * this.stiffness;
                let forceY = (this.baseY - this.y) * this.stiffness;
                this.velX += forceX / this.mass;
                this.velY += forceY / this.mass;
                this.velX *= this.damping;
                this.velY *= this.damping;
                this.x += this.velX;
                this.y += this.velY;
            }
        }

        class Grid {
            constructor(width, height, spacing) {
                this.width = width;
                this.height = height;
                this.spacing = spacing;
                this.cols = Math.ceil(width / spacing) + 1;
               this.cols = Math.ceil(width / spacing) + 1;
                this.rows = Math.ceil(height / spacing) + 1;
                this.points = [];
                for (let y = 0; y < this.rows; y++) {
                    let row = [];
                    for (let x = 0; x < this.cols; x++) {
                        row.push(new Point(x * spacing, y * spacing));
                    }
                    this.points.push(row);
                }
            }
            applyForce(x, y, radius, force) {
                const minCol = Math.max(0, Math.floor((x - radius) / this.spacing));
                const maxCol = Math.min(this.cols - 1, Math.ceil((x + radius) / this.spacing));
                const minRow = Math.max(0, Math.floor((y - radius) / this.spacing));
                const maxRow = Math.min(this.rows - 1, Math.ceil((y + radius) / this.spacing));

                for (let r = minRow; r <= maxRow; r++) {
                    for (let c = minCol; c <= maxCol; c++) {
                        const p = this.points[r][c];
                        const dx = p.x - x;
                        const dy = p.y - y;
                        const distSq = dx * dx + dy * dy;
                        if (distSq < radius * radius) {
                            const dist = Math.sqrt(distSq);
                            const f = (1 - dist / radius) * force;
                            const angle = Math.atan2(dy, dx);
                            p.velX += Math.cos(angle) * f;
                            p.velY += Math.sin(angle) * f;
                        }
                    }
                }
            }

            update() {
                for (let r = 0; r < this.rows; r++) {
                    for (let c = 0; c < this.cols; c++) {
                        this.points[r][c].update();
                    }
                }
            }
            draw(ctx, view) {
                ctx.save();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
                ctx.lineWidth = 1;

                const minCol = Math.max(0, Math.floor((view.x - this.spacing) / this.spacing));
                const maxCol = Math.min(this.cols - 1, Math.ceil((view.x + view.width + this.spacing) / this.spacing));
                const minRow = Math.max(0, Math.floor((view.y - this.spacing) / this.spacing));
                const maxRow = Math.min(this.rows - 1, Math.ceil((view.y + view.height + this.spacing) / this.spacing));

                for (let r = minRow; r <= maxRow; r++) {
                    ctx.beginPath();
                    for (let c = minCol; c <= maxCol; c++) {
                        const p = this.points[r][c];
                        if (c === minCol) ctx.moveTo(p.x, p.y);
                        else ctx.lineTo(p.x, p.y);
                    }
                    ctx.stroke();
                }

                for (let c = minCol; c <= maxCol; c++) {
                    ctx.beginPath();
                    for (let r = minRow; r <= maxRow; r++) {
                        const p = this.points[r][c];
                        if (r === 0) ctx.moveTo(p.x, p.y);
                        else ctx.lineTo(p.x, p.y);
                    }
                    ctx.stroke();
                }
                ctx.restore();
            }
        }

        class Pool {
            constructor(objectClass, initialSize = 100) {
                this.objectClass = objectClass;
                this.pool = [];
                for (let i = 0; i < initialSize; i++) {
                    this.pool.push(new this.objectClass());
                }
            }

            get() {
                if (this.pool.length > 0) {
                    return this.pool.pop();
                }
                // Pool is empty, create a new one (allows for spikes)
                return new this.objectClass();
            }

            release(obj) {
                // Could add a check to ensure we don't add too many back
                this.pool.push(obj);
            }
        }

        class Player {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 15;
                this.color = '#ffffff'; // White
                this.velocity = { x: 0, y: 0 };
            this.speed = 0.231; // Terminal velocity gives a max speed of 7.7 (10% faster than the 'repulsor')
                this.friction = 0.97;
                this.alive = true;
                this.invulnerable = false;
                this.aimAngle = 0;
                this.facingAngle = 0;
                this.triggerLocked = false;
                this.lastShotTime = 0;
                this.shootCooldownMs = 80; // Milliseconds
            }

            draw(ctx) {
                if (!this.alive) return;

                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.facingAngle);

                // Draw Ship (Claw Design)
                ctx.beginPath();
                ctx.moveTo(20, -8);  // Top Front Tip
                ctx.lineTo(10, 0);   // Inner Mouth
                ctx.lineTo(20, 8);   // Bottom Front Tip
                ctx.lineTo(-12, 12); // Bottom Back Wing
                ctx.lineTo(-6, 0);   // Rear Notch
                ctx.lineTo(-12, -12);// Top Back Wing
                ctx.closePath();

                // Manual glow (faster than shadowBlur)
                ctx.save();
                ctx.globalAlpha = 0.5;
                ctx.lineWidth = 8;
                ctx.strokeStyle = this.color;
                ctx.stroke(); // Strokes the main path for the glow effect
                ctx.restore();

                // Draw the main ship outline
                ctx.lineWidth = 2;
                ctx.strokeStyle = this.invulnerable && frame % 10 < 5 ? 'transparent' : this.color;
                ctx.stroke();

                // Inner Core
                ctx.beginPath();
                ctx.moveTo(-2, 0);
                ctx.lineTo(-8, -4);
                ctx.lineTo(-8, 4);
                ctx.closePath();

                // Fill and stroke the ship's core
                ctx.fillStyle = this.invulnerable && frame % 10 < 5 ? 'transparent' : this.color;
                ctx.fill();
                ctx.stroke();
                
                ctx.restore();
            }

            update(dt, now) {
                if (!this.alive) return;

                // Movement Logic
                if (keys.w) this.velocity.y -= 1;
                if (keys.s) this.velocity.y += 1;
                if (keys.a) this.velocity.x -= 1;
                if (keys.d) this.velocity.x += 1;

                let rightStickActive = false;

                // Gamepad Input
                if (gamepadIndex !== null) {
                    const gp = navigator.getGamepads()[gamepadIndex];
                    if (gp) {
                        const deadzone = 0.1;
                        
                        // Left Stick (Move)
                        const lx = gp.axes[0];
                        const ly = gp.axes[1];
                        if (Math.abs(lx) > deadzone || Math.abs(ly) > deadzone) {
                            this.velocity.x += lx;
                            this.velocity.y += ly;
                            inputMode = 'gamepad';
                        }

                        // Right Stick (Aim)
                        const rx = gp.axes[2];
                        const ry = gp.axes[3];
                        if (Math.hypot(rx, ry) > deadzone) {
                            rightStickActive = true;
                            this.aimAngle = Math.atan2(ry, rx);
                            inputMode = 'gamepad';
                            
                            // Power-ups modify cooldown
                            this.shootCooldownMs = (scoreStreak >= 20000) ? 20 : 80;

                            // Twin-stick auto-fire
                            if (now > this.lastShotTime + this.shootCooldownMs) {
                                this.shoot(now);
                            }
                        }

                        // Right Trigger (Bomb) - Button 7 is common for RT
                        if (gp.buttons[7] && gp.buttons[7].pressed) {
                            if (!rightTriggerPressed) {
                                useBomb();
                                rightTriggerPressed = true;
                            }
                        } else {
                            rightTriggerPressed = false;
                        }
                    }
                }

                // Unified Aiming Logic: Fallback to mouse if right stick is not active
                if (!rightStickActive) { // Mouse aiming
                    this.aimAngle = Math.atan2(mouse.y - this.y, mouse.x - this.x);
                    if (mouse.down) {
                        // Power-ups modify cooldown
                        this.shootCooldownMs = (scoreStreak >= 20000) ? 20 : 80;
                        if (now > this.lastShotTime + this.shootCooldownMs) {
                            this.shoot(now);
                        }
                    }
                }

                // Apply velocity
                this.x += this.velocity.x * this.speed * 60 * dt;
                this.y += this.velocity.y * this.speed * 60 * dt;

                // Friction
                // Use Math.pow to make friction frame-rate independent
                const frictionFactor = Math.pow(this.friction, dt * 60);
                this.velocity.x *= frictionFactor;
                this.velocity.y *= frictionFactor;

                // Wall Boundaries
                if (this.x - this.radius < 0) this.x = this.radius;
                if (this.x + this.radius > world.width) this.x = world.width - this.radius;
                if (this.y - this.radius < 0) this.y = this.radius;
                if (this.y + this.radius > world.height) this.y = world.height - this.radius;

                // Update facing direction based on movement
                const speed = Math.hypot(this.velocity.x, this.velocity.y);
                // Only update angle if moving to prevent jitter and keep last direction when stopped
                if (speed > 0.01) { 
                    this.facingAngle = Math.atan2(this.velocity.y, this.velocity.x);
                }
            }

            shoot(now) {
                this.lastShotTime = now;
                sounds.shoot();
                const isSpread = scoreStreak >= 10000 && scoreStreak < 20000;

                const velocity = {
                    x: Math.cos(this.aimAngle) * 12,
                    y: Math.sin(this.aimAngle) * 12
                };
                projectiles.push(projectilePool.get().init(
                    this.x + Math.cos(this.aimAngle) * 20, 
                    this.y + Math.sin(this.aimAngle) * 20, 
                    velocity
                ));

                if (isSpread) {
                    const spread = 0.25;
                    const angles = [this.aimAngle - spread, this.aimAngle + spread];
                    angles.forEach(angle => {
                        const vel = { x: Math.cos(angle) * 12, y: Math.sin(angle) * 12 };
                        projectiles.push(projectilePool.get().init(
                            this.x + Math.cos(angle) * 20, 
                            this.y + Math.sin(angle) * 20, 
                            vel
                        ));
                    });
                }
            }
            
            respawn() {
                this.velocity = { x: 0, y: 0 };
                this.alive = true;
                this.invulnerable = true;
                setTimeout(() => { this.invulnerable = false; }, 2000);
            }
        }

        class Projectile {
            constructor() {
                // Initialize with default/empty values
                this.x = 0;
                this.y = 0;
                this.velocity = { x: 0, y: 0 };
                this.radius = 3;
                this.color = '#ffff00';
                this.markedForDeletion = false;
            }

            init(x, y, velocity) {
                this.x = x;
                this.y = y;
                this.velocity = velocity;
                this.markedForDeletion = false;
                return this; // for chaining
            }

            draw(ctx, view) {
                // Culling check
                if (this.x + this.radius < view.x - view.buffer || this.x - this.radius > view.x + view.width + view.buffer ||
                    this.y + this.radius < view.y - view.buffer || this.y - this.radius > view.y + view.height + view.buffer) {
                    return;
                }
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2, false);
                ctx.fill();
            }

            update(dt) {
                this.x += this.velocity.x * 60 * dt;
                this.y += this.velocity.y * 60 * dt;
            }
        }

        class Enemy {
            constructor(x, y, type = 'grunt') {
                this.x = x;
                this.y = y;
                this.radius = 15;
                this.type = type;
                this.velocity = { x: 0, y: 0 };
                this.angle = 0;
                this.spinSpeed = Math.random() * 0.1 - 0.05;
                this.hp = 1;
                this.absorbed = 0; // For Gravity Well
                this.markedForDeletion = false;
                this.dodgeCooldown = 0;
                this.maxHp = 1; // Default

                switch (this.type) {
                    case 'weaver':
                        this.color = '#00ff00'; // Green
                        this.speed = Math.random() * 1.5 + 1;
                        break;
                    case 'spinner':
                        this.color = '#aa00ff'; // Purple
                        this.speed = Math.random() * 1 + 0.5;
                        break;
                    case 'spinner-mini':
                        this.radius = 8;
                        this.color = '#d040ff'; // Light Purple
                        this.speed = 3.5;
                        this.angleOffset = Math.random() * Math.PI * 2;
                        break;
                    case 'gravity-well':
                        this.radius = 25;
                        this.color = '#ff0000'; // Red
                        this.speed = 0.25;
                        this.hp = 10;
                        const gwAngle = Math.random() * Math.PI * 2;
                        this.velocity = { x: Math.cos(gwAngle), y: Math.sin(gwAngle) };
                        break;
                    case 'proton':
                        this.radius = 6;
                        this.color = '#ffaa00'; // Orange
                        this.speed = 5;
                        break;
                    case 'mayfly':
                        this.radius = 20; // Doubled size again
                        this.color = '#ff00ff'; // Magenta
                        this.speed = 3.5 + Math.random(); // Fast and variable
                        break;
                    case 'snake-head':
                        this.color = '#dfff00'; // Chartreuse
                        this.speed = 3.5;
                        this.segments = [];
                        this.hp = 10; // Increased HP to match Gravity Well
                        break;
                    case 'snake-body':
                        this.color = '#9acd32'; // YellowGreen
                        this.speed = 3.5;
                        this.hp = Infinity; // Invulnerable to direct shots
                        break;
                    case 'repulsor':
                        this.color = '#ff8c00'; // DarkOrange
                        this.speed = 7;
                        break;
                    case 'hex-dodger':
                        this.radius = 22.5; // 50% larger than standard 15
                        this.color = '#008080'; // Teal
                        this.speed = 3;
                        this.hp = 10;
                        break;
                    case 'sapphire':
                        this.radius = 40;
                        this.color = '#0f52ba'; // Sapphire Blue
                        this.hp = 50;
                        this.maxHp = 50;
                        this.speed = 2;
                        break;
                    case 'dart':
                        this.radius = 8;
                        this.color = '#00ffff';
                        this.speed = 4;
                        break;
                    case 'ruby':
                        this.radius = 45;
                        this.color = '#e0115f'; // Ruby Red
                        this.hp = 80;
                        this.maxHp = 80;
                        this.speed = 3;
                        break;
                    case 'mini-titan':
                        this.radius = 25;
                        this.color = '#ff69b4'; // Hot Pink
                        this.hp = 5;
                        this.speed = 1.5;
                        break;
                    case 'emerald':
                        this.radius = 50;
                        this.color = '#50c878'; // Emerald Green
                        this.hp = 150;
                        this.maxHp = 150;
                        this.speed = 1;
                        this.miniBossSpawned = false;
                        break;
                    case 'arrow':
                        this.radius = 6;
                        this.color = '#90ee90';
                        this.speed = 6;
                        break;
                    case 'grunt':
                    default:
                        this.color = '#00aaff'; // Blue
                        this.speed = Math.random() * 2 + 1;
                        break;
                }
            }

            draw(ctx, view) {
                // Culling check
                if (this.x + this.radius < view.x - view.buffer || this.x - this.radius > view.x + view.width + view.buffer ||
                    this.y + this.radius < view.y - view.buffer || this.y - this.radius > view.y + view.height + view.buffer) {
                    return;
                }

                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                
                // Optimization: Only apply shadowBlur to bosses
                if (['sapphire', 'ruby', 'emerald'].includes(this.type)) {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = this.color;
                }
                
                ctx.beginPath();

                if (this.type === 'gravity-well') {
                    ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    // Inner pulse
                    ctx.beginPath();
                    ctx.arc(0, 0, this.radius * 0.5 + Math.sin(frame * 0.1) * 5, 0, Math.PI * 2);
                    ctx.stroke();
                } else if (this.type.startsWith('snake')) {
                    ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                } else if (this.type === 'repulsor') {
                    const spikes = 8;
                    const outerRadius = this.radius * 1.2;
                    const innerRadius = this.radius * 0.6;
                    ctx.beginPath();
                    for (let i = 0; i < spikes * 2; i++) {
                        const radius = i % 2 === 0 ? outerRadius : innerRadius;
                        const angle = (i * Math.PI) / spikes;
                        ctx.lineTo(radius * Math.cos(angle), radius * Math.sin(angle));
                    }
                    ctx.closePath();
                    ctx.fillStyle = this.color;
                    ctx.fill();
                } else if (this.type === 'hex-dodger') {
                    // Hexagon
                    ctx.beginPath();
                    for (let i = 0; i < 6; i++) {
                        const angle = i * Math.PI / 3;
                        const x = Math.cos(angle) * this.radius;
                        const y = Math.sin(angle) * this.radius;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    // Inner Detail
                    ctx.beginPath();
                    ctx.arc(0, 0, this.radius * 0.4, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                } else if (this.type === 'proton' || this.type === 'spinner-mini') {
                    ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                } else if (this.type === 'mayfly') {
                    // Equilateral triangle shape
                    ctx.beginPath();
                    ctx.moveTo(this.radius, 0);
                    ctx.lineTo(this.radius * Math.cos(2 * Math.PI / 3), this.radius * Math.sin(2 * Math.PI / 3));
                    ctx.lineTo(this.radius * Math.cos(4 * Math.PI / 3), this.radius * Math.sin(4 * Math.PI / 3));
                    ctx.closePath();
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                } else if (this.type === 'sapphire') {
                    // Octagon
                    ctx.beginPath();
                    for (let i = 0; i < 8; i++) {
                        const angle = i * Math.PI / 4;
                        ctx.lineTo(Math.cos(angle) * this.radius, Math.sin(angle) * this.radius);
                    }
                    ctx.closePath();
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = 4;
                    ctx.stroke();
                } else if (this.type === 'ruby') {
                    // Hexagon
                    ctx.beginPath();
                    for (let i = 0; i < 6; i++) {
                        const angle = i * Math.PI / 3;
                        const x = Math.cos(angle) * this.radius;
                        const y = Math.sin(angle) * this.radius;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = 4;
                    ctx.stroke();
                } else if (this.type === 'emerald') {
                    // Star
                    ctx.beginPath();
                    for (let i = 0; i < 10; i++) {
                        const r = i % 2 === 0 ? this.radius : this.radius / 2;
                        const angle = i * Math.PI / 5;
                        ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
                    }
                    ctx.closePath();
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = 4;
                    ctx.stroke();
                } else if (this.type === 'dart') {
                    // Triangle
                    ctx.beginPath();
                    ctx.moveTo(this.radius, 0);
                    ctx.lineTo(-this.radius, this.radius/2);
                    ctx.lineTo(-this.radius, -this.radius/2);
                    ctx.closePath();
                    ctx.fillStyle = this.color;
                    ctx.fill();
                } else if (this.type === 'mini-titan') {
                    ctx.rect(-this.radius, -this.radius, this.radius*2, this.radius*2);
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = 3;
                    ctx.stroke();
                } else if (this.type === 'arrow') {
                    ctx.beginPath();
                    ctx.moveTo(this.radius, 0);
                    ctx.lineTo(-this.radius, this.radius/2);
                    ctx.lineTo(-this.radius, -this.radius/2);
                    ctx.closePath();
                    ctx.fillStyle = this.color;
                    ctx.fill();
                } else {
                    // Square/Diamond shape for Grunt, Weaver, Spinner
                    const size = this.radius * 0.7;
                    ctx.rect(-size, -size, size * 2, size * 2);
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    
                    // Inner X
                    ctx.beginPath();
                    ctx.moveTo(-size/2, -size/2);
                    ctx.lineTo(size/2, size/2);
                    ctx.moveTo(size/2, -size/2);
                    ctx.lineTo(-size/2, size/2);
                    ctx.stroke();
                }

                ctx.restore();
            }

            update(dt) {
                if (!player.alive) return;

                // Safety check for NaN coordinates (prevents ghost enemies)
                if (isNaN(this.x) || isNaN(this.y)) {
                    this.markedForDeletion = true;
                    return;
                }

                const angleToPlayer = Math.atan2(player.y - this.y, player.x - this.x);

                // --- BEHAVIOR LOGIC ---
                let isDodging = false;
                this.dodgeCooldown = Math.max(0, this.dodgeCooldown - dt);
                if (this.type === 'weaver') {
                    for (const p of projectiles) {
                        if (Math.abs(p.x - this.x) > 120 || Math.abs(p.y - this.y) > 120) continue;
                        const distToProj = Math.hypot(p.x - this.x, p.y - this.y);
                        // Check if a projectile is within the "danger zone"
                        if (distToProj < 120) {
                            const angleFromProj = Math.atan2(this.y - p.y, this.x - p.x);
                            const projAngle = Math.atan2(p.velocity.y, p.velocity.x);
                            const angleDiff = Math.abs(angleFromProj - projAngle);

                            // If the projectile is heading towards us, dodge
                            if (angleDiff < 0.4) { 
                                // Dodge perpendicular to the bullet's path
                                const dodgeAngle = projAngle + Math.PI / 2;
                                this.velocity.x = Math.cos(dodgeAngle);
                                this.velocity.y = Math.sin(dodgeAngle);
                                isDodging = true;
                                break; // Only react to the first bullet found
                            }
                        }
                    }
                }

                // Hex Dodger Logic (Advanced Dodging)
                if (this.type === 'hex-dodger' && this.dodgeCooldown <= 0) {
                    for (const p of projectiles) {
                        // Increased detection range
                        if (Math.abs(p.x - this.x) > 400 || Math.abs(p.y - this.y) > 400) continue;
                        const distSq = (p.x - this.x)**2 + (p.y - this.y)**2;
                        if (distSq < 400**2) {
                            const angleFromProj = Math.atan2(this.y - p.y, this.x - p.x);
                            const projAngle = Math.atan2(p.velocity.y, p.velocity.x);
                            let angleDiff = angleFromProj - projAngle;
                            while (angleDiff <= -Math.PI) angleDiff += Math.PI*2;
                            while (angleDiff > Math.PI) angleDiff -= Math.PI*2;
                            
                            // Wider detection cone
                            if (Math.abs(angleDiff) < 1.2) {
                                const dodgeDir = projAngle + (angleDiff > 0 ? -Math.PI/2 : Math.PI/2);
                                // Faster dodge speed
                                this.velocity.x = Math.cos(dodgeDir) * 6;
                                this.velocity.y = Math.sin(dodgeDir) * 6;
                                isDodging = true;
                                this.dodgeCooldown = 0.2; // Commit to dodge for 0.2s
                                break;
                            }
                        }
                    }
                }
                if (this.type === 'hex-dodger' && this.dodgeCooldown > 0) {
                    isDodging = true;
                }

                // Gravity Well Logic
                if (this.type === 'gravity-well') {
                    // Keep it within the play area by bouncing off the edges
                    if ((this.x - this.radius < 0 && this.velocity.x < 0) || (this.x + this.radius > world.width && this.velocity.x > 0)) {
                        this.velocity.x *= -1;
                    }
                    if ((this.y - this.radius < 0 && this.velocity.y < 0) || (this.y + this.radius > world.height && this.velocity.y > 0)) {
                        this.velocity.y *= -1;
                    }

                    // Pull Grid
                    if (grid) {
                        grid.applyForce(this.x, this.y, 300, -0.8);
                    }

                    // Pull Player
                    const distToPlayer = Math.hypot(player.x - this.x, player.y - this.y);
                    if (distToPlayer > this.radius) {
                        player.velocity.x += (this.x - player.x) / distToPlayer * 0.05;
                        player.velocity.y += (this.y - player.y) / distToPlayer * 0.05;
                    }
                    // Pull Enemies
                    enemies.forEach(other => {
                        if (other !== this && other.type !== 'gravity-well') {
                            if (Math.abs(other.x - this.x) > 300 || Math.abs(other.y - this.y) > 300) return;
                            const dist = Math.hypot(other.x - this.x, other.y - this.y);
                            if (dist < 300) {
                                other.velocity.x += (this.x - other.x) / dist * 0.1;
                                other.velocity.y += (this.y - other.y) / dist * 0.1;
                            }
                        }
                    });
                }

                // Snake Body Logic
                if (this.type === 'snake-body') {
                    if (this.leader && !this.leader.markedForDeletion) {
                        const angleToLeader = Math.atan2(this.leader.y - this.y, this.leader.x - this.x);
                        const dist = Math.hypot(this.leader.x - this.x, this.leader.y - this.y);
                        if (dist > this.radius) { // Maintain distance
                            this.velocity.x = Math.cos(angleToLeader);
                            this.velocity.y = Math.sin(angleToLeader);
                        } else {
                            // Stop if close to leader to prevent jitter/overshoot
                            this.velocity.x = 0;
                            this.velocity.y = 0;
                        }
                    } else {
                        this.markedForDeletion = true; // Leader is dead
                    }
                }

                // Snake Head Logic (Intercept)
                if (this.type === 'snake-head') {
                    const dist = Math.hypot(player.x - this.x, player.y - this.y);
                    // Predict player movement to cut them off
                    const lookAhead = Math.min(dist / this.speed, 30); 
                    const targetX = player.x + (player.velocity.x * player.speed) * lookAhead;
                    const targetY = player.y + (player.velocity.y * player.speed) * lookAhead;
                    
                    const angle = Math.atan2(targetY - this.y, targetX - this.x);
                    this.velocity.x = Math.cos(angle);
                    this.velocity.y = Math.sin(angle);
                }

                // --- BOSS BEHAVIORS ---
                if (this.type === 'sapphire') {
                    // Figure 8 pattern
                    this.x = world.width / 2 + Math.sin(frame * 0.02) * (world.width * 0.2);
                    this.y = world.height / 2 + Math.sin(frame * 0.04) * (world.height * 0.2);
                    
                    // Spawn Darts (time-based)
                    this.spawnTimer = (this.spawnTimer || 0) + dt;
                    if (this.spawnTimer > 1) { // Every 1 second
                        enemies.push(new Enemy(this.x, this.y, 'dart'));
                        this.spawnTimer = 0;
                    }
                    return; // Override default movement
                }

                if (this.type === 'ruby') {
                    // Aggressive Chase
                    const angle = Math.atan2(player.y - this.y, player.x - this.x);
                    this.velocity.x = Math.cos(angle);
                    this.velocity.y = Math.sin(angle);
                    
                    // Spawn Mini-Titans (time-based)
                    this.spawnTimer = (this.spawnTimer || 0) + dt;
                    if (this.spawnTimer > 2) { // Every 2 seconds
                        enemies.push(new Enemy(this.x, this.y, 'mini-titan'));
                        this.spawnTimer = 0;
                    }
                }

                if (this.type === 'emerald') {
                    const hpPercent = this.hp / this.maxHp;
                    
                    if (hpPercent > 0.66) {
                        // Phase 1: Stationary, Spawn Arrows
                        this.velocity = {x: 0, y: 0};
                        this.spawnTimer = (this.spawnTimer || 0) + dt;
                        if (this.spawnTimer > 1.5) { // Every 1.5 seconds
                            for(let i=-2; i<=2; i++) {
                                const arrow = new Enemy(this.x, this.y, 'arrow');
                                const angle = Math.atan2(player.y - this.y, player.x - this.x) + i * 0.2;
                                arrow.velocity.x = Math.cos(angle);
                                arrow.velocity.y = Math.sin(angle);
                                arrow.angle = angle; // Rotate sprite
                                enemies.push(arrow);
                            }
                            this.spawnTimer = 0;
                        }
                    } else if (hpPercent > 0.33) {
                        // Phase 2: Spawn Mini-Boss
                        this.velocity = {x: 0, y: 0};
                        if (!this.miniBossSpawned) {
                            const mb = new Enemy(this.x, this.y + 100, 'ruby');
                            mb.hp = 40; // Reduced HP
                            mb.radius = 30;
                            enemies.push(mb);
                            this.miniBossSpawned = true;
                        }
                    } else {
                        // Phase 3: Chase
                        const angle = Math.atan2(player.y - this.y, player.x - this.x);
                        this.velocity.x = Math.cos(angle);
                        this.velocity.y = Math.sin(angle);
                    }
                }
                
                if (this.type === 'dart' || this.type === 'arrow') {
                     this.angle = Math.atan2(this.velocity.y, this.velocity.x);
                }

                // Default chase behavior if not performing a special action (like dodging)
                if (!isDodging && this.type !== 'gravity-well' && !this.type.startsWith('snake') && !['sapphire', 'emerald', 'ruby', 'hex-dodger'].includes(this.type)) {
                    this.velocity.x = Math.cos(angleToPlayer);
                    this.velocity.y = Math.sin(angleToPlayer);
                    
                    // Spinner Mini erratic movement
                    if (this.type === 'spinner-mini') {
                        this.angleOffset += 0.2;
                        this.velocity.x += Math.cos(this.angleOffset) * 0.5;
                        this.velocity.y += Math.sin(this.angleOffset) * 0.5;
                    }
                }

                // Hex Dodger Movement (Bouncy/Wavy)
                if (!isDodging && this.type === 'hex-dodger') {
                     const angleToPlayer = Math.atan2(player.y - this.y, player.x - this.x);
                     const wave = Math.sin(frame * 0.1) * 1.0; 
                     const moveAngle = angleToPlayer + wave;
                     this.velocity.x = Math.cos(moveAngle);
                     this.velocity.y = Math.sin(moveAngle);
                }
                // --- END BEHAVIOR LOGIC ---

                this.x += this.velocity.x * this.speed * 60 * dt;
                this.y += this.velocity.y * this.speed * 60 * dt;
                this.angle += this.spinSpeed * 60 * dt;

                // New Rule: Despawn if enemy leaves the play area
                const offscreenBuffer = 100;
                if (this.x < -offscreenBuffer || this.x > world.width + offscreenBuffer ||
                    this.y < -offscreenBuffer || this.y > world.height + offscreenBuffer) {
                    this.markedForDeletion = true;
                }
            }
        }

        class Particle {
            constructor() {
                this.x = 0;
                this.y = 0;
                this.color = '#fff';
                this.radius = 1;
                this.markedForDeletion = false;
                this.velocity = { x: 0, y: 0 };
                this.alpha = 1;
                this.friction = 0.97;
            }

            init(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.radius = Math.random() * 2;
                const velocityMultiplier = Math.random() * 5;
                const angle = Math.random() * Math.PI * 2;
                this.velocity.x = Math.cos(angle) * velocityMultiplier;
                this.velocity.y = Math.sin(angle) * velocityMultiplier;
                this.alpha = 1;
                this.markedForDeletion = false;
                return this;
            }

            draw(ctx, view) {
                // Culling check
                if (this.x + this.radius < view.x - view.buffer || this.x - this.radius > view.x + view.width + view.buffer ||
                    this.y + this.radius < view.y - view.buffer || this.y - this.radius > view.y + view.height + view.buffer) {
                    return;
                }

                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
            }

            update(dt) {
                const frictionFactor = Math.pow(this.friction, dt * 60);
                this.velocity.x *= frictionFactor;
                this.velocity.y *= frictionFactor;
                this.x += this.velocity.x * 60 * dt;
                this.y += this.velocity.y * 60 * dt;
                // Fade out over time, independent of frame rate (1.2 = 0.02 * 60)
                if ((this.alpha -= 1.2 * dt) <= 0) this.markedForDeletion = true;
            }
        }

        class Orb {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 2; // 60% smaller than 5
                this.color = '#6a0dad'; // Dark Purple
                const angle = Math.random() * Math.PI * 2;
                this.velocity = {
                    x: Math.cos(angle) * 0.5,
                    y: Math.sin(angle) * 0.5
                };
                this.attractionRadius = 150;
                this.attractionForce = 1.5; // Increased force
                this.maxSpeed = 15; // Increased speed
                this.markedForDeletion = false;
                this.life = 7.0;
            }

            draw(ctx, view) {
                // Culling check
                if (this.x + this.radius < view.x - view.buffer || this.x - this.radius > view.x + view.width + view.buffer ||
                    this.y + this.radius < view.y - view.buffer || this.y - this.radius > view.y + view.height + view.buffer) {
                    return;
                }

                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(Math.PI / 4);

                const size = this.radius * 1.2;

                // Blink effect in last 2 seconds
                let alpha = 1;
                if (this.life < 2) {
                    if (Math.floor(this.life * 5) % 2 === 0) {
                        alpha = 0.3;
                    }
                }

                // Manual glow (much faster than shadowBlur)
                ctx.globalAlpha = 0.25 * alpha;
                ctx.fillStyle = this.color;
                ctx.fillRect(-size * 2, -size * 2, size * 4, size * 4);

                ctx.globalAlpha = 1 * alpha;
                ctx.fillRect(-size, -size, size * 2, size * 2);
                ctx.restore();
            }

            update(dt) {
                this.life -= dt;
                if (this.life <= 0) {
                    this.markedForDeletion = true;
                }
                const distToPlayer = Math.hypot(player.x - this.x, player.y - this.y);

                if (distToPlayer < this.attractionRadius && player.alive) {
                    // Powerful attraction
                    const angleToPlayer = Math.atan2(player.y - this.y, player.x - this.x);
                    this.velocity.x += Math.cos(angleToPlayer) * this.attractionForce * 60 * dt;
                    this.velocity.y += Math.sin(angleToPlayer) * this.attractionForce * 60 * dt;

                    // Cap speed to maxSpeed
                    const currentSpeed = Math.hypot(this.velocity.x, this.velocity.y);
                    if (currentSpeed > this.maxSpeed) {
                        this.velocity.x = (this.velocity.x / currentSpeed) * this.maxSpeed;
                        this.velocity.y = (this.velocity.y / currentSpeed) * this.maxSpeed;
                    }
                }

                this.x += this.velocity.x * 60 * dt;
                this.y += this.velocity.y * 60 * dt;

                // Wall Boundaries - Bounce to stay in play area
                if ((this.x - this.radius < 0 && this.velocity.x < 0) || (this.x + this.radius > world.width && this.velocity.x > 0)) {
                    this.velocity.x *= -1;
                }
                if ((this.y - this.radius < 0 && this.velocity.y < 0) || (this.y + this.radius > world.height && this.velocity.y > 0)) {
                    this.velocity.y *= -1;
                }
            }
        }

        // --- GAME LOGIC ---

        let player = new Player(world.width / 2, world.height / 2);
        let projectiles = [];
        let enemies = [];
        let particles = [];
        let spawnTimer = 0;
        let cornerSpawnTimer = 0;
        
        function addScore(points) {
            score += points;
            scoreStreak += points;
            scoreEl.innerHTML = score;
            
            if (score >= nextLifeThreshold) {
                lives++;
                livesEl.innerHTML = lives;
                nextLifeThreshold += 15000;
                
                // Visual feedback
                const title = document.createElement('div');

                document.body.appendChild(title);
                setTimeout(() => { title.style.opacity = '0'; setTimeout(() => title.remove(), 1000); }, 1000);
            }

            // Award bomb

                bombsEl.innerHTML = bombs;

                const title = document.createElement('div');

                title.style.left = '50%';

                title.style.color = '#ffaa00';
                title.style.textShadow = '0 0 10px currentColor';

                title.style.transition = 'opacity 1s';
                title.style.pointerEvents = 'none';
                document.body.appendChild(title);
                setTimeout(() => { title.style.opacity = '0'; setTimeout(() => title.remove(), 1000); }, 1000);
            }
        }

        function advanceLevel() {
            enemies.forEach(e => e.markedForDeletion = true); // Clear all enemies
            level++;
            levelFrame = 0;
            hexSpawnsTriggered = 0;
            bossSpawned = false;
            levelEl.innerText = level;
            waveMsg.classList.add('hidden');
            const isBossLevel = level % 3 === 0;
            showLevelTitle(isBossLevel ? "BOSS FIGHT" : `LEVEL ${level}`, isBossLevel ? "red" : "white");
        }

        function showLevelTitle(text, color) {

            title.innerText = text;
            title.style.position = 'absolute';
            title.style.top = '30%';
            title.style.left = '50%';

            title.style.transition = 'opacity 1s';
            document.body.appendChild(title);
            setTimeout(() => { title.style.opacity = '0'; setTimeout(() => title.remove(), 1000); }, 2000);
        }

        function spawnEnemies(dt) {
            // Boss Level Logic
            if (level % 3 === 0) {
                if (!bossSpawned) {
                    let type = 'sapphire';
                    if (level === 6) type = 'ruby';
                    if (level === 9) type = 'emerald';
                    if (level > 9) type = ['sapphire', 'ruby', 'emerald'][Math.floor(Math.random() * 3)];
                    
                    const boss = new Enemy(canvas.width/2, -100, type);
                    boss.y = 100; // Move into view
                    enemies.push(boss);
                    bossSpawned = true;
                }
                return; // Boss handles spawning
            }
            
            // --- Guaranteed Hex-Dodger Spawns ---
            if (hexSpawnsTriggered < hexSpawnTimers.length && levelFrame >= hexSpawnTimers[hexSpawnsTriggered]) {
                const radius = 30;
                let x, y;
                if (Math.random() < 0.5) {
                    x = Math.random() < 0.5 ? 0 - radius : world.width + radius;
                    y = Math.random() * world.height;
                } else {
                    x = Math.random() * world.width;
                    y = Math.random() < 0.5 ? 0 - radius : world.height + radius;
                }
                enemies.push(new Enemy(x, y, 'hex-dodger'));
                hexSpawnsTriggered++;
            }

            spawnTimer += dt;
            cornerSpawnTimer += dt;

            // Only attempt to spawn on a timer to avoid spawning every frame
            if (spawnTimer < 1.0) return; // Try to spawn every 1 second
            spawnTimer = 0; // Reset timer

            // Level Duration Check
            const levelDuration = 30; // 30 seconds per level
            if (levelFrame > levelDuration) return;

            // Enemy Cap Logic: Scales from ~15 (Level 1) to ~100 (Level 10+)
            // This prevents overcrowding while allowing death spawns (Splitters) to exceed the limit.
            const enemyCap = 15 + (level * 8);
            if (enemies.length >= enemyCap) return;

            const radius = 30;

            // Every 5 seconds, trigger a corner spawn event
            if (cornerSpawnTimer > 5.0) {
                cornerSpawnTimer = 0; // Reset corner spawn timer
                const corners = [
                    { x: -radius, y: -radius }, // Top-Left
                    { x: world.width + radius, y: -radius }, // Top-Right
                    { x: -radius, y: world.height + radius }, // Bottom-Left
                    { x: world.width + radius, y: world.height + radius } // Bottom-Right
                ];

                corners.forEach(corner => {
                    // Spawn a group of enemies at each corner. Group size increases with score.
                    const groupSize = 2 + Math.floor(score / 10000);
                    for (let i = 0; i < groupSize; i++) {
                        const spawnX = corner.x + (Math.random() - 0.5) * 100;
                        const spawnY = corner.y + (Math.random() - 0.5) * 100;
                        // For corner waves, use simpler enemies
                        const enemyType = Math.random() < 0.4 ? 'weaver' : 'grunt';
                        enemies.push(new Enemy(spawnX, spawnY, enemyType));
                    }
                });
                return; // Skip the regular edge spawn on this frame
            }

            // --- Regular Edge Spawn ---
            let x, y;
            
            // Spawn randomly on edges
            if (Math.random() < 0.5) {
                x = Math.random() < 0.5 ? 0 - radius : world.width + radius;
                y = Math.random() * world.height;
            } else {
                x = Math.random() * world.width;
                y = Math.random() < 0.5 ? 0 - radius : world.height + radius;
            }

            // Decide which enemy type to spawn
            const rand = Math.random();
            let enemyType;

            if (rand < 0.05 && frame > 600) { // Spawn snake after 10 seconds
                const head = new Enemy(x, y, 'snake-head');
                let lastSegment = head;
                for (let i = 0; i < 8; i++) { // 8 body segments
                    const segment = new Enemy(x, y, 'snake-body');
                    segment.leader = lastSegment;
                    segment.radius = head.radius * 0.8;
                    head.segments.push(segment);
                    enemies.push(segment);
                    lastSegment = segment;
                }
                enemies.push(head);
                return; // Exit after spawning snake
            } else if (rand < 0.12) { // Mayfly Swarm
                for (let i = 0; i < 12; i++) {
                    const mx = x + (Math.random() - 0.5) * 60;
                    const my = y + (Math.random() - 0.5) * 60;
                    enemies.push(new Enemy(mx, my, 'mayfly'));
                }
                return;
            } else if (rand < 0.20) enemyType = 'repulsor';
            else if (rand < 0.28) enemyType = 'gravity-well';
            else if (rand < 0.50) enemyType = 'hex-dodger'; // Increased spawn chance
            else if (rand < 0.60) enemyType = 'spinner';
            else if (rand < 0.75) enemyType = 'weaver';
            else enemyType = 'grunt';

            enemies.push(new Enemy(x, y, enemyType));
        }

        function useBomb() {
            if (bombs <= 0 || !gameActive || bombEffect.active) return;

            bombs--;
            bombsEl.innerHTML = bombs;
            sounds.bomb();
            if (grid) grid.applyForce(player.x, player.y, 1000, 60);

            // Trigger visual effect. The actual destruction is handled
            // by the growing circle in the animate() loop.
            bombEffect.active = true;
            bombEffect.radius = 0;
            bombEffect.alpha = 1;
        }

        function createExplosion(x, y, color) {
            sounds.explode();
            if (grid) grid.applyForce(x, y, 150, 12);
            for (let i = 0; i < 15; i++) {
                particles.push(particlePool.get().init(x, y, color));
            }
        }

        function togglePause() {

           
            isPaused = !isPaused;

            if (isPaused) {
                // Pause the game
                cancelAnimationFrame(animationId);
                pauseMenu.classList.remove('hidden');
                // Stop music scheduler
               const player = document.getElementById('bg-music');
                if (player) player.pause();
            } else {
                // Resume the game
                pauseMenu.classList.add('hidden');
                lastTime = performance.now(); // Prevents large dt jump
                if (musicPlaying) {
                    sounds.startMusic(); // Restart music scheduler
                }
                animate();
            }
        }

        function resetGame() {
            score = 0;
            scoreStreak = 0;
            lives = 3;
            nextLifeThreshold = 15000;
            bombs = 3;
            nextBombThreshold = 30000;
            scoreEl.innerHTML = score;
            livesEl.innerHTML = lives;
            bombsEl.innerHTML = bombs;
            level = 1;
            levelFrame = 0;
            hexSpawnsTriggered = 0;
            bossSpawned = false;
            spawnTimer = 0;
            cornerSpawnTimer = 0;
            waveMsg.classList.add('hidden');
            showLinesCheck.checked = false; debugShowLines = false;
            infiniteLivesCheck.checked = false; infiniteLives = false;
            levelEl.innerText = level;
            projectiles = [];
            enemies = [];
            particles = [];
            orbs = [];
            projectilePool = new Pool(Projectile, 200);
            particlePool = new Pool(Particle, 1000);
            grid = new Grid(world.width, world.height, 50);

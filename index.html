        function gameOver() {
            gameActive = false;
            cancelAnimationFrame(animationId);
            startScreen.classList.remove('hidden');
            finalScoreMsg.innerText = `Final Score: ${score}`;
            startBtn.innerText = "Play Again";
            const player = document.getElementById('bg-music');
            if (player) player.pause();
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('geoWarsHighScore', highScore);
                highScoreEl.innerHTML = highScore;
            }
            pollGamepadsForStart();
        }

        function animate() {
            if (!gameActive) return;
            animationId = requestAnimationFrame(animate);
            
            const now = performance.now();
            // Calculate delta time (dt) for frame-rate independent physics
            // Cap dt to prevent huge jumps after pausing or lag spikes
            const dt = Math.min(0.05, (now - lastTimeForDt) / 1000);
            lastTimeForDt = now;
            // Convert mouse screen coordinates to world coordinates
            mouse.x = (mouse.screenX - canvas.width / 2) / camera.zoom + camera.x;
            mouse.y = (mouse.screenY - canvas.height / 2) / camera.zoom + camera.y;

            // --- GAME LOGIC & UPDATES ---

            // Camera update (smooth follow)
            if (player.alive) {
                camera.x += (player.x - camera.x) * camera.lerpFactor;
                camera.y += (player.y - camera.y) * camera.lerpFactor;
            }

            // State updates
            frame++;
            levelFrame += dt; // Use dt for level timer

            // Level Progression Logic
            if (level % 3 !== 0) { // Non-boss levels
                const levelDuration = 30; // 30 seconds per level
                if (levelFrame > levelDuration) {
                    if (enemies.length === 0) {
                        advanceLevel();
                    } else {
                        waveMsg.innerText = `ENEMIES REMAINING: ${enemies.length}`;
                        waveMsg.classList.remove('hidden');
                    }
                }
            } else { // Boss Level Failsafe
                if (bossSpawned && enemies.length === 0) {
                    advanceLevel();
                }
            }

            // Update all game objects
            player.update(dt, now);
            orbs.forEach(orb => orb.update(dt));
            particles.forEach(p => p.update(dt));
            projectiles.forEach(projectile => {
                projectile.update(dt);
                // Remove off-screen projectiles (check against world boundaries)
                if (projectile.x + projectile.radius < 0 ||
                    projectile.x - projectile.radius > world.width ||
                    projectile.y + projectile.radius < 0 ||
                    projectile.y - projectile.radius > world.height) {
                    projectile.markedForDeletion = true;
                }
            });
            enemies.forEach(enemy => enemy.update(dt));

            // Collision detection & other logic
            // Bomb Effect Logic
            if (bombEffect.active) {
                bombEffect.radius += 3000 * dt; // 50 * 60
                bombEffect.alpha -= 1.2 * dt;   // 0.02 * 60

                if (bombEffect.alpha <= 0) {
                    bombEffect.active = false;
                } else {
                    // Check for enemy hits
                    enemies.forEach(enemy => { // Using squared distance is faster
                        const distSq = (player.x - enemy.x)**2 + (player.y - enemy.y)**2;
                        if (distSq < (bombEffect.radius + enemy.radius)**2) {
                            if (!enemy.markedForDeletion) orbs.push(new Orb(enemy.x, enemy.y));
                            enemy.markedForDeletion = true;
                            createExplosion(enemy.x, enemy.y, enemy.color);
                            addScore(100); // Score for bomb kill
                        }
                    });
                }
            }

            // Orb vs Player Collision
            orbs.forEach(orb => {
                if (player.alive) {
                    const distSq = (player.x - orb.x)**2 + (player.y - orb.y)**2;
                    if (distSq < (player.radius + orb.radius)**2) {
                        orb.markedForDeletion = true;
                        addScore(25);
                        sounds.collect();
                    }
                }
            });

            // Projectile vs Enemy & Enemy vs Player Collisions
            enemies.forEach((enemy, index) => {
                // Collision: Projectile vs Enemy
                projectiles.forEach((projectile, pIndex) => {
                    const combinedRadius = enemy.radius + projectile.radius;
                    // Optimization: Broad-phase bounding box check
                    if (Math.abs(projectile.x - enemy.x) > combinedRadius + 5 ||
                        Math.abs(projectile.y - enemy.y) > combinedRadius + 5) return;

                   
                    // Optimization: Narrow-phase circle collision using squared distance (avoids sqrt)
                    const dx = projectile.x - enemy.x;
                    const dy = projectile.y - enemy.y;
                    const distSq = dx * dx + dy * dy;
                    if (distSq < combinedRadius * combinedRadius) {
                        if (enemy.markedForDeletion) return;

                        if (enemy.type === 'snake-body') return; // snake bodies are invulnerable

                        // Emerald Deflection (Phase 3)
                        if (enemy.type === 'emerald' && enemy.hp < enemy.maxHp * 0.33) {
                            if (Math.random() < 0.5) {
                                createExplosion(projectile.x, projectile.y, '#fff'); // Spark
                                projectile.markedForDeletion = true;
                                return;
                            }
                        }

                        // Hit!
                        createExplosion(enemy.x, enemy.y, enemy.color);
                        
                        enemy.hp--;
                        projectile.markedForDeletion = true;

                        // Spawn orb BEFORE checking for boss type
                        if (enemy.hp <= 0 && !['sapphire', 'ruby', 'emerald'].includes(enemy.type)) {
                            orbs.push(new Orb(enemy.x, enemy.y));
                       }

                        if (enemy.hp <= 0) {
                            enemy.markedForDeletion = true;
                            // Increase Score
                            const points = (enemy.type === 'gravity-well' ? 500 : 100);
                            addScore(points);

                            // Death Spawns
                            if (enemy.type === 'spinner') {
                                for(let i=0; i<3; i++) {
                                    enemies.push(new Enemy(enemy.x, enemy.y, 'spinner-mini'));
                                }
                            } else if (enemy.type === 'mini-titan') {
                                for(let i=0; i<4; i++) {
                                    enemies.push(new Enemy(enemy.x, enemy.y, 'grunt'));
                                }
                            } else if (['sapphire', 'ruby', 'emerald'].includes(enemy.type)) {
                                // Boss Defeated
                                for (let i = 0; i < 50; i++) { // Shower of orbs
                                    orbs.push(new Orb(enemy.x + (Math.random() - 0.5) * 50, enemy.y + (Math.random() - 0.5) * 50));
                                }
                                addScore(5000);
                                advanceLevel();
                            } else if (enemy.type === 'snake-head') {
                                addScore(1000);
                                // When the head dies, its segments break off and become aggressive
                                enemy.segments.forEach(seg => {
                                    seg.markedForDeletion = true;
                                    // Spawn a chaotic 'spinner-mini' in place of the body segment
                                    enemies.push(new Enemy(seg.x, seg.y, 'spinner-mini'));
                                });
                            } else if (enemy.type === 'gravity-well') {
                                for(let i=0; i<6; i++) {
                                   const p = new Enemy(enemy.x, enemy.y, 'proton');
                                    p.velocity.x = (Math.random() - 0.5) * 10;
                                    p.velocity.y = (Math.random() - 0.5) * 10;
                                    enemies.push(p);
                                }
                            }
                        }
                    }
                });

                // Gravity Well Absorption Logic
                if (enemy.type === 'gravity-well') {
                    enemies.forEach((other, otherIndex) => {
                        if (other !== enemy && other.type !== 'gravity-well' && other.type !== 'proton') { // Using squared distance is faster
                            const combinedRadius = enemy.radius + other.radius;
                            if (Math.abs(enemy.x - other.x) > combinedRadius + 5 ||
                                Math.abs(enemy.y - other.y) > combinedRadius + 5) return;

                            const distSq = (enemy.x - other.x)**2 + (enemy.y - other.y)**2;
                            if (distSq < combinedRadius * combinedRadius) {
                                // Absorb
                                createExplosion(other.x, other.y, enemy.color);
                                other.markedForDeletion = true;
                                enemy.absorbed++;
                                
                                // Overload
                                if (enemy.absorbed >= 5) {
                                    enemy.hp = 0; // Trigger death logic next frame or force it now
                                    // For simplicity, we let the next bullet kill it or just leave it at 0 HP logic? 
                                    // Let's force kill it by setting HP to 0 and letting bullet logic handle it? 
                                    // No, bullet logic only runs on hit. We need to force kill here.
                                    // Re-using the death spawn logic is complex without refactoring, 
                                    // so let's just spawn protons here manually.
                                    for(let i=0; i<8; i++) {
                                        const p = new Enemy(enemy.x, enemy.y, 'proton'); p.velocity.x = (Math.random() - 0.5) * 15; p.velocity.y = (Math.random() - 0.5) * 15; enemies.push(p);
                                    }
                                    for (let i = 0; i < 5; i++) { // Drop 5 orbs
                                        orbs.push(new Orb(enemy.x, enemy.y));
                                    }
                                    enemy.markedForDeletion = true;
                                    addScore(250);
                                    sounds.explode();
                                    createExplosion(enemy.x, enemy.y, enemy.color);
                                }
                            }
                        }
                    });
                }

                // Collision: Enemy vs Player
                if (player.alive && !player.invulnerable) { // Using squared distance is faster
                    const combinedRadius = player.radius + enemy.radius;
                    const distSq = (player.x - enemy.x)**2 + (player.y - enemy.y)**2;
                    if (distSq < combinedRadius * combinedRadius) {
                        // Player Hit
                        createExplosion(player.x, player.y, player.color);
                        if (!infiniteLives) {
                           lives--;
                            livesEl.innerHTML = lives;
                            scoreStreak = 0;
                        }
                        
                        // Kill enemy that hit player
                        enemy.markedForDeletion = true;
                        orbs.push(new Orb(enemy.x, enemy.y));

                        if (['sapphire', 'ruby', 'emerald'].includes(enemy.type)) {
                            for (let i = 0; i < 50; i++) { // Shower of orbs
                                orbs.push(new Orb(enemy.x + (Math.random() - 0.5) * 50, enemy.y + (Math.random() - 0.5) * 50));
                            }
                            addScore(5000);
                            advanceLevel();
                        }

                        if (lives <= 0 && !infiniteLives) {
                            player.alive = false;
                            setTimeout(gameOver, 1000); // Wait a second to see explosion
                        } else {
                            player.respawn();
                        }
                    }
                }
            });

           
            // Cleanup marked objects
            for (let i = enemies.length - 1; i >= 0; i--) {
                if (enemies[i].markedForDeletion) enemies.splice(i, 1);
            }
            for (let i = projectiles.length - 1; i >= 0; i--) {
                if (projectiles[i].markedForDeletion) {
                    projectilePool.release(projectiles[i]);
                    projectiles.splice(i, 1);
                }
            }
            for (let i = particles.length - 1; i >= 0; i--) {
                if (particles[i].markedForDeletion) {
                    particlePool.release(particles[i]);
                    particles.splice(i, 1);
                }
            }
            for (let i = orbs.length - 1; i >= 0; i--) {
                if (orbs[i].markedForDeletion) orbs.splice(i, 1);
            }

            // Spawning
            spawnEnemies(dt);

            // --- RENDER ---

            // Clear Canvas with fade effect for trails
            ctx.fillStyle = 'rgba(5, 5, 5, 0.3)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
           
            // Apply camera transformations
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.scale(camera.zoom, camera.zoom);
            ctx.translate(-camera.x, -camera.y);

            // Calculate view bounds for culling
            const view = {
                x: camera.x - (canvas.width / 2 / camera.zoom),
                y: camera.y - (canvas.height / 2 / camera.zoom),
                width: canvas.width / camera.zoom,
                height: canvas.height / camera.zoom,
                buffer: 100 // Render objects 100px outside the view
            };

            // Update and Draw Grid (Grid update is visual, can be done here)
            if (grid) {
                if (player.alive) grid.applyForce(player.x, player.y, 80, 1.5);
               enemies.forEach(e => grid.applyForce(e.x, e.y, e.radius * 2, 0.5));
                grid.update();
                grid.draw(ctx, view);
            }

            // Draw Bomb Effect
            if (bombEffect.active) {
                ctx.save();
                ctx.beginPath();
                ctx.arc(player.x, player.y, bombEffect.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(255, 255, 255, ${bombEffect.alpha})`;
                ctx.lineWidth = 10;
                ctx.stroke();
                ctx.restore();
            }

            // Draw Debug Lines
            if (debugShowLines) {
                ctx.save();
               ctx.strokeStyle = 'rgba(255, 0, 0, 0.5)';
                ctx.lineWidth = 1;
                enemies.forEach(e => {
                    ctx.beginPath();
                    ctx.moveTo(player.x, player.y);
                    ctx.lineTo(e.x, e.y);
                    ctx.stroke();
                });
                ctx.restore();
            }

            // Draw all other game objects
            orbs.forEach(o => o.draw(ctx, view));
            enemies.forEach(e => e.draw(ctx, view));

            // Set fillStyle once for projectiles
            ctx.fillStyle = '#ffff00';
            projectiles.forEach(p => p.draw(ctx, view));

            // Particles are special, they set globalAlpha
            particles.forEach(p => p.draw(ctx, view));
            ctx.globalAlpha = 1; // Reset alpha

            player.draw(ctx); // Player doesn't need culling

            // Restore context to pre-camera state for UI drawing
            ctx.restore();

            // UI updates (FPS counter etc)
            fpsFrames++;
            if (now - lastTime >= 1000) {
                fpsCounterEl.innerText = `FPS: ${fpsFrames}`;
                fpsFrames = 0;
                lastTime = now;
            }
            enemiesAliveCounterEl.innerText = `Enemies Alive: ${enemies.length}`;
        }

        function pollGamepadsForStart() {
            if (gameActive) return;
            
            const gamepads = navigator.getGamepads();
            for (const gp of gamepads) {
                if (gp && gp.buttons.some(b => b.pressed)) {
                    if (audioCtx.state === 'suspended') audioCtx.resume();
                    resetGame();
                    return;
                }
            }
            requestAnimationFrame(pollGamepadsForStart);
        }

        startBtn.addEventListener('click', () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            resetGame();
        });

        pollGamepadsForStart();

        function pollGamepadsForPause() {
            if (gamepadIndex !== null) {
               const gp = navigator.getGamepads()[gamepadIndex];
                if (gp && gp.buttons[9] && gp.buttons[9].pressed) {
                    if (!startButtonPressed) {
                        if (gameActive && (isPaused || frame > 10)) togglePause();
                        startButtonPressed = true;
                    }
                } else {
                    startButtonPressed = false;
                }
            }
            requestAnimationFrame(pollGamepadsForPause);
        }
        pollGamepadsForPause();
    </script>
</body>
</html>
